// ===== IMAGE PLACEMENT =====
var selectedImgId = null;
var imgDragging = null;

function addImagePrompt(){
    var ov = document.createElement('div');
    ov.className = 'name-overlay';
    ov.id = 'imgPrompt';
    ov.addEventListener('click', function(e){ if(e.target===ov) ov.remove(); });
    ov.innerHTML = '<div class="name-box" style="max-width:360px;text-align:left">' +
        '<h3 style="text-align:center;margin-bottom:12px;font-size:1.1rem">Add Image to Schedule</h3>' +
        '<p style="font-size:0.85rem;opacity:0.7;margin-bottom:16px;text-align:center">Upload an image file or paste a URL</p>' +
        '<button onclick="document.getElementById(\'imgUpload\').click();document.getElementById(\'imgPrompt\').remove();" style="width:100%;font-size:0.9rem;padding:10px;margin-bottom:10px;background:#17A698;border-color:#17A698;cursor:pointer;color:#fff;border-radius:4px;border:none">Upload Image File</button>' +
        '<div style="text-align:center;opacity:0.4;font-size:0.75rem;margin-bottom:10px">or</div>' +
        '<input type="text" id="imgUrlInput" placeholder="https://example.com/image.png" style="width:100%;font-size:0.8rem;padding:8px;background:#444;color:#fff;border:1px solid #555;border-radius:4px;margin-bottom:10px;font-family:inherit">' +
        '<button onclick="addImageFromUrl()" style="width:100%;font-size:0.9rem;padding:10px;cursor:pointer;color:#fff;background:#555;border:1px solid #666;border-radius:4px">Add from URL</button>' +
        '</div>';
    document.body.appendChild(ov);
}

function addImageFromUrl(){
    var url = document.getElementById('imgUrlInput').value.trim();
    if(!url) return;
    var prompt = document.getElementById('imgPrompt');
    if(prompt) prompt.remove();
    placeImage(url);
}

function handleImageUpload(e){
    var file = e.target.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(ev){
        placeImage(ev.target.result);
    };
    reader.readAsDataURL(file);
    e.target.value = '';
}

function placeImage(url){
    if(!state.images) state.images = [];
    var img = {
        id: 'img' + Date.now(),
        dayIndex: 0,
        startSlot: 10,
        spanSlots: 8,
        leftPct: 10,
        widthPct: 80,
        url: url
    };
    pushUndo();
    state.images.push(img);
    selectedImgId = img.id;
    render();
}

// Image click/delete/drag/resize handlers
document.addEventListener('mousedown', function(e){
    if(VIEW_MODE) return;

    // Delete image
    var delBtn = e.target.closest('[data-imgdel]');
    if(delBtn){
        e.stopPropagation();
        var id = delBtn.dataset.imgdel;
        pushUndo();
        state.images = state.images.filter(function(i){ return i.id !== id; });
        if(selectedImgId === id) selectedImgId = null;
        render();
        return;
    }

    // Resize image
    var rszHandle = e.target.closest('[data-imgrsz]');
    if(rszHandle){
        e.preventDefault();
        e.stopPropagation();
        var id = rszHandle.dataset.imgrsz;
        var img = state.images.find(function(i){ return i.id === id; });
        if(!img) return;
        selectedImgId = id;
        imgDragging = { type:'resize', img:img, startY:e.clientY, origSpan:img.spanSlots };
        render();
        return;
    }

    // Select/drag image
    var imgEl = e.target.closest('.grid-img');
    if(imgEl){
        e.preventDefault();
        e.stopPropagation();
        var id = imgEl.dataset.imgid;
        var img = state.images.find(function(i){ return i.id === id; });
        if(!img) return;
        selectedImgId = id;
        selectedEvtId = null;
        var dayCol = imgEl.closest('.day-col');
        var rect = dayCol.getBoundingClientRect();
        imgDragging = {
            type:'move', img:img, startY:e.clientY, startX:e.clientX,
            origSlot:img.startSlot, origDay:img.dayIndex,
            dayRect:rect
        };
        render();
        return;
    }

    // Click elsewhere deselects image
    if(selectedImgId && !e.target.closest('.toolbar') && !e.target.closest('.edit-pop')){
        selectedImgId = null;
        render();
    }
});

document.addEventListener('mousemove', function(e){
    if(!imgDragging) return;
    e.preventDefault();
    var dy = e.clientY - imgDragging.startY;

    if(imgDragging.type === 'resize'){
        var slotDelta = Math.round(dy / SH);
        var newSpan = Math.max(1, imgDragging.origSpan + slotDelta);
        if(newSpan !== imgDragging.img.spanSlots){
            imgDragging.img.spanSlots = newSpan;
            render();
        }
        return;
    }

    if(imgDragging.type === 'move'){
        var slotDelta = Math.round(dy / SH);
        var ns = (state.config.endHour - state.config.startHour) * 2;
        var newSlot = Math.max(0, Math.min(ns - imgDragging.img.spanSlots, imgDragging.origSlot + slotDelta));
        if(newSlot !== imgDragging.img.startSlot){
            imgDragging.img.startSlot = newSlot;
            render();
        }
        // Check if dragged to different day column
        var dayCols = document.querySelectorAll('.day-col');
        for(var i=0;i<dayCols.length;i++){
            var r = dayCols[i].getBoundingClientRect();
            if(e.clientX >= r.left && e.clientX <= r.right){
                var newDay = parseInt(dayCols[i].dataset.day);
                if(newDay !== imgDragging.img.dayIndex){
                    imgDragging.img.dayIndex = newDay;
                    render();
                }
                break;
            }
        }
    }
});

document.addEventListener('mouseup', function(e){
    if(imgDragging){
        if(imgDragging.type === 'move' || imgDragging.type === 'resize'){
            pushUndo();
        }
        imgDragging = null;
        saveState();
    }
});

// Delete selected image with Delete key
var origKeydown = null;
document.addEventListener('keydown', function(e){
    if(selectedImgId && (e.key === 'Delete' || e.key === 'Backspace')){
        if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        e.preventDefault();
        pushUndo();
        state.images = state.images.filter(function(i){ return i.id !== selectedImgId; });
        selectedImgId = null;
        render();
    }
});

// Initialize
loadState(); render(); renderSwatches();
if(!activeVenueId&&state.venues.length)activeVenueId=state.venues[0].id;
renderSwatches();
if (VIEW_MODE) {
    document.documentElement.classList.add('view-mode');
} else {
    promptUserName();
    checkForUpdates();
    setInterval(checkForUpdates, 60000);
    updateUserStatus();
    sendHeartbeat();
    setInterval(sendHeartbeat, 30000);
}
