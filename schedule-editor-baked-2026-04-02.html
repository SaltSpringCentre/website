<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACYR Schedule</title>
    <script>var VIEW_MODE = location.search.indexOf('view') >= 0;</script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Archivo+Narrow:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --slot-h: 24px;
            --legend-w: 80px;
            --gutter-w: 24px;
            --first-gutter-w: 36px;
            --toolbar-h: 54px;
        }
        html, body {
            font-family: 'Archivo Narrow', Arial, sans-serif;
            background: #e8e8e8;
            overflow: auto;
        }

        /* Toolbar */
        .toolbar {
            position: fixed; top:0; left:0; right:0; height: var(--toolbar-h);
            background: #2c2c2c; color: #fff; display: flex; align-items: center;
            padding: 0 16px; gap: 8px; z-index: 1000; font-size: 0.85rem;
        }
        .tb-group { display:flex; align-items:center; gap:6px; padding:0 10px; border-right:1px solid rgba(255,255,255,0.1); height:100%; }
        .tb-group:last-child { border-right:none; }
        .tb-label { font-size:0.55rem; text-transform:uppercase; letter-spacing:0.06em; opacity:0.4; margin-right:3px; }
        .tb-btn {
            padding:6px 14px; border-radius:4px; border:1px solid rgba(255,255,255,0.12);
            background:rgba(255,255,255,0.05); color:#fff; font-size:0.8rem; cursor:pointer; font-family:inherit;
        }
        .tb-btn:hover { background:rgba(255,255,255,0.12); }
        .tb-btn.primary { background:#17A698; border-color:#17A698; }
        .tb-btn.primary:hover { background:#1fc4b3; }
        .vswatch {
            width:20px; height:20px; border-radius:3px; cursor:pointer;
            border:2px solid transparent; transition: border-color 0.15s;
        }
        .vswatch:hover, .vswatch.active { border-color:#fff; }

        /* VIEW MODE - hide toolbar, disable editing */
        .view-mode .toolbar { display: none !important; }
        .view-mode .sched-wrap { margin-top: 0; }
        .view-mode .ev-x, .view-mode .ev-dup, .view-mode .ev-resize { display: none !important; }
        .view-mode .ev { cursor: default !important; }
        .view-mode .leg-x { display: none !important; }
        .view-mode .name-overlay { display: none !important; }

        /* Schedule container - framed with breathing room */
        .sched-wrap { margin-top: var(--toolbar-h); padding: 20px 20px 60px; }
        .sched { border: 1px solid #aaa; background: #fff; display: flex; flex-direction: column; }

        /* Title banner - slim fit */
        .title-banner {
            background: linear-gradient(135deg, #17A698, #1fc4b3);
            padding: 6px 20px; text-align: center;
        }
        .title-text {
            font-family:'Cinzel',serif; font-weight:700; font-size:1.6rem;
            color:#fff; letter-spacing:3px; text-transform:uppercase;
        }

        /* Bottom bar matching title - tall enough for reception overlap */
        .bottom-bar {
            padding: 16px; text-align: center;
        }

        /* Headers row */
        .headers { display: flex; }
        .hdr {
            display:flex; align-items:center; justify-content:center; text-align:center;
            font-weight:700; font-size:0.75rem; padding:6px 4px; color:#fff;
        }
        .hdr-legend { width: var(--legend-w); background:#333; font-size:0.5rem; text-transform:uppercase; letter-spacing:0.08em; line-height:1.2; }
        .hdr-gutter { width: var(--gutter-w); background:#F4D352; font-size:0.72rem; font-weight:700; color:#5a4a00; }
        .hdr-day { flex:1; background:#17A698; }
        .hdr-gutter.last { background:#F4D352; font-size:0.6rem; }

        /* Grid body: legend + [gutter + day-col] * N + gutter */
        .grid-body { display: flex; }

        /* Venue legend - color fills behind name, white text */
        .legend { width: var(--legend-w); border-right:1px solid #ddd; display:flex; flex-direction:column; }
        .leg-item { display:flex; align-items:center; justify-content:center; text-align:center; padding:4px 8px; font-weight:700; flex:1; color:#fff; text-shadow:0 1px 2px rgba(0,0,0,0.3); border-bottom:1px solid rgba(255,255,255,0.15); position:relative; cursor:grab; }
        .leg-item.active-venue { outline:2px solid #fff; outline-offset:-2px; }
        .leg-item.dragging { opacity:0.4; }
        .leg-item.drag-over { border-bottom:3px solid #fff; }
        .leg-item .leg-x {
            position:absolute; top:2px; right:2px; width:12px; height:12px;
            display:none; align-items:center; justify-content:center;
            font-size:0.45rem; color:rgba(255,255,255,0.7); background:rgba(0,0,0,0.3);
            border-radius:50%; cursor:pointer; z-index:4;
        }
        .leg-item:hover .leg-x { display:flex; }
        .leg-item .leg-x:hover { background:rgba(200,0,0,0.7); color:#fff; }

        /* Time gutter - ALL gutters use the same yellow from the PDF */
        .gutter {
            width: var(--gutter-w); background: #F4D352; display:flex; flex-direction:column;
            border-left:1px solid #e0c040; border-right:1px solid #e0c040;
            overflow: visible; position: relative; z-index: 3;
        }
        .gut-slot {
            height: var(--slot-h); display:flex; align-items:center; justify-content:center;
            font-size:0.72rem; font-weight:700;
            border-bottom: 1px solid rgba(0,0,0,0.06);
            overflow: visible; position: relative; z-index: 1;
        }
        .gut-slot.hour { border-bottom-color: rgba(0,0,0,0.12); }

        /* Day column - row stripes matching PDF mint/cyan */
        .day-col {
            flex:1; position:relative;
            min-height: calc(var(--slot-h) * 34);
            background: repeating-linear-gradient(
                to bottom,
                #e6f5f0 0px, #e6f5f0 calc(var(--slot-h)*2),
                #f0faf7 calc(var(--slot-h)*2), #f0faf7 calc(var(--slot-h)*4)
            );
        }
        .sline { position:absolute; left:0; right:0; height:1px; background:#e8e8e8; pointer-events:none; }
        .sline.hour { background:#ccc; }

        /* Events - no rounded corners, no gaps */
        .ev {
            position:absolute; border-radius:0; padding:0 3px;
            overflow:hidden; cursor:pointer; font-size:0.58rem; line-height:1.15;
            display:flex; flex-direction:column; justify-content:center; align-items:center;
            text-align:center; border:none; z-index:2;
            box-sizing:border-box;
        }
        .ev .ev-x {
            position:absolute; top:1px; right:1px; width:14px; height:14px;
            display:none; align-items:center; justify-content:center;
            font-size:0.5rem; color:rgba(255,255,255,0.7); background:rgba(0,0,0,0.35);
            border-radius:50%; cursor:pointer; line-height:1; z-index:4;
        }
        .ev:hover .ev-x, .ev:hover .ev-dup { display:flex; }
        .ev .ev-x:hover { background:rgba(200,0,0,0.7); color:#fff; }
        .ev .ev-dup {
            position:absolute; top:16px; right:1px; width:14px; height:14px;
            display:none; align-items:center; justify-content:center;
            font-size:0.6rem; color:rgba(255,255,255,0.7); background:rgba(0,0,0,0.35);
            border-radius:50%; cursor:pointer; line-height:1; z-index:4;
        }
        .ev .ev-dup:hover { background:rgba(0,100,0,0.7); color:#fff; }
        /* Spanning label that covers multiple color columns */
        .ev-span-label {
            position:absolute; z-index:3; pointer-events:none;
            display:flex; align-items:center; justify-content:center; text-align:center;
            font-size:0.58rem; line-height:1.15; font-weight:700;
            color:#fff; text-shadow:0 1px 1px rgba(0,0,0,0.25);
        }
        .ev:hover { filter:brightness(1.08); }
        .ev.selected { outline:2px solid #fff; outline-offset:-2px; z-index:5; }

        /* Grid images */
        .grid-img {
            position:absolute; z-index:2; overflow:hidden; cursor:pointer;
            display:flex; align-items:center; justify-content:center;
            border:2px solid transparent; box-sizing:border-box;
        }
        .grid-img img { width:100%; height:100%; object-fit:contain; pointer-events:none; }
        .grid-img:hover { border-color:rgba(255,255,255,0.6); }
        .grid-img.selected { border-color:#fff; outline:1px dashed rgba(0,0,0,0.5); z-index:5; }
        .grid-img .img-x {
            position:absolute; top:2px; right:2px; width:16px; height:16px;
            display:none; align-items:center; justify-content:center;
            font-size:0.55rem; color:#fff; background:rgba(200,0,0,0.7);
            border-radius:50%; cursor:pointer; z-index:4;
        }
        .grid-img:hover .img-x { display:flex; }
        .grid-img .img-resize {
            position:absolute; bottom:0; left:0; right:0; height:8px;
            cursor:ns-resize; background:transparent;
        }
        .grid-img:hover .img-resize { background:rgba(255,255,255,0.25); }
        .view-mode .grid-img .img-x, .view-mode .grid-img .img-resize { display:none !important; }
        .view-mode .grid-img { cursor:default !important; border-color:transparent !important; }
        .ev .ev-resize { position:absolute; bottom:0; left:0; right:0; height:6px; cursor:ns-resize; }
        .ev .ev-resize:hover { background:rgba(255,255,255,0.3); }

        /* Edit popover */
        .edit-pop {
            position:fixed; z-index:2000; background:#2c2c2c; color:#fff;
            padding:12px; border-radius:6px; box-shadow:0 8px 30px rgba(0,0,0,0.5);
            font-size:0.65rem; width:220px; display:none;
        }
        .edit-pop.show { display:block; }
        .ep-drag-handle { cursor:grab; padding:2px 0 8px; margin:-4px -4px 8px; text-align:center; border-bottom:1px solid #444; }
        .ep-drag-handle:active { cursor:grabbing; }
        .ep-drag-grip { width:30px; height:4px; background:rgba(255,255,255,0.15); border-radius:2px; display:inline-block; }
        .edit-pop label { display:block; margin-bottom:3px; font-size:0.55rem; opacity:0.5; text-transform:uppercase; letter-spacing:0.05em; }
        .edit-pop input[type=text], .edit-pop textarea {
            width:100%; background:#444; color:#fff; border:1px solid #555;
            padding:4px 6px; border-radius:3px; font-family:inherit; font-size:0.65rem; margin-bottom:8px;
        }
        .edit-pop textarea { height:40px; resize:vertical; }
        .edit-pop select {
            width:100%; background:#444; color:#fff; border:1px solid #555;
            padding:4px 6px; border-radius:3px; font-family:inherit; font-size:0.65rem; margin-bottom:8px;
        }
        .edit-pop .ep-row { display:flex; gap:6px; align-items:center; margin-bottom:8px; }
        .edit-pop .ep-btn {
            padding:4px 10px; border-radius:3px; border:1px solid #555;
            background:#444; color:#fff; font-size:0.6rem; cursor:pointer; font-family:inherit;
        }
        .edit-pop .ep-btn:hover { background:#555; }
        .edit-pop .ep-btn.del { color:#f66; border-color:#f66; }
        .edit-pop .ep-btn.del:hover { background:#f66; color:#fff; }

        .venue-pick {
            width:28px; height:28px; border-radius:4px; cursor:pointer;
            border:2px solid transparent; transition:border-color 0.1s;
            display:flex; align-items:center; justify-content:center;
            font-size:0.45rem; color:#fff; text-shadow:0 1px 1px rgba(0,0,0,0.3);
            overflow:hidden; line-height:1;
        }
        .venue-pick:hover { border-color:rgba(255,255,255,0.5); }
        .venue-pick.selected { border-color:#fff; }

        /* Drag ghost */
        .drag-ghost {
            position:fixed; pointer-events:none; z-index:3000;
            border:2px dashed rgba(255,255,255,0.5); border-radius:0; opacity:0.6;
        }
        .ev-t { font-weight:700; }
        .ev-s { font-size:0.5rem; opacity:0.75; }
        .ev.lt .ev-t, .ev.lt .ev-s { color:#fff; text-shadow:0 1px 1px rgba(0,0,0,0.2); }
        .ev.dk .ev-t, .ev.dk .ev-s { color:#333; text-shadow:none; }

        /* Reception - narrow inset white box with outlined circle */
        .rec-block {
            position:absolute; z-index:2;
            display:flex; align-items:center; gap:4px; padding:2px 5px;
            background:#fff; border:1px solid #bbb;
            left:25%; right:25%;
        }
        .rec-circle {
            width:18px; height:18px; border-radius:50%;
            border:2px solid #7B2D5F;
            display:flex; align-items:center; justify-content:center;
            font-size:0.5rem; font-weight:700; color:#7B2D5F; flex-shrink:0;
            background:#fff;
        }
        .rec-text {
            font-weight:700; font-size:0.52rem; color:#333; line-height:1.2;
            flex:1; text-align:center;
        }

        /* Status - inline in toolbar */
        .status-inline { color:rgba(255,255,255,0.35); font-size:0.75rem; }

        /* Sync banner */
        .sync-banner {
            position:fixed; top:var(--toolbar-h); left:0; right:0; z-index:999;
            background:#F9B233; color:#333; padding:12px 20px; font-size:1rem; font-weight:600;
            display:none; align-items:center; gap:12px; justify-content:center;
        }
        .sync-banner.show { display:flex; }
        .sync-banner button {
            padding:6px 16px; border-radius:4px; border:1px solid #333;
            background:#fff; color:#333; font-size:0.9rem; cursor:pointer; font-family:inherit; font-weight:600;
        }
        .sync-banner button:hover { background:#333; color:#fff; }
        .sync-banner .dismiss { background:none; border:none; color:#666; cursor:pointer; font-size:1.2rem; padding:0 6px; }

        /* Active user dot */
        .user-dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:3px; }
        .user-dot.green { background:#4caf50; }
        .user-dot.amber { background:#F9B233; }

        /* Name prompt overlay */
        .name-overlay {
            position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:5000;
            display:flex; align-items:center; justify-content:center;
        }
        .name-box {
            background:#2c2c2c; color:#fff; padding:24px; border-radius:8px;
            box-shadow:0 8px 30px rgba(0,0,0,0.5); font-family:inherit; text-align:center;
            max-width:300px; width:90%;
        }
        .name-box h3 { margin-bottom:12px; font-size:0.9rem; }
        .name-box input {
            width:100%; background:#444; color:#fff; border:1px solid #555;
            padding:8px 10px; border-radius:4px; font-size:0.8rem; font-family:inherit;
            margin-bottom:12px; text-align:center;
        }
        .name-box button {
            padding:6px 20px; border-radius:4px; border:none;
            background:#17A698; color:#fff; font-size:0.75rem; cursor:pointer; font-family:inherit;
        }
        .name-box button:hover { background:#1fc4b3; }
    </style>
</head>
<body>
<div class="toolbar">
    <div class="tb-group">
        <button class="tb-btn" onclick="undo()">Undo</button>
        <button class="tb-btn" onclick="exportJSON()">Save JSON</button>
        <button class="tb-btn" onclick="document.getElementById('impF').click()">Load JSON</button>
        <input type="file" id="impF" accept=".json" style="display:none" onchange="importJSON(event)">
        <button class="tb-btn" onclick="resetToDefault()" style="color:#f88">Reset</button>
    </div>
    <div class="tb-group">
        <button class="tb-btn primary" onclick="exportPDF()">Export PDF</button>
    </div>
    <div class="tb-group">
        <button class="tb-btn primary" onclick="publishSchedule()" id="publishBtn">Publish</button>
        <button class="tb-btn" onclick="getLatest()">Get Latest</button>
    </div>
    <div class="tb-group">
        <button class="tb-btn" onclick="addImagePrompt()">Add Image</button>
        <input type="file" id="imgUpload" accept="image/*" style="display:none" onchange="handleImageUpload(event)">
        <button class="tb-btn" onclick="toggleSettings()">Settings</button>
        <button class="tb-btn" onclick="showHelp()">Help</button>
    </div>
    <div class="tb-group" style="margin-left:auto">
        <span id="userStatus" style="display:flex;align-items:center;gap:2px"></span>
        <span class="status-inline" id="stxt">Ready</span>
        <span class="status-inline" id="ecnt"></span>
    </div>
</div>

<div class="sync-banner" id="syncBanner">
    <span id="syncMsg">A newer version is available.</span>
    <button onclick="loadPublished()">Load Latest</button>
    <span class="dismiss" onclick="dismissSync()">&times;</span>
</div>

<!-- Settings panel -->
<div id="settingsPanel" style="display:none;position:fixed;top:var(--toolbar-h);right:20px;width:260px;max-height:calc(100vh - var(--toolbar-h) - 40px);overflow-y:auto;background:#333;color:#fff;padding:14px;z-index:999;font-size:0.65rem;border:1px solid #555;border-top:none;border-radius:0 0 6px 6px;box-shadow:0 4px 20px rgba(0,0,0,0.3)">
    <div style="font-weight:700;font-size:0.75rem;margin-bottom:12px;border-bottom:1px solid #444;padding-bottom:8px">Color Settings</div>
    <div id="colorSettings"></div>
</div>

<div class="edit-pop" id="editPop">
    <div class="ep-drag-handle" id="epDragHandle"><div class="ep-drag-grip"></div></div>
    <div id="epEventFields">
        <label>Title</label>
        <input type="text" id="epTitle">
        <label>Subtitle</label>
        <input type="text" id="epSub">
        <label>Venue</label>
        <div id="epVenueGrid" style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px"></div>
        <label>Duration</label>
        <div class="ep-row">
            <button class="ep-btn" onclick="epDur(-1)">-</button>
            <span id="epDurVal" style="min-width:50px;text-align:center">2</span>
            <button class="ep-btn" onclick="epDur(1)">+</button>
        </div>
    </div>
    <div id="epRecFields" style="display:none">
        <label>Reception Hours</label>
        <textarea id="epRecText" style="height:50px"></textarea>
    </div>
    <div class="ep-row" style="margin-top:8px">
        <button class="ep-btn" onclick="epSave()">Done</button>
        <button class="ep-btn del" id="epDelBtn" onclick="epDelete()">Delete</button>
    </div>
</div>
<div class="sched-wrap">
    <div class="sched" id="sched"></div>
</div>

// Normalize hex: expand 3-digit to 6-digit, ensure # prefix
function normHex(v){
    v=v.trim();
    if(v.charAt(0)!=='#') v='#'+v;
    if(/^#[0-9a-fA-F]{3}$/.test(v)) v='#'+v[1]+v[1]+v[2]+v[2]+v[3]+v[3];
    return v.toLowerCase();
}

function brightness(hex){ var r=parseInt(hex.substr(1,2),16),g=parseInt(hex.substr(3,2),16),b=parseInt(hex.substr(5,2),16); return (r*299+g*587+b*114)/1000; }

// Parse "Aug 1" or "Aug 1 2026" or "August 1" into a Date object
function parseDayDate(str, fallbackYear) {
    var months = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11,
        january:0,february:1,march:2,april:3,june:5,july:6,august:7,september:8,october:9,november:10,december:11};
    var parts = str.trim().replace(/,/g,'').split(/\s+/);
    if (parts.length < 2) return null;
    var m = months[parts[0].toLowerCase()];
    if (m === undefined) return null;
    var d = parseInt(parts[1]);
    if (isNaN(d)) return null;
    var y = parts[2] ? parseInt(parts[2]) : (fallbackYear || new Date().getFullYear());
    return new Date(y, m, d);
}

// Auto-assign columns for overlapping events in a day
// Each event gets only the columns needed for ITS direct overlaps, not transitive chains
function assignColumns(dayEvents){
    if(!dayEvents.length) return [];
    var evts = dayEvents.map(function(e){ return {evt:e, col:0, totalCols:1}; });
    // Sort by colOrder (user-adjustable), then startSlot, then id
    evts.sort(function(a,b){ return (a.evt.colOrder||0) - (b.evt.colOrder||0) || a.evt.startSlot - b.evt.startSlot || (a.evt.id < b.evt.id ? -1 : 1); });

    // Greedy column assignment: for each event, find the first column not taken by a direct overlap
    evts.forEach(function(item, i){
        var e = item.evt;
        var eEnd = e.startSlot + e.spanSlots;
        var c = 0;
        while(true){
            var conflict = false;
            for(var j=0;j<i;j++){
                if(evts[j].col !== c) continue;
                var o = evts[j].evt;
                if(e.startSlot < o.startSlot+o.spanSlots && o.startSlot < eEnd){ conflict=true; break; }
            }
            if(!conflict) break;
            c++;
        }
        item.col = c;
    });

    // Each event keeps its max concurrency as totalCols for consistent width.
    // Events use their global col. The LAST event in each overlap group
    // stretches to fill remaining space (width extends to 100%).
    evts.forEach(function(item){
        var e = item.evt;
        var eEnd = e.startSlot + e.spanSlots;
        var maxConcurrent = 1;
        for (var s = e.startSlot; s < eEnd; s++) {
            var count = 0;
            evts.forEach(function(other){
                var o = other.evt;
                if (s >= o.startSlot && s < o.startSlot + o.spanSlots) count++;
            });
            if (count > maxConcurrent) maxConcurrent = count;
        }
        item.totalCols = maxConcurrent;
    });

    // Calculate leftPct and widthPct for each event.
    // Each event stretches right until it hits another event's left edge.
    // Uses the neighbor's own totalCols grid to find its left edge %.
    evts.forEach(function(item){
        var e = item.evt;
        var eEnd = e.startSlot + e.spanSlots;
        var tc = item.totalCols;
        item.leftPct = (item.col / tc) * 100;

        // Find nearest right neighbor across all overlapping slots
        var rightEdge = 100;
        for (var s = e.startSlot; s < eEnd; s++) {
            evts.forEach(function(other){
                if(other === item) return;
                var o = other.evt;
                if(s >= o.startSlot && s < o.startSlot + o.spanSlots && other.col > item.col){
                    var nLeft = (other.col / other.totalCols) * 100;
                    if(nLeft < rightEdge) rightEdge = nLeft;
                }
            });
        }
        item.widthPct = rightEdge - item.leftPct;
    });

    return evts;
}

    // Day columns with gutters between
    for(var d=0;d<nd;d++){
        h+='<div class="day-col" data-day="'+d+'" style="background:repeating-linear-gradient(to bottom,'+sty.rowStripe1+' 0px,'+sty.rowStripe1+' '+(SH*2)+'px,'+sty.rowStripe2+' '+(SH*2)+'px,'+sty.rowStripe2+' '+(SH*4)+'px)">';
        // Grid lines
        for(var s=1;s<ns;s++){
            h+='<div class="sline'+(s%2===0?' hour':'')+'" style="top:'+(s*SH)+'px"></div>';
        }
        // Events for this day - auto-assign columns
        var devs=state.events.filter(function(e){return e.dayIndex===d});
        var laid=assignColumns(devs);

        // Find groups of events with the same title that overlap - they get a spanning label
        var spanGroups = {};
        laid.forEach(function(item){
            var evt=item.evt;
            var normTitle = (evt.title||'').replace(/\s+/g,' ').trim();
            var key = normTitle+'|'+evt.startSlot+'|'+evt.spanSlots;
            item._spanKey = key;
            if(!spanGroups[key]) spanGroups[key]=[];
            spanGroups[key].push(item);
        });

        // Render color blocks - single rect per event, using colSpan for stretch
        laid.forEach(function(item){
            var evt=item.evt, v=state.venues.find(function(x){return x.id===evt.venueId});
            var c=v?v.color:'#999';
            var isSpanned = spanGroups[item._spanKey] && spanGroups[item._spanKey].length > 1;
            var cls=brightness(c)>160?'dk':'lt';
            var tl=(evt.title||'').replace(/\n/g,'<br>');

            var top=evt.startSlot*SH, ht=evt.spanSlots*SH;
            var lp=item.leftPct, wp=item.widthPct;

            var isSel = selectedEvtId===evt.id || selectedEvtIds.indexOf(evt.id)>=0;
            h+='<div class="ev '+cls+(isSel?' selected':'')+'" data-id="'+evt.id+'" style="top:'+top+'px;height:'+ht+'px;left:'+lp+'%;width:'+wp+'%;background:'+c+';font-family:\''+sty.eventFont.fontFamily+'\';font-size:'+sty.eventFont.fontSize+'px;font-weight:'+sty.eventFont.fontWeight+';border-right:1px solid rgba(255,255,255,0.15)">';
            if(!isSpanned){
                h+='<div class="ev-t">'+tl+'</div>';
                if(evt.subtitle)h+='<div class="ev-s">'+evt.subtitle.replace(/\n/g,'<br>')+'</div>';
            }
            h+='<div class="ev-x" data-xid="'+evt.id+'" title="Delete">\u2715</div>';
            h+='<div class="ev-dup" data-dupid="'+evt.id+'" title="Duplicate">+</div>';
            h+='<div class="ev-resize" data-id="'+evt.id+'"></div>';
            h+='</div>';
        });

        // Render spanning labels for same-title groups
        var spanned = {};
        Object.keys(spanGroups).forEach(function(key){
            var group = spanGroups[key];
            if(group.length < 2) return;
            if(spanned[key]) return;
            spanned[key] = true;
            var minCol=Infinity, maxCol=0, totalCols=group[0].totalCols;
            group.forEach(function(item){ if(item.col<minCol)minCol=item.col; if(item.col>maxCol)maxCol=item.col; });
            var evt=group[0].evt;
            var top=evt.startSlot*SH, ht=evt.spanSlots*SH;
            var lp=(minCol/totalCols)*100, wp=((maxCol-minCol+1)/totalCols)*100;
            var tl=(evt.title||'').replace(/\n/g,'<br>');
            h+='<div class="ev-span-label" style="top:'+top+'px;height:'+ht+'px;left:'+lp+'%;width:'+wp+'%;font-family:\''+sty.eventFont.fontFamily+'\';font-size:'+sty.eventFont.fontSize+'px;font-weight:'+sty.eventFont.fontWeight+'">';
            h+='<div class="ev-t">'+tl+'</div>';
            h+='</div>';
        });

        // Images for this day
        if(state.images){
            state.images.filter(function(img){return img.dayIndex===d}).forEach(function(img){
                var top=img.startSlot*SH, ht=img.spanSlots*SH;
                var lp=img.leftPct||0, wp=img.widthPct||100;
                var isSel = selectedImgId===img.id;
                h+='<div class="grid-img'+(isSel?' selected':'')+'" data-imgid="'+img.id+'" style="top:'+top+'px;height:'+ht+'px;left:'+lp+'%;width:'+wp+'%">';
                h+='<img src="'+img.url+'" alt="">';
                h+='<div class="img-x" data-imgdel="'+img.id+'">\u2715</div>';
                h+='<div class="img-resize" data-imgrsz="'+img.id+'"></div>';
                h+='</div>';
            });
        }

        // Reception block at the bottom of each day column
        var rec=cfg.reception.find(function(r){return r.dayIndex===d});
        if(rec){
            var recTop = (ns - 1) * SH; // start at last slot, overlap into bottom bar
            var recH = SH * 2; // extends below the grid into bottom bar
            h+='<div class="rec-block" data-recday="'+d+'" style="top:'+recTop+'px;height:'+recH+'px;cursor:pointer">';
            h+='<div class="rec-circle">R</div>';
            h+='<div class="rec-text" style="font-family:\''+sty.receptionFont.fontFamily+'\';font-size:'+sty.receptionFont.fontSize+'px;font-weight:'+sty.receptionFont.fontWeight+'">Reception<br>'+rec.text.replace(/\n/g,', ')+'</div>';
            h+='</div>';
        }

        h+='</div>';

        // Gutter after day (between days or final)
        if(d<nd-1){
            h+='<div class="gutter" style="background:'+sty.gutterColor+'">';
            for(var s=0;s<ns;s++){
                var hr=cfg.startHour+Math.floor(s/2), mn=(s%2)*30, isH=mn===0;
                var lb='';
                if(isH){var sf=hr<12?'':'';if(hr===12)lb='12';else if(hr<12)lb=''+hr;else lb=''+(hr-12);}else lb='30';
                h+='<div class="gut-slot'+(isH?' hour':'')+'" style="color:'+sty.gutterText+';font-family:\''+sty.gutterFont.fontFamily+'\';font-size:'+(isH?sty.gutterFont.fontSize:sty.gutterFont.fontSize-2)+'px;font-weight:'+(isH?sty.gutterFont.fontWeight:400)+'">'+lb+'</div>';
            }
            h+='</div>';
        }
    }

    // Final gutter (right time)
    h+='<div class="gutter" style="background:'+sty.gutterColor+'">';
    for(var s=0;s<ns;s++){
        var hr=cfg.startHour+Math.floor(s/2), mn=(s%2)*30, isH=mn===0;
        var lb='';
        if(isH){var sf=hr<12?'a':'p';if(hr===12)lb='12p';else if(hr<12)lb=hr+sf;else lb=(hr-12)+sf;}else lb='30';
        h+='<div class="gut-slot'+(isH?' hour':'')+'" style="color:'+sty.gutterText+';font-family:\''+sty.gutterFont.fontFamily+'\';font-size:'+(isH?sty.gutterFont.fontSize:sty.gutterFont.fontSize-2)+'px;font-weight:'+(isH?sty.gutterFont.fontWeight:400)+'">'+lb+'</div>';
    }
    h+='</div>';

    h+='</div>'; // end grid-body

    // Bottom bar matching title
    h+='<div class="bottom-bar" style="background:'+sty.titleBg+'">&nbsp;</div>';

    el.innerHTML=h;
    saveState();
}

function renderSwatches(){
    var c=document.getElementById('vswatches'); if(!c) return; c.innerHTML='';
    state.venues.forEach(function(v){
        var s=document.createElement('div'); s.className='vswatch'+(activeVenueId===v.id?' active':'');
        s.style.background=v.color; s.title=v.name;
        s.addEventListener('click',function(){activeVenueId=v.id;renderSwatches();});
        c.appendChild(s);
    });
}

function exportJSON(){
    var b=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
    var a=document.createElement('a'); a.href=URL.createObjectURL(b);
    a.download='acyr-schedule-'+state.config.year+'.json'; a.click();
}

function importJSON(e){
    var f=e.target.files[0]; if(!f)return;
    var r=new FileReader();
    r.onload=function(ev){try{var d=JSON.parse(ev.target.result);if(d.config&&d.venues&&d.events){state=d;render();renderSwatches();}}catch(er){alert('Invalid JSON');}};
    r.readAsText(f); e.target.value='';
}

// Set font from state style, falling back to helvetica if not embedded
function pdfFont(doc, family, weight){
    var w = (weight >= 700) ? 'bold' : 'normal';
    if(PDF_FONTS[family]){ doc.setFont(family, w); }
    else { doc.setFont('helvetica', w); }
}


function hexRGB(hex){
    hex=normHex(hex);
    return [parseInt(hex.substr(1,2),16),parseInt(hex.substr(3,2),16),parseInt(hex.substr(5,2),16)];
}

function exportPDF(){
    var schedEl = document.getElementById('sched');
    var schedRect = schedEl.getBoundingClientRect();
    var screenW = schedRect.width, screenH = schedRect.height;
    var W = 2592, H = Math.round(W * screenH / screenW);
    var jsPDF = window.jspdf.jsPDF;
    var doc = new jsPDF({orientation:'landscape', unit:'pt', format:[W, H]});
    var SC = W / screenW;
    var cfg = state.config, sty = state.styles, nd = cfg.days.length, ns = (cfg.endHour - cfg.startHour) * 2;

    // Measure from DOM - no guessing
    var rootStyle = getComputedStyle(document.documentElement);
    var slotH = parseInt(rootStyle.getPropertyValue('--slot-h')) * SC;
    var legW = parseInt(rootStyle.getPropertyValue('--legend-w')) * SC;
    var gutW = parseInt(rootStyle.getPropertyValue('--gutter-w')) * SC;
    var firstGutW = parseInt(rootStyle.getPropertyValue('--first-gutter-w')) * SC;
    var titleH = schedEl.querySelector('.title-banner').getBoundingClientRect().height * SC;
    var hdrH = schedEl.querySelector('.headers').getBoundingClientRect().height * SC;
    var gridH = schedEl.querySelector('.grid-body').getBoundingClientRect().height * SC;
    var bottomH = schedEl.querySelector('.bottom-bar').getBoundingClientRect().height * SC;
    var dayW = schedEl.querySelector('.day-col').getBoundingClientRect().width * SC;

    registerPDFFonts(doc);

    function fill(hex){ var c=hexRGB(hex); doc.setFillColor(c[0],c[1],c[2]); }
    function txtC(hex){ var c=hexRGB(hex); doc.setTextColor(c[0],c[1],c[2]); }
    function drawC(hex){ var c=hexRGB(hex); doc.setDrawColor(c[0],c[1],c[2]); }

    // ==== TITLE BANNER ====
    // render() l514: background:sty.titleBg, font-family:sty.title.fontFamily, font-size:sty.title.fontSize, color:sty.title.color, font-weight:700 (CSS)
    fill(sty.titleBg); doc.rect(0, 0, W, titleH, 'F');
    txtC(sty.title.color);
    pdfFont(doc, sty.title.fontFamily, sty.title.fontWeight); doc.setFontSize(sty.title.fontSize * SC);
    doc.text(cfg.title, W/2, titleH/2 + sty.title.fontSize*SC*0.35, {align:'center'});

    // ==== HEADER ROW ====
    var hy = titleH;

    // Legend header: l518: background:sty.legendHeader.bgColor, color:sty.legendHeader.textColor
    // CSS .hdr-legend: font-size:0.5rem(8px), text-transform:uppercase, letter-spacing:0.08em, line-height:1.2, font-weight:700(.hdr)
    fill(sty.legendHeader.bgColor); doc.rect(0, hy, legW, hdrH, 'F');
    txtC(sty.legendHeader.textColor);
    doc.setFont('helvetica','bold'); doc.setFontSize(8*SC);
    doc.text('Colour\nLegend', legW/2, hy+hdrH/2, {align:'center'});

    // First gutter header: l519: background:sty.gutterColor, color:sty.gutterText
    // CSS .hdr-gutter: font-size:0.72rem(11.5px), font-weight:700, color:sty.gutterText
    fill(sty.gutterColor); doc.rect(legW, hy, firstGutW, hdrH, 'F');
    txtC(sty.gutterText);
    pdfFont(doc, sty.gutterFont.fontFamily, sty.gutterFont.fontWeight); doc.setFontSize(11.5*SC);
    doc.text('TIME', legW+firstGutW/2, hy+hdrH/2+4*SC, {align:'center'});

    // Day headers: l521: background:sty.dayHeaders.bgColor, color:sty.dayHeaders.textColor,
    //   font-family:sty.dayHeaders.fontFamily, font-size:sty.dayHeaders.fontSize, font-weight:sty.dayHeaders.fontWeight
    for(var d=0;d<nd;d++){
        var dx = legW + firstGutW + d*(dayW+gutW);
        fill(sty.dayHeaders.bgColor); doc.rect(dx, hy, dayW, hdrH, 'F');
        txtC(sty.dayHeaders.textColor);
        pdfFont(doc, sty.dayHeaders.fontFamily, sty.dayHeaders.fontWeight); doc.setFontSize(sty.dayHeaders.fontSize * SC);
        doc.text(cfg.days[d].label+' '+cfg.days[d].date, dx+dayW/2, hy+hdrH/2+sty.dayHeaders.fontSize*SC*0.35, {align:'center'});
        // Inter-day gutter header: l522: background:sty.gutterColor, color:sty.gutterText
        if(d<nd-1){ fill(sty.gutterColor); doc.rect(dx+dayW, hy, gutW, hdrH, 'F'); }
    }
    // Right gutter header: l524: background:sty.gutterColor
    fill(sty.gutterColor); doc.rect(W-gutW, hy, gutW, hdrH, 'F');

    var gy = titleH + hdrH;

    // ==== VENUE LEGEND ====
    // l532: background:v.color, font-family:sty.legendFont.fontFamily, font-size:sty.legendFont.fontSize, font-weight:sty.legendFont.fontWeight
    // CSS .leg-item: color:#fff, text-shadow:0 1px 2px rgba(0,0,0,0.3), border-bottom:1px solid rgba(255,255,255,0.15)
    var lih = gridH / state.venues.length;
    var legFS = sty.legendFont.fontSize * SC;
    state.venues.forEach(function(v,i){
        var ly = gy + i*lih;
        fill(v.color); doc.rect(0, ly, legW, lih, 'F');
        if(i>0){ doc.setDrawColor(255,255,255); doc.setLineWidth(SC); doc.line(0, ly, legW, ly); }
        doc.setTextColor(255,255,255); // CSS: always white, text-shadow for readability
        pdfFont(doc, sty.legendFont.fontFamily, sty.legendFont.fontWeight); doc.setFontSize(legFS);
        var words = v.name.split(' ');
        var lineH = legFS * 1.3;
        if(v.name.length > 10 && words.length > 1){
            var mid = Math.ceil(words.length/2);
            var l1 = words.slice(0,mid).join(' '), l2 = words.slice(mid).join(' ');
            doc.text(l1, legW/2, ly+lih/2-lineH*0.3, {align:'center'});
            doc.text(l2, legW/2, ly+lih/2+lineH*0.7, {align:'center'});
        } else {
            doc.text(v.name, legW/2, ly+lih/2+legFS*0.35, {align:'center'});
        }
    });

    // ==== TIME GUTTER HELPER ====
    // l541: color:sty.gutterText, font-family:sty.gutterFont.fontFamily
    //   hour: font-size:sty.gutterFont.fontSize, font-weight:sty.gutterFont.fontWeight
    //   half: font-size:(sty.gutterFont.fontSize-2), font-weight:400
    // CSS .gutter: border-left/right:1px solid #e0c040
    // CSS .gut-slot: border-bottom:1px solid rgba(0,0,0,0.06), .hour: rgba(0,0,0,0.12)
    var gutFSh = sty.gutterFont.fontSize * SC;
    var gutFSm = (sty.gutterFont.fontSize - 2) * SC;

    function drawGutter(gx, gw, labelFn){
        fill(sty.gutterColor); doc.rect(gx, gy, gw, gridH, 'F');
        drawC('#e0c040'); doc.setLineWidth(SC);
        doc.line(gx, gy, gx, gy+gridH);
        doc.line(gx+gw, gy, gx+gw, gy+gridH);
        for(var s=0;s<ns;s++){
            var hr=cfg.startHour+Math.floor(s/2), mn=(s%2)*30, isH=mn===0;
            var lb = labelFn(hr, mn, isH);
            txtC(sty.gutterText);
            pdfFont(doc, sty.gutterFont.fontFamily, isH ? sty.gutterFont.fontWeight : 400);
            doc.setFontSize(isH ? gutFSh : gutFSm);
            doc.text(lb, gx+gw/2, gy+s*slotH+slotH/2+(isH?gutFSh:gutFSm)*0.35, {align:'center'});
            if(s>0){
                doc.setDrawColor(isH?220:235, isH?220:235, isH?220:235);
                doc.setLineWidth(isH ? 0.5*SC : 0.25*SC);
                doc.line(gx, gy+s*slotH, gx+gw, gy+s*slotH);
            }
        }
    }

    // First gutter: l540 label format
    drawGutter(legW, firstGutW, function(hr,mn,isH){
        if(isH){if(hr===12)return'NOON';if(hr<12)return hr+':00';return(hr-12)+':00';}return':30';
    });

    // ==== DAY COLUMNS ====
    var s1=hexRGB(sty.rowStripe1), s2=hexRGB(sty.rowStripe2);
    // l579: font-family:sty.eventFont.fontFamily, font-size:sty.eventFont.fontSize, font-weight:sty.eventFont.fontWeight
    // CSS .ev: line-height:1.15, .ev-t: font-weight:700, .ev-s: font-size:0.5rem(8px) opacity:0.75
    var evFS = sty.eventFont.fontSize * SC;
    var evLH = evFS * 1.15;
    var evSubFS = 8 * SC; // CSS .ev-s font-size:0.5rem

    // Collect all reception blocks to draw AFTER bottom bar (layering: reception on top)
    var receptionBlocks = [];

    for(var d=0;d<nd;d++){
        var dx = legW + firstGutW + d*(dayW+gutW);

        // Row stripes: l547
        for(var s=0;s<ns;s++){
            var sc = Math.floor(s/2)%2===0 ? s1 : s2;
            doc.setFillColor(sc[0],sc[1],sc[2]); doc.rect(dx, gy+s*slotH, dayW, slotH, 'F');
        }
        // Grid lines: CSS .sline: #e8e8e8, .sline.hour: sty.gridLines (#ccc)
        for(var s=1;s<ns;s++){
            var isH = s%2===0;
            if(isH){ drawC(sty.gridLines); } else { drawC('#e8e8e8'); }
            doc.setLineWidth(isH ? 0.5*SC : 0.25*SC);
            doc.line(dx, gy+s*slotH, dx+dayW, gy+s*slotH);
        }

        // Events
        var pdfDevs = state.events.filter(function(e){return e.dayIndex===d});
        var pdfLaid = assignColumns(pdfDevs);

        var spanGroups = {};
        pdfLaid.forEach(function(item){
            var evt=item.evt;
            var normTitle = (evt.title||'').replace(/\s+/g,' ').trim();
            var key = normTitle+'|'+evt.startSlot+'|'+evt.spanSlots;
            item._spanKey = key;
            if(!spanGroups[key]) spanGroups[key]=[];
            spanGroups[key].push(item);
        });

        // Event color blocks: l568-587
        pdfLaid.forEach(function(item){
            var evt=item.evt;
            var v=state.venues.find(function(x){return x.id===evt.venueId}); if(!v)return;
            var ex = dx + (item.leftPct/100)*dayW;
            var ew = (item.widthPct/100)*dayW;
            var ey = gy + evt.startSlot*slotH;
            var eh = evt.spanSlots*slotH;

            fill(v.color); doc.rect(ex, ey, ew, eh, 'F');
            // l579: border-right:1px solid rgba(255,255,255,0.15)
            doc.setDrawColor(255,255,255); doc.setLineWidth(SC);
            doc.line(ex+ew, ey, ex+ew, ey+eh);

            var isSpanned = spanGroups[item._spanKey] && spanGroups[item._spanKey].length > 1;
            if(!isSpanned){
                if(brightness(v.color)>160) doc.setTextColor(51,51,51); else doc.setTextColor(255,255,255);
                pdfFont(doc, sty.eventFont.fontFamily, sty.eventFont.fontWeight); doc.setFontSize(evFS);
                // Split on explicit \n, then wrap each line to fit block width
                var rawLines = (evt.title||'').split('\n');
                var lines = [];
                rawLines.forEach(function(rl){ lines = lines.concat(doc.splitTextToSize(rl, ew - 4*SC)); });
                // Subtitle
                var subLines = [];
                if(evt.subtitle){
                    doc.setFontSize(evSubFS);
                    evt.subtitle.split('\n').forEach(function(rl){ subLines = subLines.concat(doc.splitTextToSize(rl, ew - 4*SC)); });
                    doc.setFontSize(evFS);
                }
                var totalTextH = lines.length * evLH + subLines.length * (evSubFS*1.15);
                var ty = ey + (eh - totalTextH)/2 + evFS*0.85;
                lines.forEach(function(l,li){ doc.text(l, ex+ew/2, ty+li*evLH, {align:'center'}); });
                if(subLines.length){
                    doc.setFontSize(evSubFS);
                    var sty2 = ty + lines.length * evLH;
                    subLines.forEach(function(l,li){ doc.text(l, ex+ew/2, sty2+li*(evSubFS*1.15), {align:'center'}); });
                }
            }
        });

        // Spanning labels: l590-606
        var spanned = {};
        Object.keys(spanGroups).forEach(function(key){
            var group = spanGroups[key];
            if(group.length < 2 || spanned[key]) return;
            spanned[key] = true;
            var minCol=Infinity, maxCol=0, totalCols=group[0].totalCols;
            group.forEach(function(item){ if(item.col<minCol)minCol=item.col; if(item.col>maxCol)maxCol=item.col; });
            var lp = (minCol/totalCols)*100, wp = ((maxCol-minCol+1)/totalCols)*100;
            var spanLeft = dx + (lp/100)*dayW;
            var spanW = (wp/100)*dayW;
            var evt=group[0].evt;
            var ey = gy + evt.startSlot*slotH, eh = evt.spanSlots*slotH;
            var v=state.venues.find(function(x){return x.id===evt.venueId});
            if(v && brightness(v.color)>160) doc.setTextColor(51,51,51); else doc.setTextColor(255,255,255);
            pdfFont(doc, sty.eventFont.fontFamily, sty.eventFont.fontWeight); doc.setFontSize(evFS);
            var rawLines = (evt.title||'').split('\n');
            var lines = [];
            rawLines.forEach(function(rl){ lines = lines.concat(doc.splitTextToSize(rl, spanW - 4*SC)); });
            var totalTextH = lines.length * evLH;
            var ty = ey + (eh - totalTextH)/2 + evFS*0.85;
            lines.forEach(function(l,li){ doc.text(l, spanLeft+spanW/2, ty+li*evLH, {align:'center'}); });
        });

        // Collect reception for later (needs to draw on top of bottom bar)
        // l608-617: top=(ns-1)*SH, height=SH*2, CSS left:25% right:25%
        var rec=cfg.reception.find(function(r){return r.dayIndex===d});
        if(rec) receptionBlocks.push({dx:dx, rec:rec});

        // Inter-day gutter: l622-631
        if(d<nd-1){
            drawGutter(dx+dayW, gutW, function(hr,mn,isH){
                if(isH){if(hr===12)return'12';if(hr<12)return''+hr;return''+(hr-12);}return'30';
            });
        }
    }

    // Right gutter: l634-641
    drawGutter(W-gutW, gutW, function(hr,mn,isH){
        if(isH){var sf=hr<12?'a':'p';if(hr===12)return'12p';if(hr<12)return hr+sf;return(hr-12)+sf;}return'30';
    });

    // ==== IMAGES ==== (drawn after events, before bottom bar)
    var imgPromises = [];
    if(state.images && state.images.length){
        state.images.forEach(function(img){
            var dx = legW + firstGutW + img.dayIndex*(dayW+gutW);
            var ix = dx + (img.leftPct/100)*dayW;
            var iw = (img.widthPct/100)*dayW;
            var iy = gy + img.startSlot*slotH;
            var ih = img.spanSlots*slotH;
            imgPromises.push({url:img.url, x:ix, y:iy, w:iw, h:ih});
        });
    }

    function finishPDF(){
        // ==== BOTTOM BAR ==== (drawn BEFORE reception so reception layers on top)
        fill(sty.titleBg); doc.rect(0, gy+gridH, W, bottomH, 'F');

        // ==== RECEPTION BLOCKS ==== (drawn LAST = on top of everything)
        var recFS = sty.receptionFont.fontSize * SC;
        receptionBlocks.forEach(function(rb){
            var dx = rb.dx, rec = rb.rec;
            var recTop = gy + (ns-1)*slotH;
            var recHt = slotH*2;
            var rbx = dx + dayW*0.25, rbw = dayW*0.5;

            doc.setFillColor(255,255,255); doc.rect(rbx, recTop, rbw, recHt, 'F');
            doc.setDrawColor(187,187,187); doc.setLineWidth(SC); doc.rect(rbx, recTop, rbw, recHt, 'S');

            var circR = 9*SC;
            var ccx = rbx + circR + 2*SC, ccy = recTop + recHt/2;
            doc.setFillColor(255,255,255); doc.circle(ccx, ccy, circR, 'F');
            drawC('#7B2D5F'); doc.setLineWidth(2*SC); doc.circle(ccx, ccy, circR);
            txtC('#7B2D5F');
            doc.setFont('helvetica','bold'); doc.setFontSize(8*SC);
            doc.text('R', ccx, ccy+8*SC*0.35, {align:'center'});

            doc.setTextColor(51,51,51);
            pdfFont(doc, sty.receptionFont.fontFamily, sty.receptionFont.fontWeight); doc.setFontSize(recFS);
            var recTxt = 'Reception\n' + rec.text.replace(/\n/g,', ').replace(/<br>/g,'\n');
            var rl = recTxt.split('\n');
            var rlH = recFS * 1.2;
            var rty = ccy - ((rl.length-1)*rlH)/2 + recFS*0.35;
            rl.forEach(function(l,i){ doc.text(l, rbx+rbw/2+circR*0.5, rty+i*rlH, {align:'center'}); });
        });

        doc.save('ACYR_Schedule_'+cfg.year+'.pdf');
        document.getElementById('stxt').textContent='PDF exported';
    }

    // Add images to PDF, then finish
    if(imgPromises.length){
        var loaded = 0;
        imgPromises.forEach(function(item){
            var imgEl = new Image();
            imgEl.crossOrigin = 'anonymous';
            imgEl.onload = function(){
                try {
                    // Draw to canvas to get image data
                    var c = document.createElement('canvas');
                    c.width = imgEl.naturalWidth; c.height = imgEl.naturalHeight;
                    c.getContext('2d').drawImage(imgEl, 0, 0);
                    var dataUrl = c.toDataURL('image/png');
                    doc.addImage(dataUrl, 'PNG', item.x, item.y, item.w, item.h);
                } catch(e){
                    // If CORS fails for URL images, try adding directly
                    try { doc.addImage(item.url, 'PNG', item.x, item.y, item.w, item.h); } catch(e2){}
                }
                loaded++;
                if(loaded >= imgPromises.length) finishPDF();
            };
            imgEl.onerror = function(){
                // Try adding data URL directly (works for uploaded base64 images)
                try { doc.addImage(item.url, 'PNG', item.x, item.y, item.w, item.h); } catch(e){}
                loaded++;
                if(loaded >= imgPromises.length) finishPDF();
            };
            imgEl.src = item.url;
        });
    } else {
        finishPDF();
    }
}

function toggleSettings(){
    var p=document.getElementById('settingsPanel');
    if(p.style.display==='none'){p.style.display='block';renderSettings();}else{p.style.display='none';}
}

document.addEventListener('mousedown', function(e){
    var p=document.getElementById('settingsPanel');
    if(p.style.display==='none') return;
    if(p.contains(e.target)) return;
    if(e.target.closest('.tb-btn') && e.target.closest('.tb-btn').textContent.trim()==='Settings') return;
    p.style.display='none';
});

function renderSettings(){
    var c=document.getElementById('colorSettings');
    var sty=state.styles;
    var items=[
        {label:'Title Banner',key:'titleBg',val:sty.titleBg},
        {label:'Title Text',key:'title.color',val:sty.title.color},
        {label:'Day Headers',key:'dayHeaders.bgColor',val:sty.dayHeaders.bgColor},
        {label:'Day Header Text',key:'dayHeaders.textColor',val:sty.dayHeaders.textColor},
        {label:'Legend Header',key:'legendHeader.bgColor',val:sty.legendHeader.bgColor},
        {label:'Gutters',key:'gutterColor',val:sty.gutterColor},
        {label:'Gutter Text',key:'gutterText',val:sty.gutterText},
        {label:'Row Stripe 1',key:'rowStripe1',val:sty.rowStripe1},
        {label:'Row Stripe 2',key:'rowStripe2',val:sty.rowStripe2},
        {label:'Reception Bg',key:'receptionBg',val:sty.receptionBg},
        {label:'Reception Circle',key:'receptionCircle',val:sty.receptionCircle},
        {label:'Grid Lines',key:'gridLines',val:sty.gridLines}
    ];
    var h='';
    items.forEach(function(it){
        h+='<div style="display:flex;align-items:center;gap:4px;margin-bottom:8px">';
        h+='<span style="flex:1">'+it.label+'</span>';
        var nv=normHex(it.val);
        h+='<input type="text" value="'+nv+'" data-key="'+it.key+'" onchange="updateStyleColor(this)" style="width:70px;font-size:0.55rem;background:#444;color:#fff;border:1px solid #555;padding:2px 4px;border-radius:2px;font-family:monospace">';
        h+='<input type="color" value="'+nv+'" data-key="'+it.key+'" oninput="updateStyleColor(this)" style="width:24px;height:20px;border:none;cursor:pointer;background:none">';
        h+='</div>';
    });
    // Font settings
    h+='<div style="font-weight:700;font-size:0.75rem;margin:16px 0 12px;border-bottom:1px solid #444;padding-bottom:8px">Font Settings</div>';
    var fonts=['Cinzel','Archivo Narrow','Helvetica','Georgia','Arial','Verdana','Times New Roman','Courier New'];
    var fontGroups=[
        {label:'Title',fkey:'title',obj:sty.title},
        {label:'Day Headers',fkey:'dayHeaders',obj:sty.dayHeaders},
        {label:'Legend',fkey:'legendFont',obj:sty.legendFont},
        {label:'Gutters',fkey:'gutterFont',obj:sty.gutterFont},
        {label:'Events',fkey:'eventFont',obj:sty.eventFont},
        {label:'Reception',fkey:'receptionFont',obj:sty.receptionFont}
    ];
    fontGroups.forEach(function(fg){
        h+='<div style="margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #333">';
        h+='<div style="font-weight:600;margin-bottom:6px;opacity:0.7">'+fg.label+'</div>';
        // Font family
        h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px"><span style="font-size:0.55rem">Family</span>';
        h+='<select data-fkey="'+fg.fkey+'" data-fprop="fontFamily" onchange="updateFont(this)" style="width:110px;font-size:0.55rem;background:#444;color:#fff;border:1px solid #555;padding:2px;border-radius:2px">';
        fonts.forEach(function(f){ h+='<option value="'+f+'"'+(fg.obj.fontFamily===f?' selected':'')+'>'+f+'</option>'; });
        h+='</select></div>';
        // Font size
        h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px"><span style="font-size:0.55rem">Size</span>';
        h+='<input type="number" value="'+fg.obj.fontSize+'" data-fkey="'+fg.fkey+'" data-fprop="fontSize" onchange="updateFont(this)" style="width:50px;font-size:0.55rem;background:#444;color:#fff;border:1px solid #555;padding:2px;border-radius:2px;text-align:center" min="6" max="72"></div>';
        // Font weight
        h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px"><span style="font-size:0.55rem">Weight</span>';
        h+='<select data-fkey="'+fg.fkey+'" data-fprop="fontWeight" onchange="updateFont(this)" style="width:110px;font-size:0.55rem;background:#444;color:#fff;border:1px solid #555;padding:2px;border-radius:2px">';
        [400,500,600,700,900].forEach(function(w){ h+='<option value="'+w+'"'+(fg.obj.fontWeight==w?' selected':'')+'>'+w+(w===400?' (Normal)':w===700?' (Bold)':'')+'</option>'; });
        h+='</select></div>';
        // Letter spacing (title only)
        if(fg.obj.letterSpacing!==undefined){
            h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px"><span style="font-size:0.55rem">Spacing</span>';
            h+='<input type="number" value="'+fg.obj.letterSpacing+'" data-fkey="'+fg.fkey+'" data-fprop="letterSpacing" onchange="updateFont(this)" style="width:50px;font-size:0.55rem;background:#444;color:#fff;border:1px solid #555;padding:2px;border-radius:2px;text-align:center" min="0" max="20"></div>';
        }
        h+='</div>';
    });

    h+='<div style="font-weight:700;font-size:0.75rem;margin:16px 0 12px;border-bottom:1px solid #444;padding-bottom:8px">Venues / Locations</div>';
    state.venues.forEach(function(v,i){
        h+='<div style="display:flex;align-items:center;gap:3px;margin-bottom:5px">';
        h+='<input type="color" value="'+v.color+'" data-venue="'+i+'" onchange="updateVenueColor(this)" style="width:22px;height:18px;border:none;cursor:pointer;background:none;flex-shrink:0">';
        h+='<input type="text" value="'+v.color+'" data-vhex="'+i+'" onchange="updateVenueHex(this)" style="width:62px;font-size:0.5rem;background:#444;color:#fff;border:1px solid #555;padding:2px 3px;border-radius:2px;font-family:monospace;flex-shrink:0">';
        h+='<input type="text" value="'+v.name+'" data-vname="'+i+'" onchange="updateVenueName(this)" style="flex:1;font-size:0.6rem;background:#444;color:#fff;border:1px solid #555;padding:2px 4px;border-radius:2px;font-family:inherit">';
        h+='<button onclick="deleteVenue('+i+')" style="background:none;border:none;color:#f66;cursor:pointer;font-size:0.7rem;padding:0 4px" title="Delete">\u2715</button>';
        h+='</div>';
    });
    h+='<button onclick="addVenue()" style="margin-top:6px;padding:4px 10px;border-radius:3px;border:1px solid #555;background:#444;color:#fff;font-size:0.6rem;cursor:pointer;font-family:inherit;width:100%">+ Add Venue</button>';
    c.innerHTML=h;
}

function updateStyleColor(inp){
    var key=inp.dataset.key, val=normHex(inp.value);
    if(!/^#[0-9a-fA-F]{6}$/.test(val)) return;
    pushUndo();
    var parts=key.split('.');
    if(parts.length===2) state.styles[parts[0]][parts[1]]=val;
    else state.styles[key]=val;
    render(); renderSettings();
}

function updateVenueColor(inp){
    pushUndo();
    state.venues[parseInt(inp.dataset.venue)].color=inp.value;
    render(); renderSwatches(); renderSettings();
}

function updateVenueHex(inp){
    var val=inp.value.trim();
    if(val.charAt(0)!=='#') val='#'+val;
    if(/^#[0-9a-fA-F]{6}$/.test(val)){
        state.venues[parseInt(inp.dataset.vhex)].color=val;
        render(); renderSwatches(); renderSettings();
    }
}

function updateVenueName(inp){
    state.venues[parseInt(inp.dataset.vname)].name=inp.value;
    render(); renderSwatches();
}

function addVenue(){
    var id='venue-'+Date.now();
    state.venues.push({id:id, name:'New Venue', color:'#888888'});
    render(); renderSwatches(); renderSettings();
}

// Venue legend drag reorder
var legDragIdx = null;
function legDragStart(e, idx) { legDragIdx = idx; e.target.classList.add('dragging'); }
function legDragOver(e, idx) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function legDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function legDrop(e, targetIdx) {
    e.preventDefault();
    e.currentTarget.classList.remove('drag-over');
    if (legDragIdx === null || legDragIdx === targetIdx) return;
    pushUndo();
    var venue = state.venues.splice(legDragIdx, 1)[0];
    state.venues.splice(targetIdx, 0, venue);
    legDragIdx = null;
    render(); renderSwatches();
}

function deleteVenue(idx){
    var v=state.venues[idx];
    var count=state.events.filter(function(e){return e.venueId===v.id}).length;
    var msg='Delete venue "'+v.name+'"?';
    if(count) msg+='\n\n'+count+' event(s) use this venue. They will be reassigned to "'+state.venues[0].name+'".';
    if(!confirm(msg)) return;
    pushUndo();
    // Reassign orphaned events to first venue
    if(count && state.venues.length > 1){
        var newId = state.venues[idx===0?1:0].id;
        state.events.forEach(function(e){ if(e.venueId===v.id) e.venueId=newId; });
    }
    state.venues.splice(idx,1);
    render(); renderSwatches(); renderSettings();
}

function updateFont(inp){
    var fkey=inp.dataset.fkey, fprop=inp.dataset.fprop, val=inp.value;
    if(fprop==='fontSize'||fprop==='fontWeight'||fprop==='letterSpacing') val=parseInt(val);
    state.styles[fkey][fprop]=val;
    render(); renderSettings();
}

// Click on day column: stamp new event or select existing
document.addEventListener('mousedown', function(e) {
    var evEl = e.target.closest('.ev[data-id]');
    var resizeEl = e.target.closest('.ev-resize[data-id]');
    var dayCol = e.target.closest('.day-col');

    // Close popover if clicking outside
    if (!e.target.closest('.edit-pop') && !evEl) {
        closePopover();
    }

    // Click legend item to select as active venue
    var legItem = e.target.closest('.leg-item[data-legvenue]');
    if (legItem && !e.target.closest('.leg-x')) {
        activeVenueId = legItem.dataset.legvenue;
        render();
        return;
    }

    // Click day header to edit
    var dayHdr = e.target.closest('.hdr-day[data-dayedit]');
    if (dayHdr) {
        e.preventDefault();
        var di = parseInt(dayHdr.dataset.dayedit);
        showDayPopover(di, e.clientX, e.clientY);
        return;
    }

    // X delete button on venue legend
    var legDel = e.target.closest('.leg-x[data-legdel]');
    if (legDel) {
        e.preventDefault();
        e.stopPropagation();
        deleteVenue(parseInt(legDel.dataset.legdel));
        return;
    }

    // X delete button on event
    var xBtn = e.target.closest('.ev-x[data-xid]');
    if (xBtn) {
        e.preventDefault();
        e.stopPropagation();
        pushUndo();
        state.events = state.events.filter(function(x){return x.id!==xBtn.dataset.xid});
        closePopover();
        render();
        return;
    }

    // + duplicate button on event
    var dupBtn = e.target.closest('.ev-dup[data-dupid]');
    if (dupBtn) {
        e.preventDefault();
        e.stopPropagation();
        var orig = state.events.find(function(x){return x.id===dupBtn.dataset.dupid});
        if (!orig) return;
        pushUndo();
        var copy = JSON.parse(JSON.stringify(orig));
        copy.id = 'e' + Date.now() + Math.random().toString(36).substr(2,4);
        copy.colOrder = (orig.colOrder || 0) + 1;
        state.events.push(copy);
        render();
        return;
    }

    // Resize handle
    if (resizeEl) {
        e.preventDefault();
        var id = resizeEl.dataset.id;
        var evt = state.events.find(function(x){return x.id===id});
        if (!evt) return;
        pushUndo();
        dragging = { type:'resize', evtId:id, startY:e.clientY, origSpan:evt.spanSlots };
        return;
    }

    // Click reception block: show popover for reception
    var recBlock = e.target.closest('.rec-block[data-recday]');
    if (recBlock) {
        e.preventDefault();
        var dayIdx = parseInt(recBlock.dataset.recday);
        showReceptionPopover(dayIdx, e.clientX, e.clientY);
        return;
    }

    // Click existing event: select + show popover
    if (evEl && evEl.dataset.id) {
        e.preventDefault();
        var id = evEl.dataset.id;

        if (e.shiftKey) {
            // Shift+click: toggle in multi-selection
            var idx = selectedEvtIds.indexOf(id);
            if (idx >= 0) { selectedEvtIds.splice(idx, 1); }
            else { selectedEvtIds.push(id); }
            selectedEvtId = null;
            // Close popover without clearing selection
            document.getElementById('editPop').classList.remove('show');
            if (selectedEvtIds.length > 0) {
                showMultiPopover(e.clientX, e.clientY);
            }
            render();
        } else {
            // Normal click: single select
            selectedEvtIds = [id];
            selectedEvtId = id;
            render();
            showPopover(id, e.clientX, e.clientY);

            // Start move drag after a small movement
            var evt = state.events.find(function(x){return x.id===id});
            if (evt) {
                dragging = { type:'move', evtId:id, startY:e.clientY, startX:e.clientX, origSlot:evt.startSlot, origDay:evt.dayIndex, moved:false };
            }
        }
        return;
    }

    // Single click on empty slot: just close popover (no auto-stamp)
});

// Double-click to add new event
document.addEventListener('dblclick', function(e) {
    var dayCol = e.target.closest('.day-col');
    if (!dayCol || !activeVenueId) return;
    e.preventDefault();

    var rect = dayCol.getBoundingClientRect();
    var y = e.clientY - rect.top;
    var slot = Math.floor(y / SH);
    var ns = (state.config.endHour - state.config.startHour) * 2;
    if (slot < 0 || slot >= ns) return;

    var newEvt = {
        id: 'e' + Date.now(),
        dayIndex: parseInt(dayCol.dataset.day),
        startSlot: slot,
        spanSlots: 2,
        venueId: activeVenueId,
        title: 'New Event'
    };
    pushUndo();
    state.events.push(newEvt);
    selectedEvtId = newEvt.id;
    render();
    showPopover(newEvt.id, e.clientX, e.clientY);
});

document.addEventListener('mousemove', function(e) {
    if (!dragging) return;

    if (dragging.type === 'resize') {
        var evt = state.events.find(function(x){return x.id===dragging.evtId});
        if (!evt) return;
        var dy = e.clientY - dragging.startY;
        var slotDelta = Math.round(dy / (SH * 0.5)) * 0.5;
        var newSpan = Math.max(0.5, dragging.origSpan + slotDelta);
        var ns = (state.config.endHour - state.config.startHour) * 2;
        if (evt.startSlot + newSpan > ns) newSpan = ns - evt.startSlot;
        if (evt.spanSlots !== newSpan) {
            evt.spanSlots = newSpan;
            render();
            updatePopoverDur();
        }
    }

    if (dragging.type === 'move') {
        var dx = Math.abs(e.clientX - dragging.startX);
        var dy = Math.abs(e.clientY - dragging.startY);
        if (dx > 5 || dy > 5) dragging.moved = true;

        if (dragging.moved) {
            closePopover();
            var evt = state.events.find(function(x){return x.id===dragging.evtId});
            if (!evt) return;

            // Vertical movement: change start slot
            var slotDelta = Math.round((e.clientY - dragging.startY) / SH);
            var newSlot = Math.max(0, dragging.origSlot + slotDelta);
            var ns = (state.config.endHour - state.config.startHour) * 2;
            if (newSlot + evt.spanSlots > ns) newSlot = ns - evt.spanSlots;

            // Horizontal: detect which day column the mouse is over
            var dayCols = document.querySelectorAll('.day-col');
            var newDay = evt.dayIndex;
            dayCols.forEach(function(dc) {
                var r = dc.getBoundingClientRect();
                if (e.clientX >= r.left && e.clientX <= r.right) {
                    newDay = parseInt(dc.dataset.day);
                }
            });

            // Horizontal drag within same day: adjust column order
            if (newDay === dragging.origDay) {
                var dayCol = document.querySelector('.day-col[data-day="'+newDay+'"]');
                if (dayCol) {
                    var dcRect = dayCol.getBoundingClientRect();
                    var relX = (e.clientX - dcRect.left) / dcRect.width;
                    evt.colOrder = Math.round(relX * 10); // 0-10 range
                }
            }

            if (evt.startSlot !== newSlot || evt.dayIndex !== newDay) {
                evt.startSlot = newSlot;
                evt.dayIndex = newDay;
                if (newDay !== dragging.origDay) evt.colOrder = 0; // reset on day change
            }
            render();
        }
    }
});

document.addEventListener('mouseup', function(e) {
    if (dragging && dragging.type === 'move' && !dragging.moved) {
        // It was a click, not a drag - popover already shown
    }
    dragging = null;
});

// Popover

        var pick = document.createElement('div');

        pick.style.background = v.color;
        pick.title = v.name;
        pick.textContent = v.name.split(' ').map(function(w){return w[0]}).join('');
        pick.addEventListener('click', function(){
            vg.querySelectorAll('.venue-pick').forEach(function(p){p.classList.remove('selected')});
            pick.classList.add('selected');
            pick._venueId = v.id;
        });

    });

function duplicateToDay(dayIndex) {

function updatePopoverDur() {
    var evt = state.events.find(function(x){return x.id===selectedEvtId});
    if (!evt) return;
    var mins = evt.spanSlots * 30;
    var hrs = Math.floor(mins / 60);
    var m = mins % 60;
    var label = '';
    if (hrs && m) label = hrs + 'h ' + m + 'm';
    else if (hrs) label = hrs + (hrs===1 ? ' hour' : ' hours');
    else label = m + ' min';
    document.getElementById('epDurVal').textContent = label;
}

function closePopover() {
    document.getElementById('editPop').classList.remove('show');
    // Restore recFields default content
    document.getElementById('epRecFields').innerHTML = '<label>Reception Hours</label><textarea id="epRecText" style="height:50px"></textarea>';
    editingRecDay = null;
    var needRender = selectedEvtId || selectedEvtIds.length;
    selectedEvtId = null;
    selectedEvtIds = [];
    if (needRender) render();
}

function epDur(delta) {
    var evt = state.events.find(function(x){return x.id===selectedEvtId});
    if (!evt) return;
    var ns = (state.config.endHour - state.config.startHour) * 2;
    evt.spanSlots = Math.max(0.5, Math.min(ns - evt.startSlot, evt.spanSlots + delta * 0.5));
    render();
    updatePopoverDur();
}

function epSave() {
    // Title save
    if (editingTitle) {
        pushUndo();
        state.config.title = document.getElementById('epGenText').value;
        editingTitle = false;
        closePopover(); render(); return;
    }
    // Day header save - auto-update surrounding days
    if (editingDayIdx !== null) {
        pushUndo();
        var pickerVal = document.getElementById('epDayPicker').value;
        if (pickerVal) {
            var parts = pickerVal.split('-');
            var picked = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
            var dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
            var monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            for (var di = 0; di < state.config.days.length; di++) {
                var offset = di - editingDayIdx;
                var d = new Date(picked.getTime() + offset * 86400000);
                state.config.days[di].label = dayNames[d.getDay()];
                state.config.days[di].date = monthNames[d.getMonth()] + ' ' + d.getDate();
            }
            state.config.year = picked.getFullYear();
        }

        editingDayIdx = null;
        closePopover(); render(); return;
    }
    // Reception save
    if (editingRecDay !== null) {
        pushUndo();
        var rec = state.config.reception.find(function(r){return r.dayIndex===editingRecDay});
        if (!rec) { rec={dayIndex:editingRecDay,text:''}; state.config.reception.push(rec); }
        rec.text = document.getElementById('epRecText').value;
        editingRecDay = null;
        closePopover();
        render();
        return;
    }

    var evt = state.events.find(function(x){return x.id===selectedEvtId});
    if (!evt) return;
    pushUndo();
    evt.title = document.getElementById('epTitle').value.replace(/\\n/g, '\n');
    evt.subtitle = document.getElementById('epSub').value;
    var selPick = document.querySelector('.venue-pick.selected');
    if (selPick) evt.venueId = selPick._venueId;
    closePopover();
    render();
}

function epDelete() {
    if (!selectedEvtId) return;
    pushUndo();
    state.events = state.events.filter(function(x){return x.id!==selectedEvtId});
    closePopover();
    render();
}

// Read from sync endpoint (Google Apps Script redirects, CORS works on GET)
function syncRead() {
    return fetch(SYNC_URL).then(function(r) {
        if (!r.ok) throw new Error('Sync error: ' + r.status);
        return r.json();
    });
}

// Write to sync endpoint (Google Apps Script POST redirect breaks CORS,
// so we use no-cors mode - we can't read the response, but the data gets saved)
function syncWrite(data) {
    return fetch(SYNC_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(data)
    });
}

// Publish schedule
var publishing = false;
function publishSchedule() {
    if (publishing) return;
    var name = getUserName();
    if (!name) { promptUserName(); return; }
    if (!SYNC_URL) { showSyncSetup(); return; }

    publishing = true;
    document.getElementById('publishBtn').textContent = 'Publishing...';

    // Check for active editors and recent publishes
    fetch(SYNC_URL + '?heartbeat=' + encodeURIComponent(name))
    .then(function(r) { return r.json(); })
    .then(function(active) {
        var others = [];
        for (var n in active) {
            if (n === name) continue;
            var age = Date.now() - new Date(active[n]).getTime();
            if (age < 180000) others.push(n);
        }
        if (others.length) {
            if (!confirm(others.join(' and ') + ' ' + (others.length === 1 ? 'is' : 'are') + ' also editing right now.\nPublish anyway?')) {
                publishing = false;
                document.getElementById('publishBtn').textContent = 'Publish';
                return Promise.reject('cancelled');
            }
        }
        return syncRead();
    }).then(function(remote) {
        if (remote && remote._meta && remote._meta.publishedBy) {
            var age = Date.now() - new Date(remote._meta.publishedAt).getTime();
            if (remote._meta.publishedBy !== name && age < 300000) {
                var mins = Math.round(age / 60000);
                var label = mins < 1 ? 'just now' : mins + ' min ago';
                if (!confirm(remote._meta.publishedBy + ' published ' + label + '.\nOverwrite with your version?')) {
                    publishing = false;
                    document.getElementById('publishBtn').textContent = 'Publish';
                    return Promise.reject('cancelled');
                }
            }
        }

        var payload = JSON.parse(JSON.stringify(state));
        payload._meta = { publishedBy: name, publishedAt: new Date().toISOString() };

        return syncWrite(payload);
    }).then(function() {
        document.getElementById('publishBtn').textContent = 'Publish';
        document.getElementById('stxt').textContent = 'Published by ' + name;
        lastPublishedAt = new Date().toISOString();
        publishing = false;
    }).catch(function(err) {
        if (err === 'cancelled') return;
        publishing = false;
        document.getElementById('publishBtn').textContent = 'Publish';
        alert('Publish failed: ' + (err.message || err));
    });
}

// Sync check
var lastPublishedAt = null;
var syncDismissed = false;

function checkForUpdates() {
    if (!SYNC_URL) return;
    syncRead().then(function(data) {
        if (!data || !data._meta || !data._meta.publishedAt) return;
        var remoteAt = data._meta.publishedAt;
        var remoteBy = data._meta.publishedBy;

        if (!lastPublishedAt) { lastPublishedAt = remoteAt; return; }

        if (remoteAt > lastPublishedAt && !syncDismissed) {
            document.getElementById('syncMsg').textContent =
                (remoteBy || 'Someone') + ' published changes. Load latest?';
            document.getElementById('syncBanner').classList.add('show');
        }
    }).catch(function(){});
}

function getLatest() {
    if (!SYNC_URL) { alert('Sync not set up yet. Click Publish first to configure.'); return; }
    if (!confirm('Replace your local schedule with the latest published version?')) return;
    loadPublished();
}

function loadPublished() {
    if (!SYNC_URL) { alert('Sync not set up yet. Click Publish first to configure.'); return; }
    syncRead().then(function(data) {
        if (!data || !data.config) { alert('No published schedule found.'); return; }
        lastPublishedAt = data._meta ? data._meta.publishedAt : new Date().toISOString();
        delete data._meta;
        state = data;
        mergeDefaults();
        render(); renderSwatches();
        dismissSync();
        document.getElementById('stxt').textContent = 'Loaded latest';
    }).catch(function(err) { alert('Failed to load: ' + err.message); });
}

function dismissSync() {
    document.getElementById('syncBanner').classList.remove('show');
    syncDismissed = true;
    setTimeout(function(){ syncDismissed = false; }, 300000);
}

// Heartbeat: ping the server so others know we're editing
function sendHeartbeat() {
    var name = getUserName();
    if (!name || !SYNC_URL) return;
    fetch(SYNC_URL + '?heartbeat=' + encodeURIComponent(name))
        .then(function(r) { return r.json(); })
        .then(function(active) { renderActiveUsers(active); })
        .catch(function(){});
}

// User status display
function renderActiveUsers(active) {
    var el = document.getElementById('userStatus');
    var name = getUserName();
    if (!name) { el.innerHTML = ''; return; }
    var h = '<span class="user-dot green"></span><span class="status-inline" style="color:rgba(255,255,255,0.7);font-weight:600">' + name + '</span>';

    if (active) {
        var others = [];
        for (var n in active) {
            if (n === name) continue;
            var age = Date.now() - new Date(active[n]).getTime();
            if (age < 180000) others.push(n);
        }
        if (others.length) {
            h += '<span class="user-dot amber" style="margin-left:8px"></span>';
            h += '<span class="status-inline" style="color:#F9B233;font-weight:600">' + others.join(', ') + ' also editing</span>';
        }
    }
    el.innerHTML = h;
}

function updateUserStatus() {
    var el = document.getElementById('userStatus');
    var name = getUserName();
    if (!name) { el.innerHTML = ''; return; }
    el.innerHTML = '<span class="user-dot green"></span><span class="status-inline" style="color:rgba(255,255,255,0.7);font-weight:600">' + name + '</span>';
}
