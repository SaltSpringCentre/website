<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wireframe: Depth Scroll</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            background: #0a0a0a;
            color: #fff;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
            height: 100%;
        }

        .stage {
            position: fixed;
            inset: 0;
            perspective: 1000px;
            perspective-origin: 50% 40%;
            overflow: hidden;
        }

        .card {
            position: absolute;
            inset: 0;
            will-change: transform;
            transform-style: preserve-3d;
        }

        /* Recipe card header */
        .card-header {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 72px;
            border-radius: 18px 18px 0 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 36px;
            z-index: 2;
        }

        .card-header-tag {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            opacity: 0.5;
        }

        /* Card body */
        .card-body {
            position: absolute;
            top: 72px; left: 0; right: 0; bottom: 0;
            overflow-y: auto;
            z-index: 1;
        }

        .card-inner {
            max-width: 720px;
            margin: 0 auto;
            padding: 50px 36px 80px;
        }

        /* Typography */
        .card-title {
            font-size: clamp(1.8rem, 5vw, 3.2rem);
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 12px;
        }

        .card-subtitle {
            font-size: 0.95rem;
            opacity: 0.5;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        /* Placeholder image boxes */
        .ph-hero {
            width: 100%;
            height: 220px;
            border-radius: 14px;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0.35;
        }

        .ph-row {
            display: flex;
            gap: 14px;
            margin-bottom: 28px;
        }

        .ph-box {
            flex: 1;
            height: 130px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            opacity: 0.3;
        }

        .ph-box.tall { height: 180px; }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 14px 32px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: rgba(255,255,255,0.15);
            color: #fff;
        }

        .btn-outline {
            background: transparent;
            color: rgba(255,255,255,0.6);
            border: 1.5px solid rgba(255,255,255,0.2);
        }

        /* Detail list */
        .detail-list {
            list-style: none;
            margin-bottom: 28px;
        }

        .detail-list li {
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            font-size: 0.85rem;
            opacity: 0.7;
            display: flex;
            justify-content: space-between;
        }

        .detail-list li span { opacity: 0.5; }

        /* Quote card */
        .quote-mark {
            font-size: 6rem;
            line-height: 1;
            opacity: 0.15;
            margin-bottom: -20px;
        }

        .quote-text {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 700;
            font-style: italic;
            line-height: 1.15;
            margin-bottom: 16px;
        }

        .quote-context {
            font-size: 0.85rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Price tag */
        .price {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .price-note {
            font-size: 0.75rem;
            opacity: 0.4;
            margin-bottom: 24px;
        }

        /* Tags row */
        .tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .tag-pill {
            padding: 5px 14px;
            border-radius: 50px;
            font-size: 0.65rem;
            border: 1px solid rgba(255,255,255,0.15);
            opacity: 0.5;
        }

        /* Section divider */
        .section-gap { height: 28px; }

        /* Body text */
        .body-text {
            font-size: 0.9rem;
            line-height: 1.6;
            opacity: 0.6;
            margin-bottom: 24px;
        }

        /* HUD */
        .hud {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 9999;
        }

        .hud-item {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        .hud-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(255,255,255,0.12);
            border: 2px solid rgba(255,255,255,0.08);
            cursor: pointer;
            transition: background 0.3s, border-color 0.3s;
            flex-shrink: 0;
        }

        .hud-dot.active {
            background: rgba(255,255,255,0.6);
            border-color: rgba(255,255,255,0.25);
        }

        .hud-dot:hover { background: rgba(255,255,255,0.35); }

        .hud-label {
            position: absolute;
            right: 36px;
            white-space: nowrap;
            font-size: 0.7rem;
            letter-spacing: 0.04em;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            padding: 6px 12px;
            border-radius: 6px;
            opacity: 0;
            pointer-events: none;
            transform: translateX(4px);
            transition: opacity 0.2s, transform 0.2s;
        }

        .hud-item:hover .hud-label {
            opacity: 1;
            transform: translateX(0);
        }

        /* Scroll indicator - fixed bottom center, shows when card has more content */
        .scroll-indicator {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            opacity: 0;
            transition: opacity 0.4s;
        }

        .scroll-indicator.visible {
            opacity: 1;
        }

        .scroll-indicator-text {
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            opacity: 0.35;
        }

        .scroll-indicator-mouse {
            width: 22px;
            height: 36px;
            border: 1.5px solid rgba(255,255,255,0.25);
            border-radius: 11px;
            position: relative;
            opacity: 0.4;
        }

        .scroll-indicator-mouse::after {
            content: '';
            position: absolute;
            bottom: 6px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: rgba(255,255,255,0.6);
            animation: mouse-hint 2s ease infinite;
        }

        @keyframes mouse-hint {
            0%, 100% { bottom: 6px; opacity: 0.6; }
            50% { bottom: 18px; opacity: 1; }
        }

        .scroll-indicator-arrow {
            opacity: 0.25;
            font-size: 0.8rem;
            animation: bob 1.8s ease infinite;
        }

        @keyframes bob {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(4px); }
        }

        /* Lure orb - a floating shape that drifts down, inviting the mouse to chase it */
        .lure-orb {
            position: fixed;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.4), rgba(255,255,255,0.1));
            box-shadow: 0 0 20px rgba(255,255,255,0.15), 0 0 40px rgba(255,255,255,0.05);
            z-index: 9999;
            pointer-events: auto;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.6s;
        }

        .lure-orb.visible {
            opacity: 1;
        }

        .lure-orb.caught {
            opacity: 0;
            transform: scale(2.5) !important;
            transition: opacity 0.3s, transform 0.3s;
        }

        /* Section heading inside cards */
        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 14px;
            margin-top: 8px;
            opacity: 0.8;
        }

        /* Testimonial block */
        .testimonial {
            border-left: 2px solid rgba(255,255,255,0.15);
            padding: 14px 0 14px 20px;
            margin-bottom: 20px;
        }

        .testimonial-text {
            font-size: 0.85rem;
            font-style: italic;
            opacity: 0.55;
            line-height: 1.5;
            margin-bottom: 6px;
        }

        .testimonial-author {
            font-size: 0.7rem;
            opacity: 0.35;
        }

        /* Divider line */
        .divider {
            height: 1px;
            background: rgba(255,255,255,0.08);
            margin: 32px 0;
        }

        /* Grid for features/items */
        .feature-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 28px;
        }

        .feature-card {
            background: rgba(255,255,255,0.04);
            border-radius: 10px;
            padding: 18px;
        }

        .feature-card-title {
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 6px;
            opacity: 0.7;
        }

        .feature-card-desc {
            font-size: 0.7rem;
            opacity: 0.4;
            line-height: 1.4;
        }

        /* Schedule block */
        .schedule-block {
            background: rgba(255,255,255,0.04);
            border-radius: 10px;
            padding: 18px;
            margin-bottom: 14px;
        }

        .schedule-time {
            font-size: 0.7rem;
            opacity: 0.4;
            margin-bottom: 4px;
        }

        .schedule-title {
            font-size: 0.85rem;
            font-weight: 600;
            opacity: 0.7;
        }
    </style>
</head>

var numCards = cards.length;

var stage = document.getElementById('stage');
var hud = document.getElementById('hud');
var scrollIndicator = document.getElementById('scrollIndicator');
var lureOrb = document.getElementById('lureOrb');
var cardEls = [];
var cardBodies = [];
var dotEls = [];

var DWELL = 0.4;

// Virtual card position (0 to numCards-1). Wheel changes this.
var vScroll = 0;
var targetCard = null; // for animated jumps
var maxScroll = numCards - 1;

// Mouse Y tracking for content scroll zone
var mouseY = 0.5;

// Build cards
cards.forEach(function(c, i) {
    var el = document.createElement('div');
    el.className = 'card';
    el.style.zIndex = numCards - i;
    el.innerHTML =
        '<div class="card-header" style="background:' + c.headerBg + '">' +
            '<span class="card-header-tag">' + c.tag + '</span>' +
        '</div>' +
        '<div class="card-body" style="background:' + c.bg + '">' +
            '<div class="card-inner">' + c.body + '</div>' +
        '</div>';
    stage.appendChild(el);
    cardEls.push(el);
    cardBodies.push(el.querySelector('.card-body'));

    var item = document.createElement('div');
    item.className = 'hud-item';
    var label = document.createElement('div');
    label.className = 'hud-label';
    label.textContent = c.title;
    var dot = document.createElement('div');
    dot.className = 'hud-dot';
    (function(idx) {
        dot.addEventListener('click', function() {
            targetCard = idx;
        });
    })(i);
    item.appendChild(label);
    item.appendChild(dot);
    hud.appendChild(item);
    dotEls.push(dot);
});

// ---- WHEEL / SCROLL GESTURE = CHANGE CARDS (responsive, not snapping) ----
// Wheel directly drives vScroll with momentum
var vVelocity = 0;
var WHEEL_SENSITIVITY = 0.00015; // very gentle: a normal scroll barely nudges
var FRICTION = 0.88; // decays faster so momentum dies quickly
var SNAP_STRENGTH = 0.03; // soft snap to nearest card
var MAX_VELOCITY = 0.035; // cap so you can never fly through more than ~1 card

document.addEventListener('wheel', function(e) {
    e.preventDefault();
    vVelocity += e.deltaY * WHEEL_SENSITIVITY;
    // Clamp velocity so rapid scrolling can't skip cards
    if (vVelocity > MAX_VELOCITY) vVelocity = MAX_VELOCITY;
    if (vVelocity < -MAX_VELOCITY) vVelocity = -MAX_VELOCITY;
    targetCard = null;
}, { passive: false });

// Block native touch scroll
document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });

// ---- MOUSE IN LOWER ZONE = SCROLL CARD CONTENT ----
document.addEventListener('mousemove', function(e) {
    mouseY = e.clientY / window.innerHeight;
});

document.addEventListener('mouseleave', function() {
    mouseY = 0.5;
});

// ---- MAIN LOOP ----
function tick() {
    requestAnimationFrame(tick);

    // HUD click: animate to target card
    if (targetCard !== null) {
        var diff = targetCard - vScroll;
        if (Math.abs(diff) < 0.005) {
            vScroll = targetCard;
            targetCard = null;
            vVelocity = 0;
        } else {
            vVelocity = diff * 0.08;
        }
    }

    // Apply velocity with friction
    vScroll += vVelocity;
    vVelocity *= FRICTION;

    // Soft snap to nearest card when nearly stopped
    if (Math.abs(vVelocity) < 0.003 && targetCard === null) {
        var nearest = Math.round(vScroll);
        var snapDiff = nearest - vScroll;
        if (Math.abs(snapDiff) > 0.001) {
            vScroll += snapDiff * SNAP_STRENGTH;
        }
    }

    // Clamp
    if (vScroll < 0) { vScroll = 0; vVelocity = 0; }
    if (vScroll > maxScroll) { vScroll = maxScroll; vVelocity = 0; }

    var activeIndex = Math.min(Math.round(vScroll), numCards - 1);

    // Check if active card has scrollable content
    var activeBody = cardBodies[activeIndex];
    var hasMore = activeBody && (activeBody.scrollTop < (activeBody.scrollHeight - activeBody.clientHeight - 2));
    var hasScrolledDown = activeBody && activeBody.scrollTop > 5;
    var isScrollable = activeBody && (activeBody.scrollHeight > activeBody.clientHeight + 10);

    // Mouse in bottom 30%: auto-scroll the active card's content DOWN
    var inScrollDown = mouseY > 0.75;
    // Mouse in top 15%: auto-scroll the active card's content UP
    var inScrollUp = mouseY < 0.15 && hasScrolledDown;

    if (inScrollDown && activeBody && hasMore) {
        var intensity = (mouseY - 0.75) / 0.25;
        activeBody.scrollTop += intensity * 5;
    } else if (inScrollUp && activeBody) {
        var intensity = (0.15 - mouseY) / 0.15;
        activeBody.scrollTop -= intensity * 5;
    }

    // Show indicator when card has scrollable content not yet at bottom, and mouse is in neutral zone
    scrollIndicator.classList.toggle('visible', isScrollable && hasMore && !inScrollDown);

    // Lure orb: drifts in bottom 80-92% of screen, inviting mouse to chase it down
    if (isScrollable && hasMore && !inScrollDown) {
        lureOrb.classList.add('visible');
        lureOrb.classList.remove('caught');
        var time = Date.now() * 0.001;
        var orbX = 50 + Math.sin(time * 0.6) * 20;
        var orbBaseY = 82 + Math.sin(time * 0.35) * 6; // 76-88% range
        lureOrb.style.left = orbX + '%';
        lureOrb.style.top = orbBaseY + '%';
    } else if (inScrollDown && lureOrb.classList.contains('visible')) {
        lureOrb.classList.add('caught');
        setTimeout(function() { lureOrb.classList.remove('visible'); }, 300);
    } else if (!isScrollable || !hasMore) {
        lureOrb.classList.remove('visible');
        lureOrb.classList.remove('caught');
    }

    // Render card transforms
    for (var i = 0; i < numCards; i++) {
        var el = cardEls[i];
        var raw = vScroll - i;

        if (raw < -1.5 || raw > 2) {
            el.style.visibility = 'hidden';
            continue;
        }

        el.style.visibility = 'visible';

        // Reset content scroll when card is not active
        if (i !== activeIndex) {
            cardBodies[i].scrollTop = 0;
        }

        var t;
        if (raw <= 0) {
            var arriveStart = -(1 - DWELL);
            if (raw <= arriveStart) {
                t = -1;
            } else {
                t = -1 + (raw - arriveStart) / (1 - DWELL);
            }
        } else if (raw <= DWELL) {
            t = 0;
        } else {
            t = (raw - DWELL) / (1 - DWELL);
        }

        if (t <= 0) {
            var behindZ = t * 500;
            var behindScale = 0.7 + 0.3 * (1 + t);
            el.style.transform = 'translate3d(0, 0, ' + behindZ + 'px) scale(' + behindScale + ')';
        } else {
            var dropY = t * 120;
            var dropZ = t * 100;
            el.style.transform = 'translate3d(0, ' + dropY + 'vh, ' + dropZ + 'px)';
        }

        dotEls[i].classList.toggle('active', i === activeIndex);
    }
}

tick();
</script>
