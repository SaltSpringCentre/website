<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wireframe: Depth Scroll</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            background: #0a0a0a;
            color: #fff;
            font-family: system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
        }

        .scroll-space {
            height: calc(var(--num-cards) * 100vh);
            pointer-events: none;
        }

        .stage {
            position: fixed;
            inset: 0;
            perspective: 1000px;
            perspective-origin: 50% 40%;
            overflow: hidden;
        }

        .card {
            position: absolute;
            inset: 0;
            will-change: transform;
            transform-style: preserve-3d;
        }

        .card-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 80px;
            border-radius: 20px 20px 0 0;
            display: flex;
            align-items: center;
            padding: 0 40px;
            z-index: 2;
        }

        .card-header-tag {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            opacity: 0.6;
        }

        .card-body {
            position: absolute;
            top: 80px;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
            z-index: 1;
        }

        .card-icon {
            font-size: 5rem;
            opacity: 0.2;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: clamp(2rem, 6vw, 4.5rem);
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 20px;
            max-width: 800px;
        }

        .card-desc {
            font-size: clamp(0.9rem, 2vw, 1.15rem);
            opacity: 0.55;
            max-width: 500px;
            line-height: 1.5;
        }

        .hud {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 9999;
        }

        .hud-item {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        .hud-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.12);
            border: 2px solid rgba(255, 255, 255, 0.08);
            cursor: pointer;
            transition: background 0.3s, border-color 0.3s;
            flex-shrink: 0;
        }

        .hud-dot.active {
            background: rgba(255, 255, 255, 0.6);
            border-color: rgba(255, 255, 255, 0.25);
        }

        .hud-dot:hover {
            background: rgba(255, 255, 255, 0.35);
        }

        .hud-label {
            position: absolute;
            right: 36px;
            white-space: nowrap;
            font-size: 0.7rem;
            letter-spacing: 0.04em;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            padding: 6px 12px;
            border-radius: 6px;
            opacity: 0;
            pointer-events: none;
            transform: translateX(4px);
            transition: opacity 0.2s, transform 0.2s;
        }

        .hud-item:hover .hud-label {
            opacity: 1;
            transform: translateX(0);
        }

        .scroll-cue {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            opacity: 0.25;
            z-index: 9999;
            transition: opacity 0.6s;
        }

        .scroll-cue.hidden { opacity: 0; }

        .scroll-cue .ch {
            display: block;
            text-align: center;
            animation: bob 2s ease infinite;
            font-size: 1rem;
            margin-top: 6px;
        }

        @keyframes bob {
            0%, 100% { transform: translateY(0); opacity: 0.4; }
            50% { transform: translateY(5px); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="stage" id="stage"></div>
<div class="scroll-space" id="scrollSpace"></div>
<div class="hud" id="hud"></div>
<div class="scroll-cue" id="scrollCue">Scroll to explore<span class="ch">&#x2304;</span></div>

<script>
var cards = [
    { tag: "The Land",    title: "69 Acres of Sanctuary",      desc: "Forests, gardens, ponds, temples",             bg: "#2d5a27", headerBg: "#3a6e33", icon: "" },
    { tag: "Babaji",      title: "Peace. No more than that.",   desc: "When asked about his only goal in life",       bg: "#1a1a2e", headerBg: "#24243e", icon: "\u201C" },
    { tag: "Retreat",     title: "Weekend Yoga Retreat",        desc: "2 nights of practice, rest, and renewal",      bg: "#1a5c53", headerBg: "#237a6e", icon: "" },
    { tag: "Venue",       title: "The Pond Dome",               desc: "Geodesic dome by the water",                   bg: "#4a6670", headerBg: "#5a7a84", icon: "" },
    { tag: "Shop",        title: "Salt Spring Island Cooking",  desc: "The beloved cookbook, 52,000 copies sold",      bg: "#8a6a3a", headerBg: "#9a7a4a", icon: "" },
    { tag: "Babaji",      title: "Shadow fighting.",            desc: "When asked if life is a comedy or a drama",    bg: "#2a1a2e", headerBg: "#3a2a40", icon: "\u201C" },
    { tag: "Training",    title: "200-Hour Teacher Training",   desc: "Become a certified yoga teacher",              bg: "#5a3a1a", headerBg: "#6a4a2a", icon: "" },
    { tag: "Sacred",      title: "Hanuman Shrine",              desc: "One of many sacred spaces on the land",        bg: "#6a4a2a", headerBg: "#7a5a3a", icon: "" },
    { tag: "Karma Yoga",  title: "Live & Serve",                desc: "Volunteer program with room and board",        bg: "#2a5a2a", headerBg: "#3a6a3a", icon: "" },
    { tag: "Babaji",      title: "Self control.",               desc: "When asked about birth control",               bg: "#1a1a1a", headerBg: "#2a2a2a", icon: "\u201C" },
    { tag: "Event",       title: "Music for Peace",             desc: "Indian classical concert series",              bg: "#5a2a4a", headerBg: "#6a3a5a", icon: "" },
    { tag: "Nature",      title: "Dandaka Forest",              desc: "Primordial cedar-swamp wetland",               bg: "#1a3a1a", headerBg: "#2a4a2a", icon: "" }
];

var numCards = cards.length;
document.documentElement.style.setProperty('--num-cards', numCards);

var stage = document.getElementById('stage');
var hud = document.getElementById('hud');
var scrollCue = document.getElementById('scrollCue');
var cardEls = [];
var dotEls = [];

// Card 0 = front of stack (highest z-index), drops first
cards.forEach(function(c, i) {
    var el = document.createElement('div');
    el.className = 'card';
    el.style.zIndex = numCards - i;
    el.innerHTML =
        '<div class="card-header" style="background:' + c.headerBg + '">' +
            '<span class="card-header-tag">' + c.tag + '</span>' +
        '</div>' +
        '<div class="card-body" style="background:' + c.bg + '">' +
            (c.icon ? '<div class="card-icon">' + c.icon + '</div>' : '') +
            '<div class="card-title">' + c.title + '</div>' +
            '<div class="card-desc">' + c.desc + '</div>' +
        '</div>';
    stage.appendChild(el);
    cardEls.push(el);

    var item = document.createElement('div');
    item.className = 'hud-item';
    var label = document.createElement('div');
    label.className = 'hud-label';
    label.textContent = c.title;
    var dot = document.createElement('div');
    dot.className = 'hud-dot';
    dot.addEventListener('click', function() {
        window.scrollTo({ top: i * window.innerHeight, behavior: 'smooth' });
    });
    item.appendChild(label);
    item.appendChild(dot);
    hud.appendChild(item);
    dotEls.push(dot);
});

var ticking = false;

function onScroll() {
    if (!ticking) {
        ticking = true;
        requestAnimationFrame(render);
    }
}

function render() {
    ticking = false;
    var scrollY = window.scrollY;
    var vh = window.innerHeight;
    var progress = scrollY / vh;
    var activeIndex = Math.min(Math.round(progress), numCards - 1);

    scrollCue.classList.toggle('hidden', scrollY > 50);

    for (var i = 0; i < numCards; i++) {
        var el = cardEls[i];
        var t = progress - i;

        if (t < -1.5 || t > 2) {
            el.style.visibility = 'hidden';
        } else {
            el.style.visibility = 'visible';

            if (t <= 0) {
                var behindZ = t * 600;
                var behindScale = 0.65 + 0.35 * (1 + t);
                el.style.transform =
                    'translate3d(0, 0, ' + behindZ + 'px) scale(' + behindScale + ')';
            } else {
                var dropY = t * 110;
                var dropZ = t * 150;
                el.style.transform =
                    'translate3d(0, ' + dropY + 'vh, ' + dropZ + 'px)';
            }
        }

        dotEls[i].classList.toggle('active', i === activeIndex);
    }
}

window.addEventListener('scroll', onScroll, { passive: true });
render();
</script>
</body>
</html>
