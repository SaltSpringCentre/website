<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wireframe: Depth Scroll</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            background: #0a0a0a;
            color: #fff;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
            height: 100%;
        }

        .stage {
            position: fixed;
            inset: 0;
            perspective: 1000px;
            perspective-origin: 50% 40%;
            overflow: hidden;
        }

        .card {
            position: absolute;
            inset: 0;
            will-change: transform;
            transform-style: preserve-3d;
        }

        /* Recipe card header */
        .card-header {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 72px;
            border-radius: 18px 18px 0 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 36px;
            z-index: 2;
        }

        .card-header-tag {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            opacity: 0.5;
        }

        /* Card body */
        .card-body {
            position: absolute;
            top: 72px; left: 0; right: 0; bottom: 0;
            overflow-y: auto;
            z-index: 1;
        }

        .card-inner {
            max-width: 720px;
            margin: 0 auto;
            padding: 50px 36px 80px;
        }

        /* Typography */
        .card-title {
            font-size: clamp(1.8rem, 5vw, 3.2rem);
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 12px;
        }

        .card-subtitle {
            font-size: 0.95rem;
            opacity: 0.5;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        /* Placeholder image boxes */
        .ph-hero {
            width: 100%;
            height: 220px;
            border-radius: 14px;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0.35;
        }

        .ph-row {
            display: flex;
            gap: 14px;
            margin-bottom: 28px;
        }

        .ph-box {
            flex: 1;
            height: 130px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            opacity: 0.3;
        }

        .ph-box.tall { height: 180px; }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 14px 32px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: rgba(255,255,255,0.15);
            color: #fff;
        }

        .btn-outline {
            background: transparent;
            color: rgba(255,255,255,0.6);
            border: 1.5px solid rgba(255,255,255,0.2);
        }

        /* Detail list */
        .detail-list {
            list-style: none;
            margin-bottom: 28px;
        }

        .detail-list li {
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            font-size: 0.85rem;
            opacity: 0.7;
            display: flex;
            justify-content: space-between;
        }

        .detail-list li span { opacity: 0.5; }

        /* Quote card */
        .quote-mark {
            font-size: 6rem;
            line-height: 1;
            opacity: 0.15;
            margin-bottom: -20px;
        }

        .quote-text {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 700;
            font-style: italic;
            line-height: 1.15;
            margin-bottom: 16px;
        }

        .quote-context {
            font-size: 0.85rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Price tag */
        .price {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .price-note {
            font-size: 0.75rem;
            opacity: 0.4;
            margin-bottom: 24px;
        }

        /* Tags row */
        .tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .tag-pill {
            padding: 5px 14px;
            border-radius: 50px;
            font-size: 0.65rem;
            border: 1px solid rgba(255,255,255,0.15);
            opacity: 0.5;
        }

        /* Section divider */
        .section-gap { height: 28px; }

        /* Body text */
        .body-text {
            font-size: 0.9rem;
            line-height: 1.6;
            opacity: 0.6;
            margin-bottom: 24px;
        }

        /* HUD */
        .hud {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 9999;
        }

        .hud-item {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        .hud-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(255,255,255,0.12);
            border: 2px solid rgba(255,255,255,0.08);
            cursor: pointer;
            transition: background 0.3s, border-color 0.3s;
            flex-shrink: 0;
        }

        .hud-dot.active {
            background: rgba(255,255,255,0.6);
            border-color: rgba(255,255,255,0.25);
        }

        .hud-dot:hover { background: rgba(255,255,255,0.35); }

        .hud-label {
            position: absolute;
            right: 36px;
            white-space: nowrap;
            font-size: 0.7rem;
            letter-spacing: 0.04em;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            padding: 6px 12px;
            border-radius: 6px;
            opacity: 0;
            pointer-events: none;
            transform: translateX(4px);
            transition: opacity 0.2s, transform 0.2s;
        }

        .hud-item:hover .hud-label {
            opacity: 1;
            transform: translateX(0);
        }

        /* Advance zone: bottom 25% of screen */
        .advance-zone {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 60px; /* don't overlap HUD */
            height: 25%;
            z-index: 9998;
            pointer-events: none;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.03));
            opacity: 0;
            transition: opacity 0.4s;
        }

        .advance-zone.active {
            opacity: 1;
        }

        .advance-arrow {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            opacity: 0;
            z-index: 9999;
            transition: opacity 0.3s;
            pointer-events: none;
            text-align: center;
        }

        .advance-arrow.visible {
            opacity: 0.35;
        }

        .advance-arrow .arr {
            display: block;
            font-size: 1.2rem;
            margin-top: 4px;
            animation: bob 1.5s ease infinite;
        }

        /* Reverse zone: top 20% */
        .reverse-zone-hint {
            position: fixed;
            top: 0;
            left: 0;
            right: 60px;
            height: 20%;
            z-index: 9998;
            pointer-events: none;
            background: linear-gradient(to top, transparent, rgba(255,255,255,0.02));
            opacity: 0;
            transition: opacity 0.4s;
        }

        .reverse-zone-hint.active {
            opacity: 1;
        }

        @keyframes bob {
            0%, 100% { transform: translateY(0); opacity: 0.4; }
            50% { transform: translateY(5px); opacity: 1; }
        }
    </style>
</head>

var numCards = cards.length;

var stage = document.getElementById('stage');
var hud = document.getElementById('hud');
var advanceZone = document.getElementById('advanceZone');
var reverseZone = document.getElementById('reverseZone');
var advanceArrow = document.getElementById('advanceArrow');
var cardEls = [];
var dotEls = [];

var DWELL = 0.4;

// Virtual scroll position (0 to numCards-1)
var vScroll = 0;
var maxScroll = numCards - 1;
var mouseY = 0.5; // normalized 0-1 (top to bottom)
var advancing = 0; // -1, 0, or +speed

// Build cards
cards.forEach(function(c, i) {
    var el = document.createElement('div');
    el.className = 'card';
    el.style.zIndex = numCards - i;
    el.innerHTML =
        '<div class="card-header" style="background:' + c.headerBg + '">' +
            '<span class="card-header-tag">' + c.tag + '</span>' +
        '</div>' +
        '<div class="card-body" style="background:' + c.bg + '">' +
            '<div class="card-inner">' + c.body + '</div>' +
        '</div>';
    stage.appendChild(el);
    cardEls.push(el);

    var item = document.createElement('div');
    item.className = 'hud-item';
    var label = document.createElement('div');
    label.className = 'hud-label';
    label.textContent = c.title;
    var dot = document.createElement('div');
    dot.className = 'hud-dot';
    (function(idx) {
        dot.addEventListener('click', function() {
            // Animate to target card
            targetScroll = idx;
        });
    })(i);
    item.appendChild(label);
    item.appendChild(dot);
    hud.appendChild(item);
    dotEls.push(dot);
});

// Block all native scroll
document.addEventListener('wheel', function(e) { e.preventDefault(); }, { passive: false });
document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });

// Track mouse position
var targetScroll = null;

document.addEventListener('mousemove', function(e) {
    mouseY = e.clientY / window.innerHeight;
});

// Also stop advancing if mouse leaves the window
document.addEventListener('mouseleave', function() {
    mouseY = 0.5;
});

function tick() {
    requestAnimationFrame(tick);

    var speed = 0;

    // HUD click: animate to target
    if (targetScroll !== null) {
        var diff = targetScroll - vScroll;
        if (Math.abs(diff) < 0.01) {
            vScroll = targetScroll;
            targetScroll = null;
        } else {
            vScroll += diff * 0.08;
        }
    } else {
        // Mouse in bottom 25%: advance forward
        if (mouseY > 0.75) {
            var intensity = (mouseY - 0.75) / 0.25; // 0 to 1
            speed = intensity * 0.018;
        }
        // Mouse in top 20%: go back
        else if (mouseY < 0.20) {
            var intensity = (0.20 - mouseY) / 0.20; // 0 to 1
            speed = -intensity * 0.018;
        }

        vScroll += speed;
    }

    // Clamp
    vScroll = Math.max(0, Math.min(maxScroll, vScroll));

    // Show/hide zone hints
    var inAdvance = mouseY > 0.75 && vScroll < maxScroll;
    var inReverse = mouseY < 0.20 && vScroll > 0;
    advanceZone.classList.toggle('active', inAdvance);
    reverseZone.classList.toggle('active', inReverse);
    advanceArrow.classList.toggle('visible', inAdvance);

    // Render cards
    var activeIndex = Math.min(Math.round(vScroll), numCards - 1);

    for (var i = 0; i < numCards; i++) {
        var el = cardEls[i];
        var raw = vScroll - i;

        if (raw < -1.5 || raw > 2) {
            el.style.visibility = 'hidden';
            continue;
        }

        el.style.visibility = 'visible';

        var t;
        if (raw <= 0) {
            var arriveStart = -(1 - DWELL);
            if (raw <= arriveStart) {
                t = -1;
            } else {
                t = -1 + (raw - arriveStart) / (1 - DWELL);
            }
        } else if (raw <= DWELL) {
            t = 0;
        } else {
            t = (raw - DWELL) / (1 - DWELL);
        }

        if (t <= 0) {
            var behindZ = t * 500;
            var behindScale = 0.7 + 0.3 * (1 + t);
            el.style.transform = 'translate3d(0, 0, ' + behindZ + 'px) scale(' + behindScale + ')';
        } else {
            var dropY = t * 120;
            var dropZ = t * 100;
            el.style.transform = 'translate3d(0, ' + dropY + 'vh, ' + dropZ + 'px)';
        }

        dotEls[i].classList.toggle('active', i === activeIndex);
    }
}

tick();
</script>
