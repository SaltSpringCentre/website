<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>52 ACYR - Logo Presentation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #fff; font-family: sans-serif; }

        .hero-parallax {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 100px 60px 120px;
            height: 100vh;
            min-height: 700px;
            overflow: visible;
        }
        .hero-parallax .parallax-container {
            position: relative;
            width: 500px;
            aspect-ratio: 1;
        }
        .hero-parallax .layer {
            position: absolute;
            will-change: transform;
            transition: transform 0.05s linear;
        }
        .hero-parallax .layer-arch {
            inset: 8% 5% 0 5%;
        }
        .hero-parallax .layer-arch img {
            width: 100%;
            height: auto;
        }
        .hero-parallax .layer-text {
            bottom: 6%;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            z-index: 1;
        }
        .hero-parallax .layer-text img {
            width: 100%;
            height: auto;
            filter: brightness(0) invert(1);
        }
        .hero-parallax .layer-hand {
            inset: -5% 5% 15% 5%;
            z-index: 2;
        }
        .hero-parallax .layer-hand img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .elements {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 40px;
            padding: 0 60px 120px;
            align-items: center;
        }
        .elements .item { text-align: center; }
        .elements img {
            max-width: 100%;
            height: auto;
            max-height: 264px;
        }
        .elements .label {
            margin-top: 12px;
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #999;
        }

        .palette {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0;
            margin: 0 60px 120px;
        }
        .palette .swatch {
            padding: 24px;
            color: #fff;
            font-size: 0.8rem;
            letter-spacing: 0.06em;
            display: flex;
            align-items: flex-end;
            aspect-ratio: 2;
        }

        .variant {
            display: flex;
            justify-content: center;
            padding: 60px;
        }
        .variant img {
            width: 100%;
            max-width: 644px;
            height: auto;
            display: block;
        }
        .variant .label {
            text-align: center;
            padding: 16px 0 0;
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #999;
        }
    </style>
</head>
<body>

    <p style="text-align: center; color: #999; font-size: 0.8rem; letter-spacing: 0.06em; padding: 30px 60px 0;">Right click to save image for use</p>

    <div class="hero-parallax">
        <div class="parallax-container">
            <div class="layer layer-arch" data-speed="0.15">
                <img src="52ACYR-assets/BackArch.svg" alt="">
            </div>
            <div class="layer layer-text" data-speed="0.15">
                <img src="52ACYR-assets/52_Hand-Sprout_Logo-52ACYR-BL.png" alt="52 ACYR">
            </div>
            <div class="layer layer-hand" data-speed="0.4">
                <img src="52ACYR-assets/52_Hand-Sprout_Logo-Hand.png" alt="Hand + Sprout">
            </div>
        </div>
    </div>

    <div class="elements">
        <div class="item">
            <a href="52ACYR-assets/52_Hand-Sprout_Logo-Hand.png" target="_blank"><img src="52ACYR-assets/52_Hand-Sprout_Logo-Hand.png" alt="Hand + Sprout"></a>
            <div class="label">Hand + Sprout</div>
        </div>
        <div class="item">
            <a href="52ACYR-assets/52_Hand-Sprout_Logo-52ACYR-BL.png" target="_blank"><img src="52ACYR-assets/52_Hand-Sprout_Logo-52ACYR-BL.png" alt="Wordmark Blue"></a>
            <div class="label">Wordmark - Blue</div>
        </div>
        <div class="item">
            <a href="52ACYR-assets/52_Hand-Sprout_Logo-52ACYR-GR.png" target="_blank"><img src="52ACYR-assets/52_Hand-Sprout_Logo-52ACYR-GR.png" alt="Wordmark Green" style="background: #38918a; padding: 20px; border-radius: 8px;"></a>
            <div class="label">Wordmark - Green</div>
        </div>
        <div class="item">
            <a href="52ACYR-assets/Lotus.svg" target="_blank"><img src="52ACYR-assets/Lotus.svg" alt="SSCY Lotus"></a>
            <div class="label">SSCY Lotus<br>(hand drawn coming soon)</div>
        </div>
    </div>

    <div class="palette">
        <div class="swatch" style="background: #38918a;">
            <span>Teal<br>#38918a</span>
        </div>
        <div class="swatch" style="background: #cfedc2;">
            <span style="color: #333;">Light Green<br>#cfedc2</span>
        </div>
        <div class="swatch" style="background: #007298;">
            <span>Blue<br>#007298</span>
        </div>
        <div class="swatch" style="background: #a6f0ff;">
            <span style="color: #333;">Light Blue<br>#a6f0ff</span>
        </div>
    </div>

    <div class="variant">
        <div>
            <a href="52ACYR-assets/52_Hand-Sprout_Logo-01.png" target="_blank"><img src="52ACYR-assets/52_Hand-Sprout_Logo-01.png" alt="Light Green"></a>
            <div class="label">Light Green</div>
        </div>
    </div>

    <div class="variant">
        <div>
            <a href="52ACYR-assets/52_Hand-Sprout_Logo-03.png" target="_blank"><img src="52ACYR-assets/52_Hand-Sprout_Logo-03.png" alt="Teal"></a>
            <div class="label">Teal</div>
        </div>
    </div>

    <div class="variant">
        <div>
            <a href="52ACYR-assets/52_Hand-Sprout_Logo-02.png" target="_blank"><img src="52ACYR-assets/52_Hand-Sprout_Logo-02.png" alt="White"></a>
            <div class="label">White</div>
        </div>
    </div>

    <div class="variant">
        <div>
            <a href="52ACYR-assets/52_Hand-Sprout_Logo-04.png" target="_blank"><img src="52ACYR-assets/52_Hand-Sprout_Logo-04.png" alt="Blue"></a>
            <div class="label">Blue</div>
        </div>
    </div>

    <script>
        const layers = document.querySelectorAll('.hero-parallax .layer');
        const hero = document.querySelector('.hero-parallax');

        function updateParallax() {
            const rect = hero.getBoundingClientRect();
            const centerY = rect.top + rect.height / 2;
            const viewCenter = window.innerHeight / 2;
            const offset = viewCenter - centerY;

            layers.forEach(layer => {
                const speed = parseFloat(layer.dataset.speed);
                const y = offset * speed;
                layer.style.transform = layer.classList.contains('layer-text')
                    ? `translate(-50%, ${y}px)`
                    : `translateY(${y}px)`;
            });
        }

        window.addEventListener('scroll', updateParallax, { passive: true });
        updateParallax();
    </script>
</body>
</html>
