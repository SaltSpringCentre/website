<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>52 ACYR - Logo Presentation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #fff; font-family: sans-serif; }

        .hero-parallax {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            min-height: 700px;
        }
        .parallax-container {
            position: relative;
            width: 540px;
            height: 660px;
        }
        .parallax-container .layer {
            position: absolute;
            will-change: transform;
            transition: transform 0.15s ease-out;
        }

        /* Arch - behind everything, top-center, ~62% width of container */
        .layer-arch {
            width: 62%;
            left: 50%;
            top: 0;
            margin-left: -31%; /* half of 62% */
        }
        .layer-arch img { width: 100%; height: auto; display: block; }

        /* Hand - overlaps arch, wider and centered, top edge near arch top */
        .layer-hand {
            width: 78%;
            left: 50%;
            top: 6%;
            margin-left: -39%;
            z-index: 2;
        }
        .layer-hand img { width: 100%; height: auto; display: block; }

        /* 52 ACYR wordmark - white, inside lower arch area */
        .layer-acyr {
            width: 60%;
            left: 50%;
            bottom: 14%;
            margin-left: -30%;
            z-index: 3;
        }
        .layer-acyr img {
            width: 100%;
            height: auto;
            display: block;
            filter: brightness(0) invert(1);
        }

        /* SSCY subtitle - below arch */
        .layer-sscy {
            width: 68%;
            left: 50%;
            bottom: 0;
            margin-left: -34%;
            z-index: 1;
        }
        .layer-sscy img { width: 100%; height: auto; display: block; }

        .elements {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 40px;
            padding: 0 60px 120px;
            align-items: center;
        }
        .elements .item { text-align: center; }
        .elements img {
            max-width: 100%;
            height: auto;
            max-height: 264px;
        }
        .elements .label {
            margin-top: 12px;
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #999;
        }

        .palette {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0;
            margin: 0 60px 120px;
        }
        .palette .swatch {
            padding: 24px;
            color: #fff;
            font-size: 0.8rem;
            letter-spacing: 0.06em;
            display: flex;
            align-items: flex-end;
            aspect-ratio: 2;
        }

        .variant {
            display: flex;
            justify-content: center;
            padding: 60px;
        }
        .variant img {
            width: 100%;
            max-width: 644px;
            height: auto;
            display: block;
        }
        .variant .label {
            text-align: center;
            padding: 16px 0 0;
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #999;
        }
    </style>
</head>
<body>

    <p style="text-align: center; color: #999; font-size: 0.8rem; letter-spacing: 0.06em; padding: 30px 60px 0;">Right click to save image for use</p>

    <div class="hero-parallax" id="hero">
        <div class="parallax-container">
            <!-- Back: arch shape -->
            <div class="layer layer-arch" data-depth="0.02">
                <img src="52ACYR-assets/BackArch.svg" alt="">
            </div>
            <!-- Middle: 52 ACYR wordmark (white) -->
            <div class="layer layer-acyr" data-depth="0.02">
                <img src="52ACYR-assets/52_Hand-Sprout_Logo-52ACYR-BL.png" alt="52 ACYR">
            </div>
            <!-- Bottom: SSCY subtitle -->
            <div class="layer layer-sscy" data-depth="0.02">
                <img src="52ACYR-assets/SSCY_Font.svg" alt="Salt Spring Centre of Yoga">
            </div>
            <!-- Front: hand + sprout -->
            <div class="layer layer-hand" data-depth="0.06">
                <img src="52ACYR-assets/52_Hand-Sprout_Logo-Hand.png" alt="Hand + Sprout">
            </div>
        </div>
    </div>

    <div class="elements">
        <div class="item">
            <a href="52ACYR-assets/52_Hand-Sprout_Logo-Hand.png" target="_blank"><img src="52ACYR-assets/52_Hand-Sprout_Logo-Hand.png" alt="Hand + Sprout"></a>
            <div class="label">Hand + Sprout</div>
        </div>
        <div class="item">
            <a href="52ACYR-assets/52_Hand-Sprout_Logo-52ACYR-BL.png" target="_blank"><img src="52ACYR-assets/52_Hand-Sprout_Logo-52ACYR-BL.png" alt="Wordmark Blue"></a>
            <div class="label">Wordmark - Blue</div>
        </div>
        <div class="item">
            <a href="52ACYR-assets/52_Hand-Sprout_Logo-52ACYR-GR.png" target="_blank"><img src="52ACYR-assets/52_Hand-Sprout_Logo-52ACYR-GR.png" alt="Wordmark Green" style="background: #38918a; padding: 20px; border-radius: 8px;"></a>
            <div class="label">Wordmark - Green</div>
        </div>
        <div class="item">
            <a href="52ACYR-assets/Lotus.svg" target="_blank"><img src="52ACYR-assets/Lotus.svg" alt="SSCY Lotus"></a>
            <div class="label">SSCY Lotus<br>(hand drawn coming soon)</div>
        </div>
    </div>

    <div class="palette">
        <div class="swatch" style="background: #38918a;">
            <span>Teal<br>#38918a</span>
        </div>
        <div class="swatch" style="background: #cfedc2;">
            <span style="color: #333;">Light Green<br>#cfedc2</span>
        </div>
        <div class="swatch" style="background: #007298;">
            <span>Blue<br>#007298</span>
        </div>
        <div class="swatch" style="background: #a6f0ff;">
            <span style="color: #333;">Light Blue<br>#a6f0ff</span>
        </div>
    </div>

    <div class="variant">
        <div>
            <a href="52ACYR-assets/52_Hand-Sprout_Logo-01.png" target="_blank"><img src="52ACYR-assets/52_Hand-Sprout_Logo-01.png" alt="Light Green"></a>
            <div class="label">Light Green</div>
        </div>
    </div>

    <div class="variant">
        <div>
            <a href="52ACYR-assets/52_Hand-Sprout_Logo-03.png" target="_blank"><img src="52ACYR-assets/52_Hand-Sprout_Logo-03.png" alt="Teal"></a>
            <div class="label">Teal</div>
        </div>
    </div>

    <div class="variant">
        <div>
            <a href="52ACYR-assets/52_Hand-Sprout_Logo-02.png" target="_blank"><img src="52ACYR-assets/52_Hand-Sprout_Logo-02.png" alt="White"></a>
            <div class="label">White</div>
        </div>
    </div>

    <div class="variant">
        <div>
            <a href="52ACYR-assets/52_Hand-Sprout_Logo-04.png" target="_blank"><img src="52ACYR-assets/52_Hand-Sprout_Logo-04.png" alt="Blue"></a>
            <div class="label">Blue</div>
        </div>
    </div>

    <script>
        const hero = document.getElementById('hero');
        const layers = hero.querySelectorAll('.layer');

        hero.addEventListener('mousemove', (e) => {
            const rect = hero.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width - 0.5;
            const y = (e.clientY - rect.top) / rect.height - 0.5;

            layers.forEach(layer => {
                const depth = parseFloat(layer.dataset.depth);
                const moveX = x * depth * rect.width;
                const moveY = y * depth * rect.height;
                layer.style.transform = `translate(${moveX}px, ${moveY}px)`;
            });
        });

        hero.addEventListener('mouseleave', () => {
            layers.forEach(layer => {
                layer.style.transform = 'translate(0, 0)';
            });
        });
    </script>
</body>
</html>
