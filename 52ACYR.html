<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>52 ACYR - Logo Presentation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #fff; font-family: sans-serif; }

        .hero {
            display: flex;
            justify-content: center;
            padding: 100px 60px 120px;
        }
        .hero img {
            max-width: 560px;
            width: 100%;
            height: auto;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0;
            padding: 0 60px;
        }
        .grid img {
            width: 100%;
            display: block;
        }
        .grid .label {
            text-align: center;
            padding: 12px 0 0;
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #999;
        }

        .elements {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 40px;
            padding: 120px 60px 120px;
            align-items: center;
        }
        .elements .item { text-align: center; }
        .elements img {
            max-width: 100%;
            height: auto;
            max-height: 240px;
        }
        .elements .label {
            margin-top: 12px;
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="hero">
        <img src="52ACYR-assets/52_Hand-Sprout_Logo-03.png" alt="52 ACYR Logo - Teal">
    </div>

    <div class="grid">
        <div>
            <img src="52ACYR-assets/52_Hand-Sprout_Logo-01.png" alt="Light Green">
            <div class="label">Light Green</div>
        </div>
        <div>
            <img src="52ACYR-assets/52_Hand-Sprout_Logo-02.png" alt="White">
            <div class="label">White</div>
        </div>
        <div>
            <img src="52ACYR-assets/52_Hand-Sprout_Logo-03.png" alt="Teal">
            <div class="label">Teal</div>
        </div>
        <div>
            <img src="52ACYR-assets/52_Hand-Sprout_Logo-04.png" alt="Blue">
            <div class="label">Blue</div>
        </div>
    </div>

    <div class="elements">
        <div class="item">
            <img src="52ACYR-assets/52_Hand-Sprout_Logo-Hand.png" alt="Hand + Sprout">
            <div class="label">Hand + Sprout</div>
        </div>
        <div class="item">
            <img src="52ACYR-assets/52_Hand-Sprout_Logo-52ACYR-BL.png" alt="Wordmark Blue">
            <div class="label">Wordmark - Blue</div>
        </div>
        <div class="item">
            <img src="52ACYR-assets/52_Hand-Sprout_Logo-52ACYR-GR.png" alt="Wordmark Green" style="background: #2a2a2a; padding: 20px; border-radius: 8px;">
            <div class="label">Wordmark - Green</div>
        </div>
        <div class="item">
            <img src="52ACYR-assets/Lotus.svg" alt="SSCY Lotus">
            <div class="label">SSCY Lotus</div>
        </div>
    </div>

</body>
</html>
