<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --teal: #3bb8a8; --teal-dark: #2a8a7d; --teal-deep: #1a5c53;
  --cream: #faf8f4; --cream-warm: #f3ede3; --gold: #c9a84c;
  --terracotta: #c17838;
  --white: #fff; --charcoal: #2c2c2c;
  --text: #3a3a3a; --text-light: #7a7a7a;
}
body { font-family: 'Archivo Narrow', sans-serif; background: var(--cream); color: var(--text); line-height: 1.7; -webkit-font-smoothing: antialiased; font-size: 16px; overflow-x: hidden; }
h1, h2, h3, h4 { font-family: 'Cinzel', serif; line-height: 1.25; color: var(--charcoal); margin: 1.4em 0 0.6em; }
h1 { font-size: 1.5rem; font-weight: 600; }
h2 { font-size: 1.25rem; font-weight: 500; }
h3 { font-size: 1.1rem; font-family: 'Archivo Narrow', sans-serif; font-weight: 600; }
p { margin: 0 0 1em; text-align: left; }
a { color: var(--teal-dark); text-decoration: underline; text-decoration-color: rgba(42,138,125,0.3); }
a:hover { text-decoration-color: var(--teal-dark); }
img { max-width: 100%; height: auto; display: block; margin: 1.2em auto; border-radius: 8px; }
ul, ol { margin: 0 0 1em 1.4em; }
li { margin: 0.3em 0; }
blockquote { border-left: 3px solid var(--teal); padding: 8px 16px; margin: 1.2em 0; color: var(--text-light); font-style: italic; }
hr { border: none; border-top: 1px solid rgba(0,0,0,0.08); margin: 1.6em 0; }

.topbar { background: rgba(250,248,244,0.97); backdrop-filter: blur(20px); padding: 10px 16px; position: sticky; top: 0; z-index: 90; border-bottom: 1px solid rgba(0,0,0,0.06); display: flex; align-items: center; justify-content: space-between; }
.topbar img { height: 32px; margin: 0; }
.topbar a { font-size: 0.78rem; color: var(--charcoal); text-decoration: none; font-family: 'Cinzel', serif; }

.post-wrap { padding: 24px 20px 60px; }
.back-link { display: inline-flex; align-items: center; gap: 4px; color: var(--teal-dark); font-size: 0.78rem; text-decoration: none; margin-bottom: 24px; opacity: 0.85; }
.post-meta { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-light); margin-bottom: 6px; }
.post-meta .cat { color: var(--teal-dark); font-weight: 600; margin-right: 6px; }
.post-title { font-family: 'Cinzel', serif; font-size: 1.5rem; font-weight: 600; line-height: 1.2; color: var(--charcoal); margin: 0 0 10px; }
.post-byline { font-size: 0.78rem; color: var(--text-light); margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid rgba(0,0,0,0.08); }
.post-body { font-size: 0.92rem; }
.post-body :first-child { margin-top: 0; }
.post-tags { margin-top: 32px; padding-top: 16px; border-top: 1px solid rgba(0,0,0,0.08); font-size: 0.75rem; color: var(--text-light); }
.post-tags .tag { display: inline-block; background: rgba(0,0,0,0.04); padding: 2px 8px; border-radius: 50px; margin: 2px 2px 2px 0; }
.loading-msg { text-align: center; padding: 60px 16px; color: var(--text-light); }

.site-footer { background: var(--charcoal); color: var(--white); padding: 28px 20px; margin-top: 0; text-align: center; }
.site-footer p { font-size: 0.7rem; opacity: 0.6; margin: 3px 0; }
.site-footer a { color: var(--white); opacity: 0.7; }
.skip-link { position: absolute; left: -9999px; top: 0; z-index: 9999; padding: 12px 18px; background: var(--teal-dark); color: var(--white); font-weight: 600; border-radius: 0 0 6px 0; text-decoration: none; }
.skip-link:focus { left: 0; outline: 3px solid var(--gold); outline-offset: 2px; }
</style>
</head>
<body>
<a href="#main" class="skip-link">Skip to content</a>

<header class="topbar">
  <a href="index.html"><img src="../logo-lotus-teal.svg" alt="Salt Spring Centre of Yoga"></a>
  <a href="blog.html">Blog</a>
</header>

<article class="post-wrap">
  <a href="blog.html" class="back-link">&larr; All posts</a>
  <div id="postContent"><div class="loading-msg">Loading post...</div></div>
</article>

<footer class="site-footer">
  <p>Salt Spring Centre of Yoga &middot; Salt Spring Island, BC</p>
  <p>Dharma Sara Satsang Society &bull; Est. 1974</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
function decodeEntities(s) {
  if (!s) return '';
  var t = document.createElement('textarea');
  t.innerHTML = s;
  return t.value;
}

function parseFrontmatter(text) {
  var m = text.match(/^---\s*\n([\s\S]*?)\n---\s*\n?([\s\S]*)$/);
  if (!m) return { meta: {}, body: text };
  var meta = {};
  m[1].split('\n').forEach(function(line) {
    var idx = line.indexOf(':');
    if (idx === -1) return;
    var k = line.slice(0, idx).trim();
    var v = line.slice(idx + 1).trim();
    if (v.startsWith('[') && v.endsWith(']')) {
      try { meta[k] = JSON.parse(v); } catch(e) { meta[k] = []; }
    } else if (v.startsWith('"') && v.endsWith('"')) {
      try { meta[k] = JSON.parse(v); } catch(e) { meta[k] = v.slice(1, -1); }
    } else {
      meta[k] = v;
    }
  });
  return { meta: meta, body: m[2] };
}

function renderPost(file, meta, body) {
  // Resolve relative image paths so they load correctly from /m/
  var resolvedBody = body
    .replace(/(!\[[^\]]*\]\()(images\/)/g, '$1../posts/$2')
    .replace(/(<img[^>]+src=["'])(images\/)/g, '$1../posts/$2');
  var html = marked.parse(resolvedBody);

  var date = meta.date ? new Date(meta.date.replace(' ', 'T')) : null;
  var dateStr = date && !isNaN(date) ? date.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }) : (meta.date || '');
  var cats = (meta.categories || []).map(decodeEntities);
  var tags = (meta.tags || []).map(decodeEntities);
  var title = decodeEntities(meta.title || 'Untitled');
  document.title = title + ' - Salt Spring Centre of Yoga';

  document.getElementById('postContent').innerHTML =
    '<div class="post-meta">' + cats.map(function(c) { return '<span class="cat">' + c + '</span>'; }).join(' ') + '</div>' +
    '<h1 class="post-title">' + title + '</h1>' +
    '<div class="post-byline">' + (dateStr || '') + (meta.author ? ' &middot; by ' + meta.author : '') + '</div>' +
    '<div class="post-body">' + html + '</div>' +
    (tags.length ? '<div class="post-tags">Tags: ' + tags.map(function(t) { return '<span class="tag">' + t + '</span>'; }).join('') + '</div>' : '');
}

function loadPost() {
  var slug = new URLSearchParams(window.location.search).get('slug');
  var file = new URLSearchParams(window.location.search).get('file');
  if (!slug && !file) {
    document.getElementById('postContent').innerHTML = '<div class="loading-msg">No post specified. <a href="blog.html">Browse posts</a></div>';
    return;
  }

  function loadFile(f) {
    fetch('../posts/' + f)
      .then(function(r) {
        if (!r.ok) throw new Error('Post not found');
        return r.text();
      })
      .then(function(text) {
        var parsed = parseFrontmatter(text);
        renderPost(f, parsed.meta, parsed.body);
      })
      .catch(function(err) {
        document.getElementById('postContent').innerHTML = '<div class="loading-msg">Could not load post. <a href="blog.html">Back to blog</a></div>';
      });
  }

  if (file) {
    loadFile(file);
  } else {
    fetch('../posts/index.json')
      .then(function(r) { return r.json(); })
      .then(function(posts) {
        var match = posts.find(function(p) { return p.slug === slug; });
        if (match) loadFile(match.file);
        else document.getElementById('postContent').innerHTML = '<div class="loading-msg">Post not found. <a href="blog.html">Back to blog</a></div>';
      });
  }
}
loadPost();
</script>
</body>
</html>
