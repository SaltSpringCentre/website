<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #111; color: #fff; padding: 24px; }
h1 { font-size: 1.4rem; margin-bottom: 8px; font-weight: 400; opacity: 0.6; }
.toolbar { margin-bottom: 24px; display: flex; gap: 12px; align-items: center; }
.toolbar button { padding: 8px 16px; background: #333; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
.toolbar button:hover { background: #444; }
.save-status { font-size: 0.75rem; opacity: 0.4; }
h2 { font-size: 1rem; margin: 40px 0 12px; padding: 8px 12px; background: #1a1a1a; border-radius: 8px; font-weight: 500; color: #3bb8a8; display: flex; justify-content: space-between; align-items: center; }
h2 .count { font-size: 0.7rem; opacity: 0.4; font-weight: 400; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 8px; min-height: 60px; padding: 8px 0; }
.grid.drag-over { background: rgba(59,184,168,0.1); border-radius: 8px; }
.item { position: relative; border-radius: 6px; overflow: hidden; background: #222; cursor: grab; transition: opacity 0.2s, transform 0.2s; }
.item:active { cursor: grabbing; }
.item.dragging { opacity: 0.3; transform: scale(0.95); }
.item.drag-target { outline: 2px solid #3bb8a8; outline-offset: 2px; }
.item img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; pointer-events: none; }
.item .caption { padding: 6px 10px; font-size: 0.7rem; color: #999; cursor: text; min-height: 24px; outline: none; border: 1px solid transparent; border-radius: 3px; transition: 0.2s; }
.item .caption:hover { color: #ccc; }
.item .caption:focus { border-color: #3bb8a8; color: #fff; background: #1a1a1a; }
.item .url { display: none; }
</style>

var data = JSON.parse(localStorage.getItem('sscy_photos') || 'null') || JSON.parse(JSON.stringify(DEFAULT_DATA));
var dragItem = null;
var dragCat = null;

function render() {
  var el = document.getElementById('categories');
  el.innerHTML = '';
  Object.keys(data).forEach(function(cat) {
    var h = document.createElement('h2');
    h.innerHTML = cat + ' <span class="count">' + data[cat].length + '</span>';
    el.appendChild(h);
    var grid = document.createElement('div');
    grid.className = 'grid';
    grid.dataset.cat = cat;
    grid.addEventListener('dragover', function(e) { e.preventDefault(); this.classList.add('drag-over'); });
    grid.addEventListener('dragleave', function() { this.classList.remove('drag-over'); });
    grid.addEventListener('drop', function(e) {
      e.preventDefault();
      this.classList.remove('drag-over');
      if (!dragItem) return;
      var toCat = this.dataset.cat;
      if (dragCat !== toCat) {
        data[dragCat] = data[dragCat].filter(function(x) { return x.src !== dragItem.src; });
        data[toCat].push(dragItem);
      }
      save(); render();
    });
    data[cat].forEach(function(img, idx) {
      var item = document.createElement('div');
      item.className = 'item';
      item.draggable = true;
      item.addEventListener('dragstart', function() { dragItem = img; dragCat = cat; this.classList.add('dragging'); });
      item.addEventListener('dragend', function() { this.classList.remove('dragging'); dragItem = null; });
      var im = document.createElement('img');
      im.src = img.src;
      im.loading = 'lazy';
      item.appendChild(im);
      var cap = document.createElement('div');
      cap.className = 'caption';
      cap.contentEditable = true;
      cap.textContent = img.cap;
      cap.addEventListener('blur', function() { img.cap = this.textContent; save(); });
      cap.addEventListener('keydown', function(e) { if (e.key === 'Enter') { e.preventDefault(); this.blur(); } });
      item.appendChild(cap);
      grid.appendChild(item);
    });
    el.appendChild(grid);
  });
}

function save() {
  localStorage.setItem('sscy_photos', JSON.stringify(data));
  document.getElementById('saveStatus').textContent = 'Saved ' + new Date().toLocaleTimeString();
}

function exportData() {
  var blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'sscy-photos.json';
  a.click();
}

function resetAll() {
  if (confirm('Reset all changes? This cannot be undone.')) {
    data = JSON.parse(JSON.stringify(DEFAULT_DATA));
    localStorage.removeItem('sscy_photos');
    render();
  }
}

render();
</script>
