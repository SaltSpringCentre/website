<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #111; color: #fff; padding: 24px; }
h1 { font-size: 1.4rem; margin-bottom: 8px; font-weight: 400; opacity: 0.6; }
.toolbar { margin-bottom: 24px; display: flex; gap: 12px; align-items: center; }
.toolbar button { padding: 8px 16px; background: #333; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
.toolbar button:hover { background: #444; }
.save-status { font-size: 0.75rem; opacity: 0.4; }
h2 { font-size: 1rem; margin: 40px 0 12px; padding: 8px 12px; background: #1a1a1a; border-radius: 8px; font-weight: 500; color: #3bb8a8; display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
h2:hover { background: #222; }
h2 .count { font-size: 0.7rem; opacity: 0.4; font-weight: 400; margin-left: 8px; }
h2 .caret { font-size: 0.7rem; opacity: 0.5; margin-right: 6px; transition: transform 0.15s; display: inline-block; }
h2.collapsed .caret { transform: rotate(-90deg); }
.grid.collapsed { display: none; }
.search-box { flex: 1; max-width: 360px; padding: 8px 12px; background: #1a1a1a; border: 1px solid #333; border-radius: 6px; color: #fff; font-size: 0.85rem; outline: none; }
.search-box:focus { border-color: #3bb8a8; }
.item.hidden { display: none; }
.no-matches { padding: 8px 12px; color: #777; font-size: 0.85rem; font-style: italic; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 8px; min-height: 60px; padding: 8px 0; }
.grid.drag-over { background: rgba(59,184,168,0.1); border-radius: 8px; }
.item { position: relative; border-radius: 6px; overflow: hidden; background: #222; cursor: grab; transition: opacity 0.2s, transform 0.2s; }
.item:active { cursor: grabbing; }
.item.dragging { opacity: 0.3; transform: scale(0.95); }
.item.drag-target { outline: 2px solid #3bb8a8; outline-offset: 2px; }
.item img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; pointer-events: none; }
.item .caption { padding: 6px 10px; font-size: 0.7rem; color: #999; cursor: text; min-height: 24px; outline: none; border: 1px solid transparent; border-radius: 3px; transition: 0.2s; }
.item .caption:hover { color: #ccc; }
.item .caption:focus { border-color: #3bb8a8; color: #fff; background: #1a1a1a; }
.item .url { display: none; }
.banner-badge {
  position: absolute;
  top: 6px;
  right: 6px;
  padding: 3px 8px;
  border-radius: 50px;
  font-size: 0.62rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  pointer-events: none;
  background: #c9a84c;
  color: #111;
  box-shadow: 0 2px 6px rgba(0,0,0,0.5);
}
.banner-badge.concert { background: #3bb8a8; color: #041817; }
.banner-badge.retreat { background: #c17838; color: #1b0a03; }
.ctx-menu-divider { height: 1px; background: #2a2a2a; margin: 6px 4px; }
.ctx-menu-item.banner-opt { display: flex; align-items: center; gap: 8px; }
.ctx-menu-item.banner-opt .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; border: 1px solid #444; }
.ctx-menu-item.banner-opt.on .dot { border-color: #111; background: #c9a84c; }
.ctx-menu-item.banner-opt.on[data-val="concert"] .dot { background: #3bb8a8; }
.ctx-menu-item.banner-opt.on[data-val="retreat"] .dot { background: #c17838; }
.ctx-menu {
  position: fixed;
  z-index: 9999;
  background: #1a1a1a;
  border: 1px solid #333;
  border-radius: 8px;
  padding: 6px;
  min-width: 200px;
  max-height: 70vh;
  overflow-y: auto;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  font-size: 0.82rem;
}
.ctx-menu-header { padding: 8px 10px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: #666; border-bottom: 1px solid #2a2a2a; margin-bottom: 4px; }
.ctx-menu-item { padding: 7px 10px; border-radius: 4px; cursor: pointer; color: #ddd; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
.ctx-menu-item:hover { background: #3bb8a8; color: #000; }
.ctx-menu-item.current { opacity: 0.4; cursor: default; }
.ctx-menu-item.current:hover { background: transparent; color: #ddd; }
.ctx-menu-item .ctx-count { font-size: 0.7rem; opacity: 0.5; }
</style>
</head>

var data = JSON.parse(localStorage.getItem('sscy_photos') || 'null') || JSON.parse(JSON.stringify(DEFAULT_DATA));
var collapsedState = JSON.parse(localStorage.getItem('sscy_photos_collapsed') || '{"Blog Library":true}');
var dragItem = null;
var dragCat = null;

// Merge any categories/photos from the published JSON that aren't already
// in localStorage. Preserves local edits (captions, banner flags, order)
// while picking up newly imported images.
function mergeFromPublished() {
  return fetch('sscy-photos.json', { cache: 'no-cache' })
    .then(function (r) { return r.ok ? r.json() : null; })
    .then(function (remote) {
      if (!remote) return false;
      var changed = false;
      Object.keys(remote).forEach(function (cat) {
        if (!data[cat]) {
          data[cat] = remote[cat].slice();
          changed = true;
          return;
        }
        var existingSrcs = {};
        data[cat].forEach(function (p) { if (p && p.src) existingSrcs[p.src] = true; });
        remote[cat].forEach(function (p) {
          if (p && p.src && !existingSrcs[p.src]) {
            data[cat].push(p);
            changed = true;
          }
        });
      });
      if (changed) save();
      return changed;
    })
    .catch(function () { return false; });
}

function render() {
  var el = document.getElementById('categories');
  el.innerHTML = '';
  Object.keys(data).forEach(function(cat) {
    var isCollapsed = !!collapsedState[cat];
    var h = document.createElement('h2');
    h.dataset.cat = cat;
    if (isCollapsed) h.classList.add('collapsed');
    h.innerHTML = '<span><span class="caret">&#9660;</span>' + cat + '</span><span class="count">' + data[cat].length + '</span>';
    h.addEventListener('click', function() {
      var wasCollapsed = !!collapsedState[cat];
      collapsedState[cat] = !wasCollapsed;
      localStorage.setItem('sscy_photos_collapsed', JSON.stringify(collapsedState));
      this.classList.toggle('collapsed', !wasCollapsed);
      var g = this.nextElementSibling;
      if (g && g.classList.contains('grid')) g.classList.toggle('collapsed', !wasCollapsed);
    });
    el.appendChild(h);
    var grid = document.createElement('div');
    grid.className = 'grid' + (isCollapsed ? ' collapsed' : '');
    grid.dataset.cat = cat;
    grid.addEventListener('dragover', function(e) { e.preventDefault(); this.classList.add('drag-over'); });
    grid.addEventListener('dragleave', function() { this.classList.remove('drag-over'); });
    grid.addEventListener('drop', function(e) {
      e.preventDefault();
      this.classList.remove('drag-over');
      if (!dragItem) return;
      var toCat = this.dataset.cat;
      if (dragCat !== toCat) {
        data[dragCat] = data[dragCat].filter(function(x) { return x.src !== dragItem.src; });
        data[toCat].push(dragItem);
      }
      save(); render();
    });
    data[cat].forEach(function(img, idx) {
      var item = document.createElement('div');
      item.className = 'item';
      item.dataset.cap = (img.cap || '').toLowerCase();
      item.dataset.src = (img.src || '').toLowerCase();
      item.draggable = true;
      item.addEventListener('dragstart', function() { dragItem = img; dragCat = cat; this.classList.add('dragging'); });
      item.addEventListener('dragend', function() { this.classList.remove('dragging'); dragItem = null; });
      item.addEventListener('contextmenu', function(e) { e.preventDefault(); showContextMenu(e, img, cat); });
      var im = document.createElement('img');
      im.src = img.src;
      im.loading = 'lazy';
      item.appendChild(im);
      if (img.banner) {
        var badge = document.createElement('div');
        var label;
        if (img.banner === 'concert') { badge.className = 'banner-badge concert'; label = 'Banner · Concert'; }
        else if (img.banner === 'retreat') { badge.className = 'banner-badge retreat'; label = 'Banner · Retreat'; }
        else { badge.className = 'banner-badge'; label = 'Banner'; }
        badge.textContent = label;
        item.appendChild(badge);
      }
      var cap = document.createElement('div');
      cap.className = 'caption';
      cap.contentEditable = true;
      cap.textContent = img.cap;
      cap.addEventListener('blur', function() { img.cap = this.textContent; item.dataset.cap = (img.cap || '').toLowerCase(); save(); });
      cap.addEventListener('keydown', function(e) { if (e.key === 'Enter') { e.preventDefault(); this.blur(); } });
      item.appendChild(cap);
      grid.appendChild(item);
    });
    el.appendChild(grid);
  });
  if (document.getElementById('searchBox') && document.getElementById('searchBox').value) applyFilter();
}

function applyFilter() {
  var q = (document.getElementById('searchBox').value || '').trim().toLowerCase();
  var grids = document.querySelectorAll('.grid');
  grids.forEach(function(grid) {
    var cat = grid.dataset.cat;
    var header = grid.previousElementSibling;
    var items = grid.querySelectorAll('.item');
    if (!q) {
      // No search: restore per-category collapsed state, unhide items.
      items.forEach(function(it) { it.classList.remove('hidden'); });
      var isCollapsed = !!collapsedState[cat];
      grid.classList.toggle('collapsed', isCollapsed);
      if (header) header.classList.toggle('collapsed', isCollapsed);
      if (header) header.style.display = '';
      return;
    }
    var anyVisible = false;
    items.forEach(function(it) {
      var match = (it.dataset.cap || '').indexOf(q) !== -1 || (it.dataset.src || '').indexOf(q) !== -1;
      it.classList.toggle('hidden', !match);
      if (match) anyVisible = true;
    });
    // Any match: auto-expand so results are visible; also show header.
    if (anyVisible) {
      grid.classList.remove('collapsed');
      if (header) { header.classList.remove('collapsed'); header.style.display = ''; }
    } else {
      if (header) header.style.display = 'none';
      grid.classList.add('collapsed');
    }
  });
}

function showContextMenu(ev, img, fromCat) {
  closeContextMenu();
  var menu = document.createElement('div');
  menu.className = 'ctx-menu';
  menu.id = 'ctxMenu';
  menu.addEventListener('click', function(e) { e.stopPropagation(); });

  // Banner flag section
  var bHead = document.createElement('div');
  bHead.className = 'ctx-menu-header';
  bHead.textContent = 'Use as banner';
  menu.appendChild(bHead);

  [
    { val: null, label: 'None' },
    { val: true, label: 'Any event' },
    { val: 'concert', label: 'Concerts only' },
    { val: 'retreat', label: 'Retreats only' }
  ].forEach(function(opt) {
    var row = document.createElement('div');
    var current = !!img.banner === !!opt.val && img.banner === opt.val;
    row.className = 'ctx-menu-item banner-opt' + (current ? ' on' : '');
    if (opt.val) row.setAttribute('data-val', opt.val === true ? 'any' : opt.val);
    var dot = document.createElement('span');
    dot.className = 'dot';
    var lbl = document.createElement('span');
    lbl.textContent = opt.label;
    row.appendChild(dot);
    row.appendChild(lbl);
    row.addEventListener('click', function() {
      if (opt.val === null) delete img.banner;
      else img.banner = opt.val;
      save();
      render();
      closeContextMenu();
    });
    menu.appendChild(row);
  });

  var divider = document.createElement('div');
  divider.className = 'ctx-menu-divider';
  menu.appendChild(divider);

  var header = document.createElement('div');
  header.className = 'ctx-menu-header';
  header.textContent = 'Move to category';
  menu.appendChild(header);

  Object.keys(data).forEach(function(targetCat) {
    var row = document.createElement('div');
    row.className = 'ctx-menu-item' + (targetCat === fromCat ? ' current' : '');
    var label = document.createElement('span');
    label.textContent = targetCat + (targetCat === fromCat ? ' (current)' : '');
    var count = document.createElement('span');
    count.className = 'ctx-count';
    count.textContent = data[targetCat].length;
    row.appendChild(label);
    row.appendChild(count);
    if (targetCat !== fromCat) {
      row.addEventListener('click', function() {
        data[fromCat] = data[fromCat].filter(function(x) { return x.src !== img.src; });
        data[targetCat].push(img);
        save();
        render();
        closeContextMenu();
      });
    }
    menu.appendChild(row);
  });

  document.body.appendChild(menu);

  // Position: prefer at cursor, but stay on screen.
  var rect = menu.getBoundingClientRect();
  var x = ev.clientX;
  var y = ev.clientY;
  if (x + rect.width > window.innerWidth - 12) x = window.innerWidth - rect.width - 12;
  if (y + rect.height > window.innerHeight - 12) y = window.innerHeight - rect.height - 12;
  menu.style.left = Math.max(12, x) + 'px';
  menu.style.top = Math.max(12, y) + 'px';
}

function closeContextMenu() {
  var m = document.getElementById('ctxMenu');
  if (m) m.remove();
}

document.addEventListener('click', closeContextMenu);
document.addEventListener('scroll', function(e) {
  var m = document.getElementById('ctxMenu');
  if (m && e.target && m.contains(e.target)) return;
  closeContextMenu();
}, true);
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeContextMenu(); });

function save() {
  localStorage.setItem('sscy_photos', JSON.stringify(data));
  document.getElementById('saveStatus').textContent = 'Saved ' + new Date().toLocaleTimeString();
}

function exportData() {
  var blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'sscy-photos.json';
  a.click();
}

function resetAll() {
  if (confirm('Reset all changes? This cannot be undone.')) {
    data = JSON.parse(JSON.stringify(DEFAULT_DATA));
    localStorage.removeItem('sscy_photos');
    render();
  }
}

render();
mergeFromPublished().then(function (changed) { if (changed) render(); });
</script>
