<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wireframe: Intent-Based Spatial v3</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f5f0e8; font-family: system-ui; overflow: hidden; height: 100vh; color: #333; }

/* ===== LANDING: Orbiting intents ===== */
.landing-scene { height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; transition: opacity 0.6s ease; }
.landing-scene.gone { opacity: 0; pointer-events: none; }

.orbit-ring { position: relative; width: 100vw; height: 100vh; }

.orbit-item {
  position: absolute; width: 240px; height: 280px;
  border-radius: 24px; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: #fff; box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  transition: transform 0.15s ease-out, box-shadow 0.3s ease;
  will-change: transform;
}

.orbit-item:nth-child(1) { background: linear-gradient(160deg, #1a5c53, #2a8a7d); }
.orbit-item:nth-child(2) { background: linear-gradient(160deg, #8a6a3a, #aa8a5a); }
.orbit-item:nth-child(3) { background: linear-gradient(160deg, #3a5a8a, #5a7aaa); }
.orbit-item:nth-child(4) { background: linear-gradient(160deg, #7a6a3a, #9a8a5a); }

.orbit-item:hover { box-shadow: 0 20px 56px rgba(0,0,0,0.2); }

.oi-icon { font-size: 2.5rem; margin-bottom: 16px; opacity: 0.5; }
.oi-label { font-size: 1.3rem; font-weight: 500; letter-spacing: 0.04em; margin-bottom: 8px; }
.oi-sub { font-size: 0.75rem; opacity: 0.55; text-align: center; padding: 0 20px; line-height: 1.5; }

.orbit-center {
  position: absolute; top: 12%; left: 50%; transform: translateX(-50%);
  text-align: center; z-index: 5; pointer-events: none;
}

.orbit-center h1 { font-size: 1.6rem; font-weight: 300; color: #888; letter-spacing: 0.08em; }
.orbit-center .hint { font-size: 0.7rem; color: #bbb; margin-top: 8px; }

/* ===== CONTENT STATE ===== */
.content-state {
  position: fixed; inset: 0; background: #f5f0e8;
  opacity: 0; pointer-events: none;
  transition: opacity 0.5s ease 0.2s;
  overflow-y: auto;
}

.content-state.active { opacity: 1; pointer-events: auto; }

/* Top bar */
.top-bar {
  position: sticky; top: 0; z-index: 50;
  padding: 16px 32px; display: flex; justify-content: space-between; align-items: center;
  background: rgba(245,240,232,0.95); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(0,0,0,0.06);
}

.top-bar .back {
  background: none; border: 1.5px solid #ccc; border-radius: 50px; padding: 10px 24px;
  cursor: pointer; font-size: 0.82rem; color: #888; transition: 0.25s;
  display: flex; align-items: center; gap: 8px;
}

.top-bar .back:hover { border-color: #999; color: #444; }

.top-bar .intent-name { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.14em; color: #1a5c53; font-weight: 600; }

.switcher { display: flex; gap: 6px; }

.sw {
  width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid #ddd;
  background: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 0.9rem; color: #999; transition: all 0.3s ease;
}

.sw:hover { border-color: #1a5c53; color: #1a5c53; }
.sw.active { background: #1a5c53; color: #fff; border-color: #1a5c53; }

/* Card grid - settles into readable layout with depth on hover */
.card-area { padding: 32px; max-width: 1100px; margin: 0 auto; }

.card-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px;
  perspective: 800px;
}

.grid-card {
  background: #fff; border-radius: 20px; overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  cursor: pointer; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  transform-style: preserve-3d;
  opacity: 0; transform: translateY(40px) rotateX(5deg);
  animation: cardIn 0.6s ease forwards;
}

.grid-card:nth-child(1) { animation-delay: 0.05s; }
.grid-card:nth-child(2) { animation-delay: 0.1s; }
.grid-card:nth-child(3) { animation-delay: 0.15s; }
.grid-card:nth-child(4) { animation-delay: 0.2s; }
.grid-card:nth-child(5) { animation-delay: 0.25s; }
.grid-card:nth-child(6) { animation-delay: 0.3s; }

@keyframes cardIn { to { opacity: 1; transform: none; } }

.grid-card:hover {
  box-shadow: 0 20px 48px rgba(0,0,0,0.12);
  z-index: 5;
}

.gc-visual {
  height: 180px; display: flex; align-items: center; justify-content: center;
  font-size: 2.5rem; opacity: 0.15;
}

.gc-body { padding: 24px; }
.gc-tag { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.12em; font-weight: 600; margin-bottom: 6px; }
.gc-title { font-size: 1.1rem; font-weight: 600; color: #333; margin-bottom: 8px; }
.gc-desc { font-size: 0.82rem; color: #999; line-height: 1.5; }

/* Intent colors */
.gc-peace .gc-visual { background: linear-gradient(135deg, #d4ece8, #b0d8d0); }
.gc-peace .gc-tag { color: #1a5c53; }
.gc-learn .gc-visual { background: linear-gradient(135deg, #ece0d4, #d8c8b0); }
.gc-learn .gc-tag { color: #8a6a3a; }
.gc-give .gc-visual { background: linear-gradient(135deg, #d4e0ec, #b0c8d8); }
.gc-give .gc-tag { color: #3a5a8a; }
.gc-host .gc-visual { background: linear-gradient(135deg, #ece8d4, #d8d0b0); }
.gc-host .gc-tag { color: #7a6a3a; }

/* Quote break between cards */
.quote-break {
  grid-column: 1 / -1; text-align: center; padding: 40px 24px;
  background: rgba(0,0,0,0.02); border-radius: 20px;
}

.quote-break q { font-style: italic; font-size: 1.1rem; color: #666; }
.quote-break cite { display: block; font-size: 0.72rem; color: #bbb; margin-top: 8px; font-style: normal; text-transform: uppercase; letter-spacing: 0.1em; }

@media (max-width: 900px) {
  .card-grid { grid-template-columns: 1fr; max-width: 400px; margin: 0 auto; }
  .orbit-item { width: 180px; height: 220px; }
}
</style>
</head>
<body>

<!-- LANDING: Orbiting intents -->
<div class="landing-scene" id="landingScene">
  <div class="orbit-center">
    <h1>What brings you here?</h1>
    <div class="hint">click to explore</div>
  </div>
  <div class="orbit-ring" id="orbitRing">
    <div class="orbit-item" onclick="enter('peace')">
      <div class="oi-icon">&#x25CB;</div>
      <div class="oi-label">Find Peace</div>
      <div class="oi-sub">Retreats, wellness, the land</div>
    </div>
    <div class="orbit-item" onclick="enter('learn')">
      <div class="oi-icon">&#x25B3;</div>
      <div class="oi-label">Learn</div>
      <div class="oi-sub">Classes, training, philosophy</div>
    </div>
    <div class="orbit-item" onclick="enter('give')">
      <div class="oi-icon">&#x25C7;</div>
      <div class="oi-label">Give Back</div>
      <div class="oi-sub">Karma yoga, donate, shop</div>
    </div>
    <div class="orbit-item" onclick="enter('host')">
      <div class="oi-icon">&#x25A1;</div>
      <div class="oi-label">Host</div>
      <div class="oi-sub">Venues, rentals, events</div>
    </div>
  </div>
</div>


<!-- CONTENT STATE -->
<div class="content-state" id="contentState">
  <div class="top-bar">
    <button class="back" onclick="goBack()">&#8592; Back</button>
    <span class="intent-name" id="intentName"></span>
    <div class="switcher">
      <button class="sw" id="sw-peace" onclick="switchTo('peace')">&#x25CB;</button>
      <button class="sw" id="sw-learn" onclick="switchTo('learn')">&#x25B3;</button>
      <button class="sw" id="sw-give" onclick="switchTo('give')">&#x25C7;</button>
      <button class="sw" id="sw-host" onclick="switchTo('host')">&#x25A1;</button>
    </div>
  </div>
  <div class="card-area">
    <div class="card-grid" id="cardGrid"></div>
  </div>
</div>

<script>
var intentData = {
  peace: {
    label: "Find Peace", color: "peace",
    cards: [
      {tag:"Retreat", title:"Weekend Yoga Retreat", desc:"2 nights of practice, rest, and renewal"},
      {tag:"Retreat", title:"Silent Retreat", desc:"Going deeper through stillness"},
      {tag:"Wellness", title:"Ayurveda Treatments", desc:"Ancient healing for modern bodies"},
      {tag:"The Land", title:"69 Acres of Sanctuary", desc:"Forests, gardens, ponds, and temples"},
      {tag:"Personal", title:"Personal Retreat", desc:"Come on your own terms"},
      {tag:"Wellness", title:"Swedish Massage", desc:"Restore and release"},
    ],
    quote: {text:"Peace. No more than that.", cite:"Baba Hari Dass, 1976"}
  },
  learn: {
    label: "Learn", color: "learn",
    cards: [
      {tag:"Training", title:"200-Hour Teacher Training", desc:"Become a certified yoga teacher"},
      {tag:"Classes", title:"Weekly Yoga Classes", desc:"Asana, pranayama, meditation"},
      {tag:"Study", title:"Yoga Study Groups", desc:"Scriptures, philosophy, practice"},
      {tag:"Satsang", title:"Sunday Satsang", desc:"Community gathering and teachings"},
      {tag:"Books", title:"Babaji's Writings", desc:"30+ books on yoga and life"},
      {tag:"Events", title:"Music for Peace", desc:"Indian classical concert series"},
    ],
    quote: {text:"As soon as a person starts thinking I want to be a better person, that is the start of yoga.", cite:"Baba Hari Dass"}
  },
  give: {
    label: "Give Back", color: "give",
    cards: [
      {tag:"Karma Yoga", title:"Volunteer Program", desc:"Live and serve at the Centre"},
      {tag:"Donate", title:"Support the Sanctuary", desc:"Every gift preserves 69 acres"},
      {tag:"Shop", title:"Books & Merch", desc:"Purchases support the Centre"},
      {tag:"Membership", title:"Become a Member", desc:"Join the Dharma Sara Satsang Society"},
      {tag:"Garden", title:"Sponsor a Garden Bed", desc:"Keep the organic farm growing"},
      {tag:"Community", title:"Feed a Karma Yogi", desc:"Cover meals for a volunteer"},
    ],
    quote: {text:"People can't say we live here and we don't want to help the Centre.", cite:"Baba Hari Dass, 1989"}
  },
  host: {
    label: "Host", color: "host",
    cards: [
      {tag:"Venue", title:"Satsang Room", desc:"Ceremony and gathering space"},
      {tag:"Venue", title:"Pond Dome", desc:"Geodesic dome by the water"},
      {tag:"Venue", title:"Garden House", desc:"Yoga studio with accommodation"},
      {tag:"Venue", title:"Sauna", desc:"Wood-burning, night sky views"},
      {tag:"Event", title:"Host a Retreat", desc:"Multi-day programs on sacred land"},
      {tag:"Event", title:"Host a Workshop", desc:"Day events and gatherings"},
    ],
    quote: {text:"This kind of place is for nad yoga.", cite:"Baba Hari Dass, 1981"}
  }
};

var currentKey = null;
var items = document.querySelectorAll('.orbit-item');
var cx = window.innerWidth / 2;
var cy = window.innerHeight / 2;
var angle = 0;
var autoSpeed = 0.003;
var mouseInfluence = 0;
var mouseX = 0.5;
var radius = Math.min(window.innerWidth, window.innerHeight) * 0.28;
var hoveredIndex = -1;

document.addEventListener('mousemove', function(e) {
  mouseX = e.clientX / window.innerWidth;
  // Mouse left of center slows/reverses, right speeds up
  mouseInfluence = (mouseX - 0.5) * 0.008;
});

function positionCards() {
  items.forEach(function(item, i) {
    var a = angle + (i * Math.PI * 0.5); // 4 items, 90 degrees apart
    var x = cx + Math.cos(a) * radius - 120;
    var y = cy + Math.sin(a) * radius * 0.35 - 140; // elliptical, flatter
    var z = Math.sin(a); // -1 to 1, for depth
    var scale = 0.85 + (z + 1) * 0.15; // 0.85 to 1.15
    var opacity = 0.5 + (z + 1) * 0.25; // 0.5 to 1.0

    // Hovered card pops forward
    if (hoveredIndex === i) {
      scale = 1.12;
      opacity = 1;
    }

    item.style.left = x + 'px';
    item.style.top = y + 'px';
    item.style.transform = 'scale(' + scale + ')';
    item.style.opacity = opacity;
    item.style.zIndex = Math.round((z + 1) * 10);
  });
}

// Hover tracking
items.forEach(function(item, i) {
  item.addEventListener('mouseenter', function() { hoveredIndex = i; });
  item.addEventListener('mouseleave', function() { hoveredIndex = -1; });
});

// Animation loop
var isLanding = true;
function animateOrbit() {
  if (isLanding) {
    angle += autoSpeed + mouseInfluence;
    positionCards();
  }
  requestAnimationFrame(animateOrbit);
}
animateOrbit();

// Resize handler
window.addEventListener('resize', function() {
  cx = window.innerWidth / 2;
  cy = window.innerHeight / 2;
  radius = Math.min(window.innerWidth, window.innerHeight) * 0.28;
});

function enter(key) {
  currentKey = key;
  isLanding = false;

  // Cards scatter outward
  items.forEach(function(item, i) {
    var a = angle + (i * Math.PI * 0.5);
    var scatterX = Math.cos(a) * window.innerWidth;
    var scatterY = Math.sin(a) * window.innerHeight;
    item.style.transition = 'all 0.6s cubic-bezier(0.16, 1, 0.3, 1)';
    item.style.transform = 'translate(' + scatterX * 0.3 + 'px, ' + scatterY * 0.3 + 'px) scale(0.3)';
    item.style.opacity = '0';
  });

  setTimeout(function() {
    document.getElementById('landingScene').classList.add('gone');
    showContent(key);
  }, 400);
}

function showContent(key) {
  var d = intentData[key];
  document.getElementById('contentState').classList.add('active');
  document.getElementById('intentName').textContent = d.label;

  document.querySelectorAll('.sw').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('sw-' + key).classList.add('active');

  var grid = document.getElementById('cardGrid');
  var html = '';

  d.cards.forEach(function(c, i) {
    html += '<div class="grid-card gc-' + d.color + '" style="animation-delay:' + (i * 0.06) + 's">';
    html += '<div class="gc-visual">&#x2727;</div>';
    html += '<div class="gc-body"><div class="gc-tag">' + c.tag + '</div><div class="gc-title">' + c.title + '</div><div class="gc-desc">' + c.desc + '</div></div>';
    html += '</div>';

    // Insert quote after 3rd card
    if (i === 2 && d.quote) {
      html += '<div class="quote-break" style="animation-delay:0.2s"><q>' + d.quote.text + '</q><cite>' + d.quote.cite + '</cite></div>';
    }
  });

  grid.innerHTML = html;

  // 3D tilt on hover
  grid.querySelectorAll('.grid-card').forEach(function(card) {
    card.addEventListener('mousemove', function(e) {
      var r = card.getBoundingClientRect();
      var x = (e.clientX - r.left) / r.width - 0.5;
      var y = (e.clientY - r.top) / r.height - 0.5;
      card.style.transform = 'perspective(600px) rotateY(' + (x * 12) + 'deg) rotateX(' + (-y * 8) + 'deg) translateY(-6px)';
    });
    card.addEventListener('mouseleave', function() {
      card.style.transform = '';
    });
  });
}

function switchTo(key) {
  if (key === currentKey) return;
  currentKey = key;

  var grid = document.getElementById('cardGrid');
  grid.style.opacity = '0';
  grid.style.transform = 'translateY(20px)';
  grid.style.transition = 'all 0.3s ease';

  setTimeout(function() {
    showContent(key);
    grid.style.opacity = '1';
    grid.style.transform = 'none';
  }, 300);
}

function goBack() {
  currentKey = null;
  document.getElementById('contentState').classList.remove('active');

  setTimeout(function() {
    document.getElementById('landingScene').classList.remove('gone');
    // Reset card transitions and restart orbit
    items.forEach(function(item) {
      item.style.transition = 'transform 0.15s ease-out, box-shadow 0.3s ease';
      item.style.opacity = '1';
    });
    isLanding = true;
  }, 200);
}
</script>
</body>
</html>
