<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACYR Schedule Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Archivo+Narrow:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --slot-h: 24px;
            --legend-w: 80px;
            --gutter-w: 24px;
            --first-gutter-w: 36px;
            --toolbar-h: 44px;
        }
        html, body {
            font-family: 'Archivo Narrow', Arial, sans-serif;
            background: #e8e8e8;
            overflow: auto;
        }

        /* Toolbar */
        .toolbar {
            position: fixed; top:0; left:0; right:0; height: var(--toolbar-h);
            background: #2c2c2c; color: #fff; display: flex; align-items: center;
            padding: 0 12px; gap: 6px; z-index: 1000; font-size: 0.7rem;
        }
        .tb-group { display:flex; align-items:center; gap:4px; padding:0 8px; border-right:1px solid rgba(255,255,255,0.1); height:100%; }
        .tb-group:last-child { border-right:none; }
        .tb-label { font-size:0.55rem; text-transform:uppercase; letter-spacing:0.06em; opacity:0.4; margin-right:3px; }
        .tb-btn {
            padding:4px 10px; border-radius:3px; border:1px solid rgba(255,255,255,0.12);
            background:rgba(255,255,255,0.05); color:#fff; font-size:0.65rem; cursor:pointer; font-family:inherit;
        }
        .tb-btn:hover { background:rgba(255,255,255,0.12); }
        .tb-btn.primary { background:#17A698; border-color:#17A698; }
        .tb-btn.primary:hover { background:#1fc4b3; }
        .vswatch {
            width:20px; height:20px; border-radius:3px; cursor:pointer;
            border:2px solid transparent; transition: border-color 0.15s;
        }
        .vswatch:hover, .vswatch.active { border-color:#fff; }

        /* Schedule container - framed with breathing room */
        .sched-wrap { margin-top: var(--toolbar-h); padding: 20px 20px 60px; }
        .sched { border: 1px solid #aaa; background: #fff; display: flex; flex-direction: column; }

        /* Title banner - slim fit */
        .title-banner {
            background: linear-gradient(135deg, #17A698, #1fc4b3);
            padding: 6px 20px; text-align: center;
        }
        .title-text {
            font-family:'Cinzel',serif; font-weight:700; font-size:1.6rem;
            color:#fff; letter-spacing:3px; text-transform:uppercase;
        }

        /* Bottom bar matching title - tall enough for reception overlap */
        .bottom-bar {
            padding: 16px; text-align: center;
        }

        /* Headers row */
        .headers { display: flex; }
        .hdr {
            display:flex; align-items:center; justify-content:center; text-align:center;
            font-weight:700; font-size:0.75rem; padding:6px 4px; color:#fff;
        }
        .hdr-legend { width: var(--legend-w); background:#333; font-size:0.5rem; text-transform:uppercase; letter-spacing:0.08em; line-height:1.2; }
        .hdr-gutter { width: var(--gutter-w); background:#F4D352; font-size:0.72rem; font-weight:700; color:#5a4a00; }
        .hdr-day { flex:1; background:#17A698; }
        .hdr-gutter.last { background:#F4D352; font-size:0.6rem; }

        /* Grid body: legend + [gutter + day-col] * N + gutter */
        .grid-body { display: flex; }

        /* Venue legend - color fills behind name, white text */
        .legend { width: var(--legend-w); border-right:1px solid #ddd; display:flex; flex-direction:column; }
        .leg-item { display:flex; align-items:center; justify-content:center; text-align:center; padding:4px 8px; font-weight:700; flex:1; color:#fff; text-shadow:0 1px 2px rgba(0,0,0,0.3); border-bottom:1px solid rgba(255,255,255,0.15); position:relative; cursor:grab; }
        .leg-item.active-venue { outline:2px solid #fff; outline-offset:-2px; }
        .leg-item.dragging { opacity:0.4; }
        .leg-item.drag-over { border-bottom:3px solid #fff; }
        .leg-item .leg-x {
            position:absolute; top:2px; right:2px; width:12px; height:12px;
            display:none; align-items:center; justify-content:center;
            font-size:0.45rem; color:rgba(255,255,255,0.7); background:rgba(0,0,0,0.3);
            border-radius:50%; cursor:pointer; z-index:4;
        }
        .leg-item:hover .leg-x { display:flex; }
        .leg-item .leg-x:hover { background:rgba(200,0,0,0.7); color:#fff; }

        /* Time gutter - ALL gutters use the same yellow from the PDF */
        .gutter {
            width: var(--gutter-w); background: #F4D352; display:flex; flex-direction:column;
            border-left:1px solid #e0c040; border-right:1px solid #e0c040;
            overflow: visible; position: relative; z-index: 3;
        }
        .gut-slot {
            height: var(--slot-h); display:flex; align-items:center; justify-content:center;
            font-size:0.72rem; font-weight:700;
            border-bottom: 1px solid rgba(0,0,0,0.06);
            overflow: visible; position: relative; z-index: 1;
        }
        .gut-slot.hour { border-bottom-color: rgba(0,0,0,0.12); }

        /* Day column - row stripes matching PDF mint/cyan */
        .day-col {
            flex:1; position:relative;
            min-height: calc(var(--slot-h) * 34);
            background: repeating-linear-gradient(
                to bottom,
                #e6f5f0 0px, #e6f5f0 calc(var(--slot-h)*2),
                #f0faf7 calc(var(--slot-h)*2), #f0faf7 calc(var(--slot-h)*4)
            );
        }
        .sline { position:absolute; left:0; right:0; height:1px; background:#e8e8e8; pointer-events:none; }
        .sline.hour { background:#ccc; }

        /* Events - no rounded corners, no gaps */
        .ev {
            position:absolute; border-radius:0; padding:0 3px;
            overflow:hidden; cursor:pointer; font-size:0.58rem; line-height:1.15;
            display:flex; flex-direction:column; justify-content:center; align-items:center;
            text-align:center; border:none; z-index:2;
            box-sizing:border-box;
        }
        .ev .ev-x {
            position:absolute; top:1px; right:1px; width:14px; height:14px;
            display:none; align-items:center; justify-content:center;
            font-size:0.5rem; color:rgba(255,255,255,0.7); background:rgba(0,0,0,0.35);
            border-radius:50%; cursor:pointer; line-height:1; z-index:4;
        }
        .ev:hover .ev-x { display:flex; }
        .ev .ev-x:hover { background:rgba(200,0,0,0.7); color:#fff; }
        /* Spanning label that covers multiple color columns */
        .ev-span-label {
            position:absolute; z-index:3; pointer-events:none;
            display:flex; align-items:center; justify-content:center; text-align:center;
            font-size:0.58rem; line-height:1.15; font-weight:700;
            color:#fff; text-shadow:0 1px 1px rgba(0,0,0,0.25);
        }
        .ev:hover { filter:brightness(1.08); }
        .ev.selected { outline:2px solid #fff; outline-offset:-2px; z-index:5; }
        .ev .ev-resize { position:absolute; bottom:0; left:0; right:0; height:6px; cursor:ns-resize; }
        .ev .ev-resize:hover { background:rgba(255,255,255,0.3); }

        /* Edit popover */
        .edit-pop {
            position:fixed; z-index:2000; background:#2c2c2c; color:#fff;
            padding:12px; border-radius:6px; box-shadow:0 8px 30px rgba(0,0,0,0.5);
            font-size:0.65rem; width:220px; display:none;
        }
        .edit-pop.show { display:block; }
        .ep-drag-handle { cursor:grab; padding:2px 0 8px; margin:-4px -4px 8px; text-align:center; border-bottom:1px solid #444; }
        .ep-drag-handle:active { cursor:grabbing; }
        .ep-drag-grip { width:30px; height:4px; background:rgba(255,255,255,0.15); border-radius:2px; display:inline-block; }
        .edit-pop label { display:block; margin-bottom:3px; font-size:0.55rem; opacity:0.5; text-transform:uppercase; letter-spacing:0.05em; }
        .edit-pop input[type=text], .edit-pop textarea {
            width:100%; background:#444; color:#fff; border:1px solid #555;
            padding:4px 6px; border-radius:3px; font-family:inherit; font-size:0.65rem; margin-bottom:8px;
        }
        .edit-pop textarea { height:40px; resize:vertical; }
        .edit-pop select {
            width:100%; background:#444; color:#fff; border:1px solid #555;
            padding:4px 6px; border-radius:3px; font-family:inherit; font-size:0.65rem; margin-bottom:8px;
        }
        .edit-pop .ep-row { display:flex; gap:6px; align-items:center; margin-bottom:8px; }
        .edit-pop .ep-btn {
            padding:4px 10px; border-radius:3px; border:1px solid #555;
            background:#444; color:#fff; font-size:0.6rem; cursor:pointer; font-family:inherit;
        }
        .edit-pop .ep-btn:hover { background:#555; }
        .edit-pop .ep-btn.del { color:#f66; border-color:#f66; }
        .edit-pop .ep-btn.del:hover { background:#f66; color:#fff; }

        .venue-pick {
            width:28px; height:28px; border-radius:4px; cursor:pointer;
            border:2px solid transparent; transition:border-color 0.1s;
            display:flex; align-items:center; justify-content:center;
            font-size:0.45rem; color:#fff; text-shadow:0 1px 1px rgba(0,0,0,0.3);
            overflow:hidden; line-height:1;
        }
        .venue-pick:hover { border-color:rgba(255,255,255,0.5); }
        .venue-pick.selected { border-color:#fff; }

        /* Drag ghost */
        .drag-ghost {
            position:fixed; pointer-events:none; z-index:3000;
            border:2px dashed rgba(255,255,255,0.5); border-radius:0; opacity:0.6;
        }
        .ev-t { font-weight:700; }
        .ev-s { font-size:0.5rem; opacity:0.75; }
        .ev.lt .ev-t, .ev.lt .ev-s { color:#fff; text-shadow:0 1px 1px rgba(0,0,0,0.2); }
        .ev.dk .ev-t, .ev.dk .ev-s { color:#333; text-shadow:none; }

        /* Reception - narrow inset white box with outlined circle */
        .rec-block {
            position:absolute; z-index:2;
            display:flex; align-items:center; gap:4px; padding:2px 5px;
            background:#fff; border:1px solid #bbb;
            left:25%; right:25%;
        }
        .rec-circle {
            width:18px; height:18px; border-radius:50%;
            border:2px solid #7B2D5F;
            display:flex; align-items:center; justify-content:center;
            font-size:0.5rem; font-weight:700; color:#7B2D5F; flex-shrink:0;
            background:#fff;
        }
        .rec-text {
            font-weight:700; font-size:0.52rem; color:#333; line-height:1.2;
            flex:1; text-align:center;
        }

        /* Status - inline in toolbar */
        .status-inline { color:rgba(255,255,255,0.35); font-size:0.55rem; }

        /* Sync banner */
        .sync-banner {
            position:fixed; top:var(--toolbar-h); left:0; right:0; z-index:999;
            background:#F9B233; color:#333; padding:6px 16px; font-size:0.7rem; font-weight:600;
            display:none; align-items:center; gap:8px; justify-content:center;
        }
        .sync-banner.show { display:flex; }
        .sync-banner button {
            padding:3px 10px; border-radius:3px; border:1px solid #333;
            background:#fff; color:#333; font-size:0.65rem; cursor:pointer; font-family:inherit;
        }
        .sync-banner button:hover { background:#333; color:#fff; }
        .sync-banner .dismiss { background:none; border:none; color:#666; cursor:pointer; font-size:0.8rem; padding:0 4px; }

        /* Active user dot */
        .user-dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:3px; }
        .user-dot.green { background:#4caf50; }
        .user-dot.amber { background:#F9B233; }

        /* Name prompt overlay */
        .name-overlay {
            position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:5000;
            display:flex; align-items:center; justify-content:center;
        }
        .name-box {
            background:#2c2c2c; color:#fff; padding:24px; border-radius:8px;
            box-shadow:0 8px 30px rgba(0,0,0,0.5); font-family:inherit; text-align:center;
            max-width:300px; width:90%;
        }
        .name-box h3 { margin-bottom:12px; font-size:0.9rem; }
        .name-box input {
            width:100%; background:#444; color:#fff; border:1px solid #555;
            padding:8px 10px; border-radius:4px; font-size:0.8rem; font-family:inherit;
            margin-bottom:12px; text-align:center;
        }
        .name-box button {
            padding:6px 20px; border-radius:4px; border:none;
            background:#17A698; color:#fff; font-size:0.75rem; cursor:pointer; font-family:inherit;
        }
        .name-box button:hover { background:#1fc4b3; }
    </style>
</head>
<body>
<div class="toolbar">
    <div class="tb-group">
        <button class="tb-btn" onclick="undo()">Undo</button>
        <button class="tb-btn" onclick="exportJSON()">Save JSON</button>
        <button class="tb-btn" onclick="document.getElementById('impF').click()">Load JSON</button>
        <input type="file" id="impF" accept=".json" style="display:none" onchange="importJSON(event)">
        <button class="tb-btn" onclick="resetToDefault()" style="color:#f88">Reset</button>
    </div>
    <div class="tb-group" id="vswatches"></div>
    <div class="tb-group">
        <button class="tb-btn primary" onclick="exportPDF()">Export PDF</button>
    </div>
    <div class="tb-group">
        <button class="tb-btn primary" onclick="publishSchedule()" id="publishBtn">Publish</button>
    </div>
    <div class="tb-group">
        <button class="tb-btn" onclick="toggleSettings()">Settings</button>
    </div>
    <div class="tb-group" style="margin-left:auto">
        <span id="userStatus" style="display:flex;align-items:center;gap:2px"></span>
        <span class="status-inline" id="stxt">Ready</span>
        <span class="status-inline" id="ecnt"></span>
    </div>
</div>

<div class="sync-banner" id="syncBanner">
    <span id="syncMsg">A newer version is available.</span>
    <button onclick="loadPublished()">Load Latest</button>
    <span class="dismiss" onclick="dismissSync()">&times;</span>
</div>

<!-- Settings panel -->
<div id="settingsPanel" style="display:none;position:fixed;top:var(--toolbar-h);right:20px;width:260px;max-height:calc(100vh - var(--toolbar-h) - 40px);overflow-y:auto;background:#333;color:#fff;padding:14px;z-index:999;font-size:0.65rem;border:1px solid #555;border-top:none;border-radius:0 0 6px 6px;box-shadow:0 4px 20px rgba(0,0,0,0.3)">
    <div style="font-weight:700;font-size:0.75rem;margin-bottom:12px;border-bottom:1px solid #444;padding-bottom:8px">Color Settings</div>
    <div id="colorSettings"></div>
</div>

<div class="edit-pop" id="editPop">
    <div class="ep-drag-handle" id="epDragHandle"><div class="ep-drag-grip"></div></div>
    <div id="epEventFields">
        <label>Title</label>
        <input type="text" id="epTitle">
        <label>Subtitle</label>
        <input type="text" id="epSub">
        <label>Venue</label>
        <div id="epVenueGrid" style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px"></div>
        <label>Duration</label>
        <div class="ep-row">
            <button class="ep-btn" onclick="epDur(-1)">-</button>
            <span id="epDurVal" style="min-width:50px;text-align:center">2</span>
            <button class="ep-btn" onclick="epDur(1)">+</button>
        </div>
    </div>
    <div id="epRecFields" style="display:none">
        <label>Reception Hours</label>
        <textarea id="epRecText" style="height:50px"></textarea>
    </div>
    <div class="ep-row" style="margin-top:8px">
        <button class="ep-btn" onclick="epSave()">Done</button>
        <button class="ep-btn del" id="epDelBtn" onclick="epDelete()">Delete</button>
    </div>
</div>
<div class="sched-wrap">
    <div class="sched" id="sched"></div>
</div>

// Normalize hex: expand 3-digit to 6-digit, ensure # prefix
function normHex(v){
    v=v.trim();
    if(v.charAt(0)!=='#') v='#'+v;
    if(/^#[0-9a-fA-F]{3}$/.test(v)) v='#'+v[1]+v[1]+v[2]+v[2]+v[3]+v[3];
    return v.toLowerCase();
}

function brightness(hex){ var r=parseInt(hex.substr(1,2),16),g=parseInt(hex.substr(3,2),16),b=parseInt(hex.substr(5,2),16); return (r*299+g*587+b*114)/1000; }

// Auto-assign columns for overlapping events in a day
// Each event gets only the columns needed for ITS direct overlaps, not transitive chains
function assignColumns(dayEvents){
    if(!dayEvents.length) return [];
    var evts = dayEvents.map(function(e){ return {evt:e, col:0, totalCols:1}; });
    // Sort by colOrder (user-adjustable), then startSlot, then id
    evts.sort(function(a,b){ return (a.evt.colOrder||0) - (b.evt.colOrder||0) || a.evt.startSlot - b.evt.startSlot || (a.evt.id < b.evt.id ? -1 : 1); });

    // Greedy column assignment: for each event, find the first column not taken by a direct overlap
    evts.forEach(function(item, i){
        var e = item.evt;
        var eEnd = e.startSlot + e.spanSlots;
        var c = 0;
        while(true){
            var conflict = false;
            for(var j=0;j<i;j++){
                if(evts[j].col !== c) continue;
                var o = evts[j].evt;
                if(e.startSlot < o.startSlot+o.spanSlots && o.startSlot < eEnd){ conflict=true; break; }
            }
            if(!conflict) break;
            c++;
        }
        item.col = c;
    });

    // Each event keeps its max concurrency as totalCols for consistent width.
    // Events use their global col. The LAST event in each overlap group
    // stretches to fill remaining space (width extends to 100%).
    evts.forEach(function(item){
        var e = item.evt;
        var eEnd = e.startSlot + e.spanSlots;
        var maxConcurrent = 1;
        for (var s = e.startSlot; s < eEnd; s++) {
            var count = 0;
            evts.forEach(function(other){
                var o = other.evt;
                if (s >= o.startSlot && s < o.startSlot + o.spanSlots) count++;
            });
            if (count > maxConcurrent) maxConcurrent = count;
        }
        item.totalCols = maxConcurrent;
    });

    // Calculate leftPct and widthPct for each event.
    // Each event stretches right until it hits another event's left edge.
    // Uses the neighbor's own totalCols grid to find its left edge %.
    evts.forEach(function(item){
        var e = item.evt;
        var eEnd = e.startSlot + e.spanSlots;
        var tc = item.totalCols;
        item.leftPct = (item.col / tc) * 100;

        // Find nearest right neighbor across all overlapping slots
        var rightEdge = 100;
        for (var s = e.startSlot; s < eEnd; s++) {
            evts.forEach(function(other){
                if(other === item) return;
                var o = other.evt;
                if(s >= o.startSlot && s < o.startSlot + o.spanSlots && other.col > item.col){
                    var nLeft = (other.col / other.totalCols) * 100;
                    if(nLeft < rightEdge) rightEdge = nLeft;
                }
            });
        }
        item.widthPct = rightEdge - item.leftPct;
    });

    return evts;
}

function render(){
    SH = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--slot-h'));
    var el=document.getElementById('sched'), cfg=state.config, nd=cfg.days.length, ns=(cfg.endHour-cfg.startHour)*2;
    var h='';

    var sty=state.styles;

    // Title
    h+='<div class="title-banner" style="background:'+sty.titleBg+'"><div class="title-text" onclick="editTitle()" style="cursor:pointer;font-family:'+sty.title.fontFamily+';font-size:'+sty.title.fontSize+'px;color:'+sty.title.color+'" title="Click to edit">'+cfg.title+'</div></div>';

    // Headers
    h+='<div class="headers">';
    h+='<div class="hdr hdr-legend" style="background:'+sty.legendHeader.bgColor+';color:'+sty.legendHeader.textColor+'">Colour<br>Legend</div>';
    h+='<div class="hdr hdr-gutter" style="background:'+sty.gutterColor+';color:'+sty.gutterText+';width:var(--first-gutter-w)">TIME</div>';
    for(var d=0;d<nd;d++){
        h+='<div class="hdr hdr-day" data-dayedit="'+d+'" style="background:'+sty.dayHeaders.bgColor+';color:'+sty.dayHeaders.textColor+';font-family:\''+sty.dayHeaders.fontFamily+'\';font-size:'+sty.dayHeaders.fontSize+'px;font-weight:'+sty.dayHeaders.fontWeight+';cursor:pointer" title="Click to edit">'+cfg.days[d].label+' '+cfg.days[d].date+'</div>';
        if(d<nd-1) h+='<div class="hdr hdr-gutter" style="background:'+sty.gutterColor+';color:'+sty.gutterText+'"></div>';
    }
    h+='<div class="hdr hdr-gutter last" style="background:'+sty.gutterColor+'"></div>';
    h+='</div>';

    // Grid body
    h+='<div class="grid-body">';

    // Legend
    h+='<div class="legend">';
    state.venues.forEach(function(v,i){ h+='<div class="leg-item'+(activeVenueId===v.id?' active-venue':'')+'" draggable="true" data-legidx="'+i+'" data-legvenue="'+v.id+'" ondragstart="legDragStart(event,'+i+')" ondragover="legDragOver(event,'+i+')" ondragleave="legDragLeave(event)" ondrop="legDrop(event,'+i+')" style="background:'+v.color+';font-family:\''+sty.legendFont.fontFamily+'\';font-size:'+sty.legendFont.fontSize+'px;font-weight:'+sty.legendFont.fontWeight+'"><div class="leg-x" data-legdel="'+i+'" title="Delete '+v.name+'">\u2715</div>'+v.name+'</div>'; });
    h+='</div>';

    // First gutter (TIME) - wider
    h+='<div class="gutter" style="background:'+sty.gutterColor+';width:var(--first-gutter-w)">';
    for(var s=0;s<ns;s++){
        var hr=cfg.startHour+Math.floor(s/2), mn=(s%2)*30, isH=mn===0;
        var lb='';
        if(isH){if(hr===12)lb='NOON';else if(hr<12)lb=hr+':00';else lb=(hr-12)+':00';}else lb=':30';
        h+='<div class="gut-slot'+(isH?' hour':'')+'" style="color:'+sty.gutterText+';font-family:\''+sty.gutterFont.fontFamily+'\';font-size:'+(isH?sty.gutterFont.fontSize:sty.gutterFont.fontSize-2)+'px;font-weight:'+(isH?sty.gutterFont.fontWeight:400)+'">'+lb+'</div>';
    }
    h+='</div>';

    // Day columns with gutters between
    for(var d=0;d<nd;d++){
        h+='<div class="day-col" data-day="'+d+'" style="background:repeating-linear-gradient(to bottom,'+sty.rowStripe1+' 0px,'+sty.rowStripe1+' '+(SH*2)+'px,'+sty.rowStripe2+' '+(SH*2)+'px,'+sty.rowStripe2+' '+(SH*4)+'px)">';
        // Grid lines
        for(var s=1;s<ns;s++){
            h+='<div class="sline'+(s%2===0?' hour':'')+'" style="top:'+(s*SH)+'px"></div>';
        }
        // Events for this day - auto-assign columns
        var devs=state.events.filter(function(e){return e.dayIndex===d});
        var laid=assignColumns(devs);

        // Find groups of events with the same title that overlap - they get a spanning label
        var spanGroups = {};
        laid.forEach(function(item){
            var evt=item.evt;
            var normTitle = (evt.title||'').replace(/\s+/g,' ').trim();
            var key = normTitle+'|'+evt.startSlot+'|'+evt.spanSlots;
            item._spanKey = key;
            if(!spanGroups[key]) spanGroups[key]=[];
            spanGroups[key].push(item);
        });

        // Render color blocks - single rect per event, using colSpan for stretch
        laid.forEach(function(item){
            var evt=item.evt, v=state.venues.find(function(x){return x.id===evt.venueId});
            var c=v?v.color:'#999';
            var isSpanned = spanGroups[item._spanKey] && spanGroups[item._spanKey].length > 1;
            var cls=brightness(c)>160?'dk':'lt';
            var tl=(evt.title||'').replace(/\n/g,'<br>');

            var top=evt.startSlot*SH, ht=evt.spanSlots*SH;
            var lp=item.leftPct, wp=item.widthPct;

            var isSel = selectedEvtId===evt.id || selectedEvtIds.indexOf(evt.id)>=0;
            h+='<div class="ev '+cls+(isSel?' selected':'')+'" data-id="'+evt.id+'" style="top:'+top+'px;height:'+ht+'px;left:'+lp+'%;width:'+wp+'%;background:'+c+';font-family:\''+sty.eventFont.fontFamily+'\';font-size:'+sty.eventFont.fontSize+'px;font-weight:'+sty.eventFont.fontWeight+';border-right:1px solid rgba(255,255,255,0.15)">';
            if(!isSpanned){
                h+='<div class="ev-t">'+tl+'</div>';
                if(evt.subtitle)h+='<div class="ev-s">'+evt.subtitle.replace(/\n/g,'<br>')+'</div>';
            }
            h+='<div class="ev-x" data-xid="'+evt.id+'" title="Delete">\u2715</div>';
            h+='<div class="ev-resize" data-id="'+evt.id+'"></div>';
            h+='</div>';
        });

        // Render spanning labels for same-title groups
        var spanned = {};
        Object.keys(spanGroups).forEach(function(key){
            var group = spanGroups[key];
            if(group.length < 2) return;
            if(spanned[key]) return;
            spanned[key] = true;
            var minCol=Infinity, maxCol=0, totalCols=group[0].totalCols;
            group.forEach(function(item){ if(item.col<minCol)minCol=item.col; if(item.col>maxCol)maxCol=item.col; });
            var evt=group[0].evt;
            var top=evt.startSlot*SH, ht=evt.spanSlots*SH;
            var lp=(minCol/totalCols)*100, wp=((maxCol-minCol+1)/totalCols)*100;
            var tl=(evt.title||'').replace(/\n/g,'<br>');
            h+='<div class="ev-span-label" style="top:'+top+'px;height:'+ht+'px;left:'+lp+'%;width:'+wp+'%;font-family:\''+sty.eventFont.fontFamily+'\';font-size:'+sty.eventFont.fontSize+'px;font-weight:'+sty.eventFont.fontWeight+'">';
            h+='<div class="ev-t">'+tl+'</div>';
            h+='</div>';
        });

        // Reception block at the bottom of each day column
        var rec=cfg.reception.find(function(r){return r.dayIndex===d});
        if(rec){
            var recTop = (ns - 1) * SH; // start at last slot, overlap into bottom bar
            var recH = SH * 2; // extends below the grid into bottom bar
            h+='<div class="rec-block" data-recday="'+d+'" style="top:'+recTop+'px;height:'+recH+'px;cursor:pointer">';
            h+='<div class="rec-circle">R</div>';
            h+='<div class="rec-text" style="font-family:\''+sty.receptionFont.fontFamily+'\';font-size:'+sty.receptionFont.fontSize+'px;font-weight:'+sty.receptionFont.fontWeight+'">Reception<br>'+rec.text.replace(/\n/g,', ')+'</div>';
            h+='</div>';
        }

        h+='</div>';

        // Gutter after day (between days or final)
        if(d<nd-1){
            h+='<div class="gutter" style="background:'+sty.gutterColor+'">';
            for(var s=0;s<ns;s++){
                var hr=cfg.startHour+Math.floor(s/2), mn=(s%2)*30, isH=mn===0;
                var lb='';
                if(isH){var sf=hr<12?'':'';if(hr===12)lb='12';else if(hr<12)lb=''+hr;else lb=''+(hr-12);}else lb='30';
                h+='<div class="gut-slot'+(isH?' hour':'')+'" style="color:'+sty.gutterText+';font-family:\''+sty.gutterFont.fontFamily+'\';font-size:'+(isH?sty.gutterFont.fontSize:sty.gutterFont.fontSize-2)+'px;font-weight:'+(isH?sty.gutterFont.fontWeight:400)+'">'+lb+'</div>';
            }
            h+='</div>';
        }
    }

    // Final gutter (right time)
    h+='<div class="gutter" style="background:'+sty.gutterColor+'">';
    for(var s=0;s<ns;s++){
        var hr=cfg.startHour+Math.floor(s/2), mn=(s%2)*30, isH=mn===0;
        var lb='';
        if(isH){var sf=hr<12?'a':'p';if(hr===12)lb='12p';else if(hr<12)lb=hr+sf;else lb=(hr-12)+sf;}else lb='30';
        h+='<div class="gut-slot'+(isH?' hour':'')+'" style="color:'+sty.gutterText+';font-family:\''+sty.gutterFont.fontFamily+'\';font-size:'+(isH?sty.gutterFont.fontSize:sty.gutterFont.fontSize-2)+'px;font-weight:'+(isH?sty.gutterFont.fontWeight:400)+'">'+lb+'</div>';

    h+='</div>'; // end grid-body

}

function exportPDF(){
    var jsPDF=window.jspdf.jsPDF;
    var doc=new jsPDF({orientation:'landscape',unit:'pt',format:[2592,1728]});
    var cfg=state.config,nd=cfg.days.length,ns=(cfg.endHour-cfg.startHour)*2;
    var W=2592,H=1728,legW=130,gutW=50,titleH=65,hdrH=45,recH=40;
    var totalGuts=nd+1;
    var dayW=(W-legW-gutW*totalGuts)/nd;
    var slotH=(H-titleH-hdrH-recH)/ns;

    // Title
    doc.setFillColor(23,166,152); doc.rect(0,0,W,titleH,'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(32); doc.setTextColor(255,255,255);
    doc.text(cfg.title+(cfg.year?' '+cfg.year:''),W/2,titleH/2+10,{align:'center'});

    // Headers
    var hy=titleH;
    doc.setFillColor(51,51,51); doc.rect(0,hy,legW,hdrH,'F');
    doc.setFontSize(7); doc.text('COLOUR\nLEGEND',legW/2,hy+hdrH/2,{align:'center'});
    doc.setFillColor(68,68,68); doc.rect(legW,hy,gutW,hdrH,'F'); doc.text('TIME',legW+gutW/2,hy+hdrH/2+3,{align:'center'});
    for(var d=0;d<nd;d++){
        var dx=legW+gutW+d*(dayW+gutW);
        doc.setFillColor(23,166,152); doc.rect(dx,hy,dayW,hdrH,'F');
        doc.setFontSize(11); doc.text(cfg.days[d].label+' '+cfg.days[d].date,dx+dayW/2,hy+hdrH/2+4,{align:'center'});
        if(d<nd-1){doc.setFillColor(224,192,64);doc.rect(dx+dayW,hy,gutW,hdrH,'F');}
    }
    doc.setFillColor(224,192,64); doc.rect(W-gutW,hy,gutW,hdrH,'F');

    var gy=titleH+hdrH;

    // Venue legend
    doc.setFillColor(255,255,255); doc.rect(0,gy,legW,ns*slotH,'F');
    var lih=ns*slotH/state.venues.length;
    state.venues.forEach(function(v,i){
        var ly=gy+i*lih;
        var r=parseInt(v.color.substr(1,2),16),g=parseInt(v.color.substr(3,2),16),b=parseInt(v.color.substr(5,2),16);
        doc.setFillColor(r,g,b); doc.rect(8,ly+5,10,lih-10,'F');
        doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(50,50,50);
        doc.text(v.name,24,ly+lih/2+3);
    });

    // Time gutter (left)
    doc.setFillColor(240,240,240); doc.rect(legW,gy,gutW,ns*slotH,'F');
    for(var s=0;s<ns;s++){
        var hr=cfg.startHour+Math.floor(s/2),mn=(s%2)*30,isH=mn===0;
        var lb='';if(isH){if(hr===12)lb='NOON';else if(hr<12)lb=hr+':00';else lb=(hr-12)+':00';}else lb=':30';
        doc.setFont('helvetica',isH?'bold':'normal'); doc.setFontSize(6.5); doc.setTextColor(isH?50:120,isH?50:120,isH?50:120);
        doc.text(lb,legW+gutW/2,gy+s*slotH+slotH/2+2,{align:'center'});
        if(s>0){doc.setDrawColor(isH?180:220,isH?180:220,isH?180:220);doc.setLineWidth(isH?0.5:0.3);doc.line(legW,gy+s*slotH,legW+gutW,gy+s*slotH);}
    }

    // Day columns + gutters
    for(var d=0;d<nd;d++){
        var dx=legW+gutW+d*(dayW+gutW);
        // Row stripes
        for(var s=0;s<ns;s++){if(Math.floor(s/2)%2===0){doc.setFillColor(232,245,243);doc.rect(dx,gy+s*slotH,dayW,slotH,'F');}}
        // Grid lines
        for(var s=1;s<ns;s++){doc.setDrawColor(s%2===0?180:220,s%2===0?180:220,s%2===0?180:220);doc.setLineWidth(s%2===0?0.5:0.25);doc.line(dx,gy+s*slotH,dx+dayW,gy+s*slotH);}
        // Events (auto-column)
        var pdfDevs=state.events.filter(function(e){return e.dayIndex===d});
        var pdfLaid=assignColumns(pdfDevs);
        pdfLaid.forEach(function(item){
            var evt=item.evt;
            var v=state.venues.find(function(x){return x.id===evt.venueId}); if(!v)return;
            var tc=item.totalCols,col=item.col;
            var ew=dayW/tc, ex=dx+col*ew, ey=gy+evt.startSlot*slotH, eh=evt.spanSlots*slotH;
            var r=parseInt(v.color.substr(1,2),16),g=parseInt(v.color.substr(3,2),16),b=parseInt(v.color.substr(5,2),16);
            doc.setFillColor(r,g,b); doc.roundedRect(ex+1,ey+1,ew-2,eh-2,2,2,'F');
            if(brightness(v.color)>160)doc.setTextColor(50,50,50);else doc.setTextColor(255,255,255);
            doc.setFont('helvetica','bold'); doc.setFontSize(6);
            var lines=(evt.title||'').split('\n'), ty=ey+eh/2-(lines.length-1)*3.5;
            lines.forEach(function(l,li){doc.text(l,ex+ew/2,ty+li*7,{align:'center'});});
        });
        // Inter-day gutter
        if(d<nd-1){
            var gx=dx+dayW;
            doc.setFillColor(245,230,160); doc.rect(gx,gy,gutW,ns*slotH,'F');
            for(var s=0;s<ns;s++){
                var hr=cfg.startHour+Math.floor(s/2),mn=(s%2)*30,isH=mn===0;
                var lb='';if(isH){if(hr===12)lb='12';else if(hr<12)lb=''+hr;else lb=''+(hr-12);}else lb='30';
                doc.setFont('helvetica',isH?'bold':'normal');doc.setFontSize(6);doc.setTextColor(isH?100:140,isH?90:130,isH?20:60);
                doc.text(lb,gx+gutW/2,gy+s*slotH+slotH/2+2,{align:'center'});
                if(s>0){doc.setDrawColor(200,180,100);doc.setLineWidth(0.3);doc.line(gx,gy+s*slotH,gx+gutW,gy+s*slotH);}
            }
        }
    }
    // Right gutter
    var rgx=W-gutW;
    doc.setFillColor(245,230,160);doc.rect(rgx,gy,gutW,ns*slotH,'F');
    for(var s=0;s<ns;s++){
        var hr=cfg.startHour+Math.floor(s/2),mn=(s%2)*30,isH=mn===0;
        var lb='';if(isH){var sf=hr<12?'a':'p';if(hr===12)lb='12p';else if(hr<12)lb=hr+sf;else lb=(hr-12)+sf;}else lb='30';
        doc.setFont('helvetica',isH?'bold':'normal');doc.setFontSize(6);doc.setTextColor(isH?100:140,isH?90:130,isH?20:60);
        doc.text(lb,rgx+gutW/2,gy+s*slotH+slotH/2+2,{align:'center'});
        if(s>0){doc.setDrawColor(200,180,100);doc.setLineWidth(0.3);doc.line(rgx,gy+s*slotH,rgx+gutW,gy+s*slotH);}
    }

    // Reception
    var ry=gy+ns*slotH;
    doc.setFillColor(228,228,228);doc.rect(0,ry,W,recH,'F');
    doc.setDrawColor(23,166,152);doc.setLineWidth(2);doc.line(0,ry,W,ry);
    for(var d=0;d<nd;d++){
        var dx=legW+gutW+d*(dayW+gutW);
        var rec=cfg.reception.find(function(r){return r.dayIndex===d});
        doc.setDrawColor(23,166,152);doc.setLineWidth(1.5);doc.circle(dx+14,ry+recH/2,7);
        doc.setFont('helvetica','bold');doc.setFontSize(7);doc.setTextColor(23,166,152);doc.text('R',dx+14,ry+recH/2+3,{align:'center'});
        if(rec){doc.setFont('helvetica','normal');doc.setFontSize(5.5);doc.setTextColor(80,80,80);var rl=rec.text.split('\n');rl.forEach(function(l,i){doc.text(l,dx+28,ry+recH/2-(rl.length-1)*3.5+i*7+2);});}
    }

    doc.save('ACYR_Schedule_'+cfg.year+'.pdf');
    document.getElementById('stxt').textContent='PDF exported';
}

function updateStyleColor(inp){
    var key=inp.dataset.key, val=normHex(inp.value);
    if(!/^#[0-9a-fA-F]{6}$/.test(val)) return;
    pushUndo();
    var parts=key.split('.');
    if(parts.length===2) state.styles[parts[0]][parts[1]]=val;
    else state.styles[key]=val;
    render(); renderSettings();
}

function updateVenueColor(inp){
    pushUndo();
    state.venues[parseInt(inp.dataset.venue)].color=inp.value;
    render(); renderSwatches(); renderSettings();
}

function updateVenueHex(inp){
    var val=inp.value.trim();
    if(val.charAt(0)!=='#') val='#'+val;
    if(/^#[0-9a-fA-F]{6}$/.test(val)){
        state.venues[parseInt(inp.dataset.vhex)].color=val;
        render(); renderSwatches(); renderSettings();
    }
}

function updateVenueName(inp){
    state.venues[parseInt(inp.dataset.vname)].name=inp.value;
    render(); renderSwatches();
}

function addVenue(){
    var id='venue-'+Date.now();
    state.venues.push({id:id, name:'New Venue', color:'#888888'});
    render(); renderSwatches(); renderSettings();
}

// Venue legend drag reorder
var legDragIdx = null;
function legDragStart(e, idx) { legDragIdx = idx; e.target.classList.add('dragging'); }
function legDragOver(e, idx) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function legDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function legDrop(e, targetIdx) {
    e.preventDefault();
    e.currentTarget.classList.remove('drag-over');
    if (legDragIdx === null || legDragIdx === targetIdx) return;
    pushUndo();
    var venue = state.venues.splice(legDragIdx, 1)[0];
    state.venues.splice(targetIdx, 0, venue);
    legDragIdx = null;
    render(); renderSwatches();
}

function deleteVenue(idx){
    var v=state.venues[idx];
    var count=state.events.filter(function(e){return e.venueId===v.id}).length;
    var msg='Delete venue "'+v.name+'"?';
    if(count) msg+='\n\n'+count+' event(s) use this venue. They will be reassigned to "'+state.venues[0].name+'".';
    if(!confirm(msg)) return;
    pushUndo();
    // Reassign orphaned events to first venue
    if(count && state.venues.length > 1){
        var newId = state.venues[idx===0?1:0].id;
        state.events.forEach(function(e){ if(e.venueId===v.id) e.venueId=newId; });
    }
    state.venues.splice(idx,1);
    render(); renderSwatches(); renderSettings();
}

function updateFont(inp){
    var fkey=inp.dataset.fkey, fprop=inp.dataset.fprop, val=inp.value;
    if(fprop==='fontSize'||fprop==='fontWeight'||fprop==='letterSpacing') val=parseInt(val);
    state.styles[fkey][fprop]=val;
    render(); renderSettings();
}

// ============================================================
// INTERACTIONS
// ============================================================
var selectedEvtId = null;
var selectedEvtIds = []; // multi-select via shift+click
var editingRecDay = null;
var dragging = null; // {type:'resize'|'move', evtId, startY, origSlot, origSpan, dayIndex}

// Click on day column: stamp new event or select existing
document.addEventListener('mousedown', function(e) {
    var evEl = e.target.closest('.ev[data-id]');
    var resizeEl = e.target.closest('.ev-resize[data-id]');
    var dayCol = e.target.closest('.day-col');

    // Close popover if clicking outside
    if (!e.target.closest('.edit-pop') && !evEl) {
        closePopover();
    }

    // Click legend item to select as active venue
    var legItem = e.target.closest('.leg-item[data-legvenue]');
    if (legItem && !e.target.closest('.leg-x')) {
        activeVenueId = legItem.dataset.legvenue;
        render();
        return;
    }

    // Click day header to edit
    var dayHdr = e.target.closest('.hdr-day[data-dayedit]');
    if (dayHdr) {
        e.preventDefault();
        var di = parseInt(dayHdr.dataset.dayedit);
        showDayPopover(di, e.clientX, e.clientY);
        return;
    }

    // X delete button on venue legend
    var legDel = e.target.closest('.leg-x[data-legdel]');
    if (legDel) {
        e.preventDefault();
        e.stopPropagation();
        deleteVenue(parseInt(legDel.dataset.legdel));
        return;
    }

    // X delete button on event
    var xBtn = e.target.closest('.ev-x[data-xid]');
    if (xBtn) {
        e.preventDefault();
        e.stopPropagation();
        pushUndo();
        state.events = state.events.filter(function(x){return x.id!==xBtn.dataset.xid});
        closePopover();
        render();
        return;
    }

    // Resize handle
    if (resizeEl) {
        e.preventDefault();
        var id = resizeEl.dataset.id;
        var evt = state.events.find(function(x){return x.id===id});
        if (!evt) return;
        pushUndo();
        dragging = { type:'resize', evtId:id, startY:e.clientY, origSpan:evt.spanSlots };
        return;
    }

    // Click reception block: show popover for reception
    var recBlock = e.target.closest('.rec-block[data-recday]');
    if (recBlock) {
        e.preventDefault();
        var dayIdx = parseInt(recBlock.dataset.recday);
        showReceptionPopover(dayIdx, e.clientX, e.clientY);
        return;
    }

    // Click existing event: select + show popover
    if (evEl && evEl.dataset.id) {
        e.preventDefault();
        var id = evEl.dataset.id;

        if (e.shiftKey) {
            // Shift+click: toggle in multi-selection
            var idx = selectedEvtIds.indexOf(id);
            if (idx >= 0) { selectedEvtIds.splice(idx, 1); }
            else { selectedEvtIds.push(id); }
            selectedEvtId = null;
            // Close popover without clearing selection
            document.getElementById('editPop').classList.remove('show');
            if (selectedEvtIds.length > 0) {
                showMultiPopover(e.clientX, e.clientY);
            }
            render();
        } else {
            // Normal click: single select
            selectedEvtIds = [id];
            selectedEvtId = id;
            render();
            showPopover(id, e.clientX, e.clientY);

            // Start move drag after a small movement
            var evt = state.events.find(function(x){return x.id===id});
            if (evt) {
                dragging = { type:'move', evtId:id, startY:e.clientY, startX:e.clientX, origSlot:evt.startSlot, origDay:evt.dayIndex, moved:false };
            }
        }
        return;
    }

    // Single click on empty slot: just close popover (no auto-stamp)
});

// Double-click to add new event
document.addEventListener('dblclick', function(e) {
    var dayCol = e.target.closest('.day-col');
    if (!dayCol || !activeVenueId) return;
    e.preventDefault();

    var rect = dayCol.getBoundingClientRect();
    var y = e.clientY - rect.top;
    var slot = Math.floor(y / SH);
    var ns = (state.config.endHour - state.config.startHour) * 2;
    if (slot < 0 || slot >= ns) return;

    var newEvt = {
        id: 'e' + Date.now(),
        dayIndex: parseInt(dayCol.dataset.day),
        startSlot: slot,
        spanSlots: 2,
        venueId: activeVenueId,
        title: 'New Event'
    };
    pushUndo();
    state.events.push(newEvt);
    selectedEvtId = newEvt.id;
    render();
    showPopover(newEvt.id, e.clientX, e.clientY);
});

document.addEventListener('mousemove', function(e) {
    if (!dragging) return;

    if (dragging.type === 'resize') {
        var evt = state.events.find(function(x){return x.id===dragging.evtId});
        if (!evt) return;
        var dy = e.clientY - dragging.startY;
        var slotDelta = Math.round(dy / SH);
        var newSpan = Math.max(1, dragging.origSpan + slotDelta);
        var ns = (state.config.endHour - state.config.startHour) * 2;
        if (evt.startSlot + newSpan > ns) newSpan = ns - evt.startSlot;
        if (evt.spanSlots !== newSpan) {
            evt.spanSlots = newSpan;
            render();
            updatePopoverDur();
        }
    }

    if (dragging.type === 'move') {
        var dx = Math.abs(e.clientX - dragging.startX);
        var dy = Math.abs(e.clientY - dragging.startY);
        if (dx > 5 || dy > 5) dragging.moved = true;

        if (dragging.moved) {
            closePopover();
            var evt = state.events.find(function(x){return x.id===dragging.evtId});
            if (!evt) return;

            // Vertical movement: change start slot
            var slotDelta = Math.round((e.clientY - dragging.startY) / SH);
            var newSlot = Math.max(0, dragging.origSlot + slotDelta);
            var ns = (state.config.endHour - state.config.startHour) * 2;
            if (newSlot + evt.spanSlots > ns) newSlot = ns - evt.spanSlots;

            // Horizontal: detect which day column the mouse is over
            var dayCols = document.querySelectorAll('.day-col');
            var newDay = evt.dayIndex;
            dayCols.forEach(function(dc) {
                var r = dc.getBoundingClientRect();
                if (e.clientX >= r.left && e.clientX <= r.right) {
                    newDay = parseInt(dc.dataset.day);
                }
            });

            // Horizontal drag within same day: adjust column order
            if (newDay === dragging.origDay) {
                var dayCol = document.querySelector('.day-col[data-day="'+newDay+'"]');
                if (dayCol) {
                    var dcRect = dayCol.getBoundingClientRect();
                    var relX = (e.clientX - dcRect.left) / dcRect.width;
                    evt.colOrder = Math.round(relX * 10); // 0-10 range
                }
            }

            if (evt.startSlot !== newSlot || evt.dayIndex !== newDay) {
                evt.startSlot = newSlot;
                evt.dayIndex = newDay;
                if (newDay !== dragging.origDay) evt.colOrder = 0; // reset on day change
            }
            render();
        }
    }
});

document.addEventListener('mouseup', function(e) {
    if (dragging && dragging.type === 'move' && !dragging.moved) {
        // It was a click, not a drag - popover already shown
    }
    dragging = null;
});

// Popover
function showPopover(evtId, mx, my) {
    var pop = document.getElementById('editPop');
    var evt = state.events.find(function(x){return x.id===evtId});
    if (!evt) return;

    document.getElementById('epTitle').value = (evt.title || '').replace(/\n/g, '\\n');
    document.getElementById('epSub').value = evt.subtitle || '';

    // Build venue grid with colored swatches
    var vg = document.getElementById('epVenueGrid');
    vg.innerHTML = '';
    state.venues.forEach(function(v) {
        var pick = document.createElement('div');
        pick.className = 'venue-pick' + (v.id === evt.venueId ? ' selected' : '');
        pick.style.background = v.color;
        pick.title = v.name;
        pick.textContent = v.name.split(' ').map(function(w){return w[0]}).join('');
        pick.addEventListener('click', function(){
            vg.querySelectorAll('.venue-pick').forEach(function(p){p.classList.remove('selected')});
            pick.classList.add('selected');
            pick._venueId = v.id;
        });
        pick._venueId = v.id;
        vg.appendChild(pick);
    });

    // Show event fields, hide reception fields, clear reception mode
    editingRecDay = null;
    document.getElementById('epEventFields').style.display = '';
    document.getElementById('epRecFields').style.display = 'none';
    document.getElementById('epDelBtn').style.display = '';

    updatePopoverDur();

    // Position
    var pw = 220, ph = 260;
    var x = Math.min(mx + 10, window.innerWidth - pw - 10);
    var y = Math.min(my - 20, window.innerHeight - ph - 10);
    pop.style.left = x + 'px';
    pop.style.top = Math.max(50, y) + 'px';
    pop.classList.add('show');
}

function showMultiPopover(mx, my) {
    var pop = document.getElementById('editPop');
    document.getElementById('epEventFields').style.display = 'none';
    document.getElementById('epRecFields').style.display = 'none';
    document.getElementById('epDelBtn').style.display = '';

    // Build duplicate-to-day buttons
    var dupHtml = '<label>' + selectedEvtIds.length + ' events selected</label>';
    dupHtml += '<label style="margin-top:8px">Duplicate to:</label>';
    dupHtml += '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">';
    state.config.days.forEach(function(day, di) {
        dupHtml += '<button class="ep-btn" onclick="duplicateToDay(' + di + ')" style="flex:1;min-width:60px">' + day.label.substr(0,3) + '</button>';
    });
    dupHtml += '</div>';

    // Insert into a temp area
    var recFields = document.getElementById('epRecFields');
    recFields.style.display = '';
    recFields.innerHTML = dupHtml;

    var pw = 220;
    var x = Math.min(mx + 10, window.innerWidth - pw - 10);
    var y = Math.min(my - 20, window.innerHeight - 200);
    pop.style.left = x + 'px';
    pop.style.top = Math.max(50, y) + 'px';
    pop.classList.add('show');
}

function duplicateToDay(dayIndex) {
    if (!selectedEvtIds.length) return;
    pushUndo();
    selectedEvtIds.forEach(function(id) {
        var orig = state.events.find(function(x){return x.id===id});
        if (!orig) return;
        var copy = JSON.parse(JSON.stringify(orig));
        copy.id = 'e' + Date.now() + Math.random().toString(36).substr(2,4);
        copy.dayIndex = dayIndex;
        state.events.push(copy);
    });
    closePopover();
    render();
}

function showReceptionPopover(dayIdx, mx, my) {
    editingRecDay = dayIdx;
    selectedEvtId = null;
    var rec = state.config.reception.find(function(r){return r.dayIndex===dayIdx});

    document.getElementById('epEventFields').style.display = 'none';
    document.getElementById('epRecFields').style.display = '';
    document.getElementById('epDelBtn').style.display = 'none';
    document.getElementById('epRecText').value = rec ? rec.text : '';

    var pop = document.getElementById('editPop');
    var pw = 220;
    var x = Math.min(mx + 10, window.innerWidth - pw - 10);
    var y = Math.min(my - 20, window.innerHeight - 200);
    pop.style.left = x + 'px';
    pop.style.top = Math.max(50, y) + 'px';
    pop.classList.add('show');
}

function updatePopoverDur() {
    var evt = state.events.find(function(x){return x.id===selectedEvtId});
    if (!evt) return;
    var mins = evt.spanSlots * 30;
    var hrs = Math.floor(mins / 60);
    var m = mins % 60;
    var label = '';
    if (hrs && m) label = hrs + 'h ' + m + 'm';
    else if (hrs) label = hrs + (hrs===1 ? ' hour' : ' hours');
    else label = m + ' min';
    document.getElementById('epDurVal').textContent = label;
}

function closePopover() {
    document.getElementById('editPop').classList.remove('show');
    // Restore recFields default content
    document.getElementById('epRecFields').innerHTML = '<label>Reception Hours</label><textarea id="epRecText" style="height:50px"></textarea>';
    editingRecDay = null;
    var needRender = selectedEvtId || selectedEvtIds.length;
    selectedEvtId = null;
    selectedEvtIds = [];
    if (needRender) render();
}

function epDur(delta) {
    var evt = state.events.find(function(x){return x.id===selectedEvtId});
    if (!evt) return;
    var ns = (state.config.endHour - state.config.startHour) * 2;
    evt.spanSlots = Math.max(1, Math.min(ns - evt.startSlot, evt.spanSlots + delta));
    render();
    updatePopoverDur();
}

function epSave() {
    // Title save
    if (editingTitle) {
        pushUndo();
        state.config.title = document.getElementById('epGenText').value;
        editingTitle = false;
        closePopover(); render(); return;
    }
    // Day header save
    if (editingDayIdx !== null) {
        pushUndo();
        state.config.days[editingDayIdx].label = document.getElementById('epDayLabel').value;
        state.config.days[editingDayIdx].date = document.getElementById('epDayDate').value;
        editingDayIdx = null;
        closePopover(); render(); return;
    }
    // Reception save
    if (editingRecDay !== null) {
        pushUndo();
        var rec = state.config.reception.find(function(r){return r.dayIndex===editingRecDay});
        if (!rec) { rec={dayIndex:editingRecDay,text:''}; state.config.reception.push(rec); }
        rec.text = document.getElementById('epRecText').value;
        editingRecDay = null;
        closePopover();
        render();
        return;
    }

    var evt = state.events.find(function(x){return x.id===selectedEvtId});
    if (!evt) return;
    pushUndo();
    evt.title = document.getElementById('epTitle').value.replace(/\\n/g, '\n');
    evt.subtitle = document.getElementById('epSub').value;
    var selPick = document.querySelector('.venue-pick.selected');
    if (selPick) evt.venueId = selPick._venueId;
    closePopover();
    render();
}

function epDelete() {
    if (!selectedEvtId) return;
    pushUndo();
    state.events = state.events.filter(function(x){return x.id!==selectedEvtId});
    closePopover();
    render();
}

// Escape to close popover
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closePopover();
    if ((e.metaKey || e.ctrlKey) && e.key === 'z') { e.preventDefault(); undo(); return; }
    if (e.key === 'Delete' || e.key === 'Backspace') {
        if (selectedEvtId && !e.target.closest('input,textarea,select')) {
            epDelete();
        }
    }
});

// Draggable popover
(function(){
    var handle = document.getElementById('epDragHandle');
    var pop = document.getElementById('editPop');
    var dx=0, dy=0, mx=0, my=0, active=false;
    handle.addEventListener('mousedown', function(e){
        e.preventDefault();
        active = true;
        mx = e.clientX; my = e.clientY;
    });
    document.addEventListener('mousemove', function(e){
        if(!active) return;
        dx = e.clientX - mx; dy = e.clientY - my;
        mx = e.clientX; my = e.clientY;
        pop.style.left = (pop.offsetLeft + dx) + 'px';
        pop.style.top = (pop.offsetTop + dy) + 'px';
    });
    document.addEventListener('mouseup', function(){ active = false; });
})();

// ============================================================
// PUBLISH / SYNC VIA GITHUB API
// ============================================================
var GITHUB_REPO = 'pietsuess/clients';
var DATA_PATH = 'sscy/schedule-data.json';
var HEARTBEAT_PATH = 'sscy/schedule-heartbeat.json';
var GITHUB_API = 'https://api.github.com';

// User identity
function getUserName() { return localStorage.getItem('acyr-user-name') || ''; }
function setUserName(n) { localStorage.setItem('acyr-user-name', n); }
function getGitHubToken() { return localStorage.getItem('acyr-github-token') || ''; }
function setGitHubToken(t) { localStorage.setItem('acyr-github-token', t); }

function promptUserName() {
    if (getUserName()) return;
    var ov = document.createElement('div');
    ov.className = 'name-overlay';
    ov.innerHTML = '<div class="name-box"><h3>Welcome to the Schedule Editor</h3>' +
        '<p style="font-size:0.7rem;opacity:0.7;margin-bottom:12px">Enter your name so others know who is editing.</p>' +
        '<input type="text" id="nameInput" placeholder="Your name">' +
        '<button onclick="saveUserName()">Continue</button></div>';
    document.body.appendChild(ov);
    setTimeout(function(){
        var inp = document.getElementById('nameInput');
        inp.focus();
        inp.addEventListener('keydown', function(e){ if(e.key==='Enter') saveUserName(); });
    }, 100);
}

function saveUserName() {
    var name = (document.getElementById('nameInput').value || '').trim();
    if (!name) return;
    setUserName(name);
    var ov = document.querySelector('.name-overlay');
    if (ov) ov.remove();
    updateUserStatus();
}

// GitHub API helpers
function ghHeaders() {
    var h = { 'Accept': 'application/vnd.github.v3+json' };
    var token = getGitHubToken();
    if (token) h['Authorization'] = 'token ' + token;
    return h;
}

function ghFetch(path, opts) {
    opts = opts || {};
    opts.headers = Object.assign(ghHeaders(), opts.headers || {});
    return fetch(GITHUB_API + '/repos/' + GITHUB_REPO + '/contents/' + path, opts);
}

// Get file info (sha + content) from GitHub
function ghGetFile(path) {
    return ghFetch(path).then(function(r) {
        if (r.status === 404) return null;
        if (!r.ok) throw new Error('GitHub API error: ' + r.status);
        return r.json();
    });
}

// Read and decode file content from GitHub API (always fresh, no CDN caching)
function ghReadJSON(path) {
    return ghFetch(path).then(function(r) {
        if (r.status === 404) return null;
        if (!r.ok) throw new Error('GitHub API error: ' + r.status);
        return r.json();
    }).then(function(file) {
        if (!file || !file.content) return null;
        var decoded = decodeURIComponent(escape(atob(file.content.replace(/\n/g, ''))));
        return JSON.parse(decoded);
    });
}

// Put file to GitHub (create or update)
function ghPutFile(path, content, message) {
    return ghGetFile(path).then(function(existing) {
        var body = {
            message: message,
            content: btoa(unescape(encodeURIComponent(content)))
        };
        if (existing && existing.sha) body.sha = existing.sha;
        return ghFetch(path, {
            method: 'PUT',
            body: JSON.stringify(body)
        });
    }).then(function(r) {
        if (!r.ok) return r.json().then(function(d){ throw new Error(d.message || 'PUT failed'); });
        return r.json();
    });
}

// Publish schedule
var publishing = false;
function publishSchedule() {
    if (publishing) return;
    var token = getGitHubToken();
    if (!token) {
        alert('Set your GitHub token in Settings before publishing.');
        return;
    }
    var name = getUserName() || 'Unknown';

    // Pre-publish: check heartbeat for other active editors
    publishing = true;
    document.getElementById('publishBtn').textContent = 'Checking...';

    ghGetFile(HEARTBEAT_PATH).then(function(hbFile) {
        if (hbFile) {
            try {
                var hb = JSON.parse(atob(hbFile.content));
                var age = Date.now() - new Date(hb.timestamp).getTime();
                if (hb.name !== name && age < 120000) {
                    var secs = Math.round(age / 1000);
                    if (!confirm(hb.name + ' was editing ' + secs + ' seconds ago.\nPublish anyway?')) {
                        publishing = false;
                        document.getElementById('publishBtn').textContent = 'Publish';
                        return Promise.reject('cancelled');
                    }
                }
            } catch(e) {}
        }

        // Build publish payload with timestamp
        var payload = JSON.parse(JSON.stringify(state));
        payload._published = { by: name, at: new Date().toISOString() };

        document.getElementById('publishBtn').textContent = 'Publishing...';
        return ghPutFile(DATA_PATH, JSON.stringify(payload, null, 2), 'Schedule update by ' + name);
    }).then(function(result) {
        if (!result) return; // cancelled
        document.getElementById('publishBtn').textContent = 'Publish';
        document.getElementById('stxt').textContent = 'Published';
        lastPublishedAt = new Date().toISOString();
        publishing = false;
    }).catch(function(err) {
        if (err === 'cancelled') return;
        publishing = false;
        document.getElementById('publishBtn').textContent = 'Publish';
        alert('Publish failed: ' + (err.message || err));
    });
}

// Sync check: fetch published version timestamp
var lastPublishedAt = null;
var syncDismissed = false;

function checkForUpdates() {
    ghReadJSON(DATA_PATH)
        .then(function(data) {
            if (!data || !data._published) return;
            var remoteAt = data._published.at;
            var remoteBy = data._published.by;
            var localAt = lastPublishedAt;

            // First load: just record the timestamp
            if (!localAt) {
                lastPublishedAt = remoteAt;
                return;
            }

            // If remote is newer than what we last published/loaded
            if (remoteAt > localAt && !syncDismissed) {
                document.getElementById('syncMsg').textContent =
                    remoteBy + ' published changes. Load latest?';
                document.getElementById('syncBanner').classList.add('show');
            }
        })
        .catch(function(){});
}

function loadPublished() {
    ghReadJSON(DATA_PATH)
        .then(function(data) {
            if (!data || !data.config) { alert('No published schedule found.'); return; }
            lastPublishedAt = data._published ? data._published.at : new Date().toISOString();
            delete data._published;
            state = data;
            mergeDefaults();
            render(); renderSwatches();
            dismissSync();
            document.getElementById('stxt').textContent = 'Loaded latest';
        })
        .catch(function(err) { alert('Failed to load: ' + err.message); });
}

function dismissSync() {
    document.getElementById('syncBanner').classList.remove('show');
    syncDismissed = true;
    // Reset dismiss after 5 min so it can notify again
    setTimeout(function(){ syncDismissed = false; }, 300000);
}

// Heartbeat: write presence while editing
var heartbeatInterval = null;

function writeHeartbeat() {
    var token = getGitHubToken();
    var name = getUserName();
    if (!token || !name) return;

    var hb = JSON.stringify({ name: name, timestamp: new Date().toISOString() });
    ghPutFile(HEARTBEAT_PATH, hb, 'Heartbeat: ' + name).catch(function(){});
}

function startHeartbeat() {
    if (heartbeatInterval) return;
    writeHeartbeat();
    heartbeatInterval = setInterval(writeHeartbeat, 30000);
}

function stopHeartbeat() {
    if (heartbeatInterval) { clearInterval(heartbeatInterval); heartbeatInterval = null; }
}

// Active user status display
function updateUserStatus() {
    var el = document.getElementById('userStatus');
    var name = getUserName();
    if (!name) { el.innerHTML = ''; return; }
    el.innerHTML = '<span class="user-dot green"></span><span class="status-inline" style="color:rgba(255,255,255,0.6)">' + name + '</span>';

    // Also check if someone else is active
    ghReadJSON(HEARTBEAT_PATH)
        .then(function(hb) {
            if (!hb || !hb.name || hb.name === name) return;
            var age = Date.now() - new Date(hb.timestamp).getTime();
            if (age < 120000) {
                el.innerHTML = '<span class="user-dot green"></span><span class="status-inline" style="color:rgba(255,255,255,0.6)">' + name + '</span>' +
                    '<span class="user-dot amber" style="margin-left:6px"></span><span class="status-inline" style="color:#F9B233">' + hb.name + ' editing</span>';
            }
        })
        .catch(function(){});
}

// Add GitHub token field to settings panel
var _origRenderSettings = renderSettings;
renderSettings = function() {
    _origRenderSettings();
    var c = document.getElementById('colorSettings');

    var h = '<div style="font-weight:700;font-size:0.75rem;margin:16px 0 12px;border-bottom:1px solid #444;padding-bottom:8px">Publish Settings</div>';

    // User name
    h += '<div style="margin-bottom:8px"><span style="font-size:0.55rem;opacity:0.7">Your Name</span>';
    h += '<input type="text" value="' + (getUserName() || '') + '" onchange="setUserName(this.value);updateUserStatus()" style="width:100%;font-size:0.6rem;background:#444;color:#fff;border:1px solid #555;padding:4px 6px;border-radius:2px;font-family:inherit;margin-top:3px"></div>';

    // GitHub token
    h += '<div style="margin-bottom:8px"><span style="font-size:0.55rem;opacity:0.7">GitHub Token</span>';
    var tok = getGitHubToken();
    var masked = tok ? '\u2022\u2022\u2022\u2022' + tok.slice(-4) : '';
    h += '<input type="password" value="' + (tok || '') + '" placeholder="ghp_..." onchange="setGitHubToken(this.value)" style="width:100%;font-size:0.6rem;background:#444;color:#fff;border:1px solid #555;padding:4px 6px;border-radius:2px;font-family:monospace;margin-top:3px"></div>';
    h += '<div style="font-size:0.5rem;opacity:0.4;margin-bottom:4px">Needed to publish. Ask Piet for the token.</div>';

    c.innerHTML += h;
};

// Initialize
loadState(); render(); renderSwatches();
if(!activeVenueId&&state.venues.length)activeVenueId=state.venues[0].id;
renderSwatches();

// Prompt for name on first visit
promptUserName();

// Start sync check + heartbeat
checkForUpdates();
setInterval(checkForUpdates, 60000);
setInterval(updateUserStatus, 60000);
startHeartbeat();
updateUserStatus();
</script>
