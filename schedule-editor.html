<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --slot-h: 24px;
            --legend-w: 100px;
            --gutter-w: 24px;
            --toolbar-h: 44px;
        }
        html, body {
            font-family: 'Archivo Narrow', Arial, sans-serif;
            background: #e8e8e8;
            overflow: auto;
        }

        /* Toolbar */
        .toolbar {
            position: fixed; top:0; left:0; right:0; height: var(--toolbar-h);
            background: #2c2c2c; color: #fff; display: flex; align-items: center;
            padding: 0 12px; gap: 6px; z-index: 1000; font-size: 0.7rem;
        }
        .tb-group { display:flex; align-items:center; gap:4px; padding:0 8px; border-right:1px solid rgba(255,255,255,0.1); height:100%; }
        .tb-group:last-child { border-right:none; }
        .tb-label { font-size:0.55rem; text-transform:uppercase; letter-spacing:0.06em; opacity:0.4; margin-right:3px; }
        .tb-btn {
            padding:4px 10px; border-radius:3px; border:1px solid rgba(255,255,255,0.12);
            background:rgba(255,255,255,0.05); color:#fff; font-size:0.65rem; cursor:pointer; font-family:inherit;
        }
        .tb-btn:hover { background:rgba(255,255,255,0.12); }
        .tb-btn.primary { background:#17A698; border-color:#17A698; }
        .tb-btn.primary:hover { background:#1fc4b3; }
        .vswatch {
            width:20px; height:20px; border-radius:3px; cursor:pointer;
            border:2px solid transparent; transition: border-color 0.15s;
        }
        .vswatch:hover, .vswatch.active { border-color:#fff; }

        /* Schedule container - framed with breathing room */
        .sched-wrap { margin-top: var(--toolbar-h); padding: 20px 20px 60px; }
        .sched { border: 1px solid #aaa; background: #fff; display: flex; flex-direction: column; }

        /* Title banner - slim fit */
        .title-banner {
            background: linear-gradient(135deg, #17A698, #1fc4b3);
            padding: 6px 20px; text-align: center;
        }
        .title-text {
            font-family:'Cinzel',serif; font-weight:700; font-size:1.6rem;
            color:#fff; letter-spacing:3px; text-transform:uppercase;
        }

        /* Bottom bar matching title - tall enough for reception overlap */
        .bottom-bar {
            padding: 16px; text-align: center;
        }

        /* Headers row */
        .headers { display: flex; }
        .hdr {
            display:flex; align-items:center; justify-content:center; text-align:center;
            font-weight:700; font-size:0.75rem; padding:6px 4px; color:#fff;
        }
        .hdr-legend { width: var(--legend-w); background:#333; font-size:0.5rem; text-transform:uppercase; letter-spacing:0.08em; line-height:1.2; }
        .hdr-gutter { width: var(--gutter-w); background:#F4D352; font-size:0.72rem; font-weight:700; color:#5a4a00; }
        .hdr-day { flex:1; background:#17A698; }
        .hdr-gutter.last { background:#F4D352; font-size:0.6rem; }

        /* Grid body: legend + [gutter + day-col] * N + gutter */
        .grid-body { display: flex; }

        /* Venue legend - color fills behind name, white text */
        .legend { width: var(--legend-w); border-right:1px solid #ddd; display:flex; flex-direction:column; }
        .leg-item { display:flex; align-items:center; justify-content:center; text-align:center; padding:4px 8px; font-weight:700; flex:1; color:#fff; text-shadow:0 1px 2px rgba(0,0,0,0.3); border-bottom:1px solid rgba(255,255,255,0.15); }

        /* Time gutter - ALL gutters use the same yellow from the PDF */
        .gutter {
            width: var(--gutter-w); background: #F4D352; display:flex; flex-direction:column;
            border-left:1px solid #e0c040; border-right:1px solid #e0c040;
            overflow: visible; position: relative; z-index: 3;
        }
        .gut-slot {
            height: var(--slot-h); display:flex; align-items:center; justify-content:center;
            font-size:0.72rem; font-weight:700;
            border-bottom: 1px solid rgba(0,0,0,0.06);
            overflow: visible; position: relative; z-index: 1;
        }
        .gut-slot.hour { border-bottom-color: rgba(0,0,0,0.12); }

        /* Day column - row stripes matching PDF mint/cyan */
        .day-col {
            flex:1; position:relative;
            min-height: calc(var(--slot-h) * 34);
            background: repeating-linear-gradient(
                to bottom,
                #e6f5f0 0px, #e6f5f0 calc(var(--slot-h)*2),
                #f0faf7 calc(var(--slot-h)*2), #f0faf7 calc(var(--slot-h)*4)
            );
        }
        .sline { position:absolute; left:0; right:0; height:1px; background:#e8e8e8; pointer-events:none; }
        .sline.hour { background:#ccc; }

        /* Events - no rounded corners, no gaps */
        .ev {
            position:absolute; border-radius:0; padding:0 3px;
            overflow:hidden; cursor:pointer; font-size:0.58rem; line-height:1.15;
            display:flex; flex-direction:column; justify-content:center; align-items:center;
            text-align:center; border:none; z-index:2;
            box-sizing:border-box;
        }
        /* Spanning label that covers multiple color columns */
        .ev-span-label {
            position:absolute; z-index:3; pointer-events:none;
            display:flex; align-items:center; justify-content:center; text-align:center;
            font-size:0.58rem; line-height:1.15; font-weight:700;
            color:#fff; text-shadow:0 1px 1px rgba(0,0,0,0.25);
        }
        .ev:hover { filter:brightness(1.08); }
        .ev.selected { outline:2px solid #fff; outline-offset:-2px; z-index:5; }
        .ev .ev-resize { position:absolute; bottom:0; left:0; right:0; height:6px; cursor:ns-resize; }
        .ev .ev-resize:hover { background:rgba(255,255,255,0.3); }

        /* Edit popover */
        .edit-pop {
            position:fixed; z-index:2000; background:#2c2c2c; color:#fff;
            padding:12px; border-radius:6px; box-shadow:0 8px 30px rgba(0,0,0,0.5);
            font-size:0.65rem; width:220px; display:none;
        }
        .edit-pop.show { display:block; }
        .edit-pop label { display:block; margin-bottom:3px; font-size:0.55rem; opacity:0.5; text-transform:uppercase; letter-spacing:0.05em; }
        .edit-pop input[type=text], .edit-pop textarea {
            width:100%; background:#444; color:#fff; border:1px solid #555;
            padding:4px 6px; border-radius:3px; font-family:inherit; font-size:0.65rem; margin-bottom:8px;
        }
        .edit-pop textarea { height:40px; resize:vertical; }
        .edit-pop select {
            width:100%; background:#444; color:#fff; border:1px solid #555;
            padding:4px 6px; border-radius:3px; font-family:inherit; font-size:0.65rem; margin-bottom:8px;
        }
        .edit-pop .ep-row { display:flex; gap:6px; align-items:center; margin-bottom:8px; }
        .edit-pop .ep-btn {
            padding:4px 10px; border-radius:3px; border:1px solid #555;
            background:#444; color:#fff; font-size:0.6rem; cursor:pointer; font-family:inherit;
        }
        .edit-pop .ep-btn:hover { background:#555; }
        .edit-pop .ep-btn.del { color:#f66; border-color:#f66; }
        .edit-pop .ep-btn.del:hover { background:#f66; color:#fff; }

        .venue-pick {
            width:28px; height:28px; border-radius:4px; cursor:pointer;
            border:2px solid transparent; transition:border-color 0.1s;
            display:flex; align-items:center; justify-content:center;
            font-size:0.45rem; color:#fff; text-shadow:0 1px 1px rgba(0,0,0,0.3);
            overflow:hidden; line-height:1;
        }
        .venue-pick:hover { border-color:rgba(255,255,255,0.5); }
        .venue-pick.selected { border-color:#fff; }

        /* Drag ghost */
        .drag-ghost {
            position:fixed; pointer-events:none; z-index:3000;
            border:2px dashed rgba(255,255,255,0.5); border-radius:0; opacity:0.6;
        }
        .ev-t { font-weight:700; }
        .ev-s { font-size:0.5rem; opacity:0.75; }
        .ev.lt .ev-t, .ev.lt .ev-s { color:#fff; text-shadow:0 1px 1px rgba(0,0,0,0.2); }
        .ev.dk .ev-t, .ev.dk .ev-s { color:#333; text-shadow:none; }

        /* Reception - narrow inset white box with outlined circle */
        .rec-block {
            position:absolute; z-index:2;
            display:flex; align-items:center; gap:4px; padding:2px 5px;
            background:#fff; border:1px solid #bbb;
            left:25%; right:25%;
        }
        .rec-circle {
            width:18px; height:18px; border-radius:50%;
            border:2px solid #7B2D5F;
            display:flex; align-items:center; justify-content:center;
            font-size:0.5rem; font-weight:700; color:#7B2D5F; flex-shrink:0;
            background:#fff;
        }
        .rec-text {
            font-weight:700; font-size:0.52rem; color:#333; line-height:1.2;
        }

        /* Status - inline in toolbar */
        .status-inline { color:rgba(255,255,255,0.35); font-size:0.55rem; }
    </style>
</head>

        <button class="tb-btn" onclick="resetToDefault()" style="color:#f88">Reset</button>
    </div>
    <div class="tb-group">
        <button class="tb-btn primary" onclick="exportPDF()">Export PDF</button>
    </div>
    <div class="tb-group">
        <button class="tb-btn" onclick="toggleSettings()">Settings</button>
    </div>
    <div class="tb-group" style="margin-left:auto">
        <span class="status-inline" id="stxt">Ready</span>

    </div>
</div>

<!-- Settings panel -->
<div id="settingsPanel" style="display:none;position:fixed;top:var(--toolbar-h);right:20px;width:260px;max-height:calc(100vh - var(--toolbar-h) - 40px);overflow-y:auto;background:#333;color:#fff;padding:14px;z-index:999;font-size:0.65rem;border:1px solid #555;border-top:none;border-radius:0 0 6px 6px;box-shadow:0 4px 20px rgba(0,0,0,0.3)">
    <div style="font-weight:700;font-size:0.75rem;margin-bottom:12px;border-bottom:1px solid #444;padding-bottom:8px">Color Settings</div>
    <div id="colorSettings"></div>
</div>

<div class="edit-pop" id="editPop">
    <div id="epEventFields">
        <label>Title</label>
        <input type="text" id="epTitle">
        <label>Subtitle</label>
        <input type="text" id="epSub">
        <label>Venue</label>
        <div id="epVenueGrid" style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px"></div>
        <label>Duration</label>
        <div class="ep-row">
            <button class="ep-btn" onclick="epDur(-1)">-</button>
            <span id="epDurVal" style="min-width:50px;text-align:center">2</span>
            <button class="ep-btn" onclick="epDur(1)">+</button>
        </div>
    </div>
    <div id="epRecFields" style="display:none">
        <label>Reception Hours</label>
        <textarea id="epRecText" style="height:50px"></textarea>
    </div>
    <div class="ep-row" style="margin-top:8px">
        <button class="ep-btn" onclick="epSave()">Done</button>
        <button class="ep-btn del" id="epDelBtn" onclick="epDelete()">Delete</button>
    </div>
</div>
<div class="sched-wrap">
    <div class="sched" id="sched"></div>
</div>

// Normalize hex: expand 3-digit to 6-digit, ensure # prefix
function normHex(v){
    v=v.trim();
    if(v.charAt(0)!=='#') v='#'+v;
    if(/^#[0-9a-fA-F]{3}$/.test(v)) v='#'+v[1]+v[1]+v[2]+v[2]+v[3]+v[3];
    return v.toLowerCase();
}

function pushUndo(){

}

function undo(){

    render(); renderSwatches();

}

function brightness(hex){ var r=parseInt(hex.substr(1,2),16),g=parseInt(hex.substr(3,2),16),b=parseInt(hex.substr(5,2),16); return (r*299+g*587+b*114)/1000; }

// Auto-assign columns for overlapping events in a day
// Each event gets only the columns needed for ITS direct overlaps, not transitive chains
function assignColumns(dayEvents){
    if(!dayEvents.length) return [];
    var evts = dayEvents.map(function(e){ return {evt:e, col:0, totalCols:1}; });
    evts.sort(function(a,b){ return a.evt.startSlot - b.evt.startSlot || (a.evt.id < b.evt.id ? -1 : 1); });

    // Greedy column assignment: for each event, find the first column not taken by a direct overlap
    evts.forEach(function(item, i){
        var e = item.evt;
        var eEnd = e.startSlot + e.spanSlots;
        var c = 0;
        while(true){
            var conflict = false;
            for(var j=0;j<i;j++){
                if(evts[j].col !== c) continue;
                var o = evts[j].evt;
                if(e.startSlot < o.startSlot+o.spanSlots && o.startSlot < eEnd){ conflict=true; break; }
            }
            if(!conflict) break;
            c++;
        }
        item.col = c;
    });

    // For each event, totalCols = max columns needed across all slots it occupies
    evts.forEach(function(item){
        var e = item.evt;
        var eEnd = e.startSlot + e.spanSlots;
        var maxCols = item.col + 1;
        // Check all other events that overlap this one
        evts.forEach(function(other){
            if(other === item) return;
            var o = other.evt;
            if(e.startSlot < o.startSlot+o.spanSlots && o.startSlot < eEnd){
                if(other.col + 1 > maxCols) maxCols = other.col + 1;
            }
        });
        item.totalCols = maxCols;
    });

    // Normalize: all events overlapping each other should share the same totalCols
    var changed = true;
    while(changed){
        changed = false;
        evts.forEach(function(item){
            var e = item.evt;
            var eEnd = e.startSlot + e.spanSlots;
            evts.forEach(function(other){
                if(other === item) return;
                var o = other.evt;
                if(e.startSlot < o.startSlot+o.spanSlots && o.startSlot < eEnd){
                    var m = Math.max(item.totalCols, other.totalCols);
                    if(item.totalCols !== m || other.totalCols !== m){
                        item.totalCols = m;
                        other.totalCols = m;
                        changed = true;
                    }
                }
            });
        });
    }

    return evts;
}

function render(){
    SH = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--slot-h'));
    var el=document.getElementById('sched'), cfg=state.config, nd=cfg.days.length, ns=(cfg.endHour-cfg.startHour)*2;
    var h='';

    var sty=state.styles;

    // Title
    h+='<div class="title-banner" style="background:'+sty.titleBg+'"><div class="title-text" style="font-family:'+sty.title.fontFamily+';font-size:'+sty.title.fontSize+'px;color:'+sty.title.color+'">'+cfg.title+'</div></div>';

    // Headers
    h+='<div class="headers">';
    h+='<div class="hdr hdr-legend" style="background:'+sty.legendHeader.bgColor+';color:'+sty.legendHeader.textColor+'">Colour<br>Legend</div>';
    h+='<div class="hdr hdr-gutter" style="background:'+sty.gutterColor+';color:'+sty.gutterText+'">TIME</div>';
    for(var d=0;d<nd;d++){
        h+='<div class="hdr hdr-day" style="background:'+sty.dayHeaders.bgColor+';color:'+sty.dayHeaders.textColor+';font-family:\''+sty.dayHeaders.fontFamily+'\';font-size:'+sty.dayHeaders.fontSize+'px;font-weight:'+sty.dayHeaders.fontWeight+'">'+cfg.days[d].label+' '+cfg.days[d].date+'</div>';
        if(d<nd-1) h+='<div class="hdr hdr-gutter" style="background:'+sty.gutterColor+';color:'+sty.gutterText+'"></div>';
    }
    h+='<div class="hdr hdr-gutter last" style="background:'+sty.gutterColor+'"></div>';
    h+='</div>';

    // Grid body
    h+='<div class="grid-body">';

    // Legend
    h+='<div class="legend">';
    state.venues.forEach(function(v){ h+='<div class="leg-item" style="background:'+v.color+';font-family:\''+sty.legendFont.fontFamily+'\';font-size:'+sty.legendFont.fontSize+'px;font-weight:'+sty.legendFont.fontWeight+'">'+v.name+'</div>'; });
    h+='</div>';

    // First gutter (TIME)
    h+='<div class="gutter" style="background:'+sty.gutterColor+'">';
    for(var s=0;s<ns;s++){
        var hr=cfg.startHour+Math.floor(s/2), mn=(s%2)*30, isH=mn===0;
        var lb='';
        if(isH){if(hr===12)lb='NOON';else if(hr<12)lb=hr+':00';else lb=(hr-12)+':00';}else lb=':30';
        h+='<div class="gut-slot'+(isH?' hour':'')+'" style="color:'+sty.gutterText+';font-family:\''+sty.gutterFont.fontFamily+'\';font-size:'+(isH?sty.gutterFont.fontSize:sty.gutterFont.fontSize-2)+'px;font-weight:'+(isH?sty.gutterFont.fontWeight:400)+'">'+lb+'</div>';
    }
    h+='</div>';

    // Day columns with gutters between
    for(var d=0;d<nd;d++){
        h+='<div class="day-col" data-day="'+d+'" style="background:repeating-linear-gradient(to bottom,'+sty.rowStripe1+' 0px,'+sty.rowStripe1+' '+(SH*2)+'px,'+sty.rowStripe2+' '+(SH*2)+'px,'+sty.rowStripe2+' '+(SH*4)+'px)">';
        // Grid lines
        for(var s=1;s<ns;s++){
            h+='<div class="sline'+(s%2===0?' hour':'')+'" style="top:'+(s*SH)+'px"></div>';
        }
        // Events for this day - auto-assign columns
        var devs=state.events.filter(function(e){return e.dayIndex===d});
        var laid=assignColumns(devs);

        // Find groups of events with the same title that overlap - they get a spanning label
        var spanGroups = {};
        laid.forEach(function(item){
            var evt=item.evt;
            var normTitle = (evt.title||'').replace(/\s+/g,' ').trim();
            var key = normTitle+'|'+evt.startSlot+'|'+evt.spanSlots;
            item._spanKey = key;
            if(!spanGroups[key]) spanGroups[key]=[];
            spanGroups[key].push(item);
        });

        // Render color blocks
        laid.forEach(function(item){
            var evt=item.evt, v=state.venues.find(function(x){return x.id===evt.venueId});
            var c=v?v.color:'#999';
            var top=evt.startSlot*SH, ht=evt.spanSlots*SH;
            var tc=item.totalCols, col=item.col;
            var wp=100/tc, lp=col*wp;
            var isSpanned = spanGroups[item._spanKey] && spanGroups[item._spanKey].length > 1;
            var cls=brightness(c)>160?'dk':'lt';
            var tl=(evt.title||'').replace(/\n/g,'<br>');

            h+='<div class="ev '+cls+(selectedEvtId===evt.id?' selected':'')+'" data-id="'+evt.id+'" style="top:'+top+'px;height:'+ht+'px;left:'+lp+'%;width:'+wp+'%;background:'+c+';font-family:\''+sty.eventFont.fontFamily+'\';font-size:'+sty.eventFont.fontSize+'px;font-weight:'+sty.eventFont.fontWeight+';border-right:1px solid rgba(255,255,255,0.15)">';
            if(!isSpanned){
                h+='<div class="ev-t">'+tl+'</div>';
                if(evt.subtitle)h+='<div class="ev-s">'+evt.subtitle.replace(/\n/g,'<br>')+'</div>';
            }
            h+='<div class="ev-resize" data-id="'+evt.id+'"></div>';
            h+='</div>';
        });

        // Render spanning labels for same-title groups
        var spanned = {};
        Object.keys(spanGroups).forEach(function(key){
            var group = spanGroups[key];
            if(group.length < 2) return;
            if(spanned[key]) return;
            spanned[key] = true;
            var minCol=Infinity, maxCol=0, totalCols=group[0].totalCols;
            group.forEach(function(item){ if(item.col<minCol)minCol=item.col; if(item.col>maxCol)maxCol=item.col; });
            var evt=group[0].evt;
            var top=evt.startSlot*SH, ht=evt.spanSlots*SH;
            var lp=(minCol/totalCols)*100, wp=((maxCol-minCol+1)/totalCols)*100;
            var tl=(evt.title||'').replace(/\n/g,'<br>');
            h+='<div class="ev-span-label" style="top:'+top+'px;height:'+ht+'px;left:'+lp+'%;width:'+wp+'%">';
            h+='<div class="ev-t">'+tl+'</div>';
            h+='</div>';
        });

        // Reception block at the bottom of each day column
        var rec=cfg.reception.find(function(r){return r.dayIndex===d});
        if(rec){
            var recTop = (ns - 1) * SH; // start at last slot, overlap into bottom bar
            var recH = SH * 2; // extends below the grid into bottom bar
            h+='<div class="rec-block" data-recday="'+d+'" style="top:'+recTop+'px;height:'+recH+'px;cursor:pointer">';
            h+='<div class="rec-circle">R</div>';
            h+='<div class="rec-text">Reception<br>'+rec.text.replace(/\n/g,', ')+'</div>';
            h+='</div>';
        }

        h+='</div>';

        // Gutter after day (between days or final)
        if(d<nd-1){
            h+='<div class="gutter" style="background:'+sty.gutterColor+'">';
            for(var s=0;s<ns;s++){
                var hr=cfg.startHour+Math.floor(s/2), mn=(s%2)*30, isH=mn===0;
                var lb='';
                if(isH){var sf=hr<12?'':'';if(hr===12)lb='12';else if(hr<12)lb=''+hr;else lb=''+(hr-12);}else lb='30';
                h+='<div class="gut-slot'+(isH?' hour':'')+'" style="color:'+sty.gutterText+';font-family:\''+sty.gutterFont.fontFamily+'\';font-size:'+(isH?sty.gutterFont.fontSize:sty.gutterFont.fontSize-2)+'px;font-weight:'+(isH?sty.gutterFont.fontWeight:400)+'">'+lb+'</div>';
            }
            h+='</div>';
        }
    }

    // Final gutter (right time)
    h+='<div class="gutter" style="background:'+sty.gutterColor+'">';
    for(var s=0;s<ns;s++){
        var hr=cfg.startHour+Math.floor(s/2), mn=(s%2)*30, isH=mn===0;
        var lb='';
        if(isH){var sf=hr<12?'a':'p';if(hr===12)lb='12p';else if(hr<12)lb=hr+sf;else lb=(hr-12)+sf;}else lb='30';
        h+='<div class="gut-slot'+(isH?' hour':'')+'" style="color:'+sty.gutterText+';font-family:\''+sty.gutterFont.fontFamily+'\';font-size:'+(isH?sty.gutterFont.fontSize:sty.gutterFont.fontSize-2)+'px;font-weight:'+(isH?sty.gutterFont.fontWeight:400)+'">'+lb+'</div>';
    }
    h+='</div>';

    h+='</div>'; // end grid-body

    // Bottom bar matching title
    h+='<div class="bottom-bar" style="background:'+sty.titleBg+'">&nbsp;</div>';

    el.innerHTML=h;
    saveState();
}

}

function exportPDF(){
    var jsPDF=window.jspdf.jsPDF;
    var doc=new jsPDF({orientation:'landscape',unit:'pt',format:[2592,1728]});
    var cfg=state.config,nd=cfg.days.length,ns=(cfg.endHour-cfg.startHour)*2;
    var W=2592,H=1728,legW=130,gutW=50,titleH=65,hdrH=45,recH=40;

    var dayW=(W-legW-gutW*totalGuts)/nd;
    var slotH=(H-titleH-hdrH-recH)/ns;

    // Title
    doc.setFillColor(23,166,152); doc.rect(0,0,W,titleH,'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(32); doc.setTextColor(255,255,255);

    }
    doc.setFillColor(224,192,64); doc.rect(W-gutW,hy,gutW,hdrH,'F');

    // Time gutter (left)

    for(var s=0;s<ns;s++){
        var hr=cfg.startHour+Math.floor(s/2),mn=(s%2)*30,isH=mn===0;

        doc.setFont('helvetica',isH?'bold':'normal'); doc.setFontSize(6.5); doc.setTextColor(isH?50:120,isH?50:120,isH?50:120);
        doc.text(lb,legW+gutW/2,gy+s*slotH+slotH/2+2,{align:'center'});
        if(s>0){doc.setDrawColor(isH?180:220,isH?180:220,isH?180:220);doc.setLineWidth(isH?0.5:0.3);doc.line(legW,gy+s*slotH,legW+gutW,gy+s*slotH);}
    }

    // Day columns + gutters
    for(var d=0;d<nd;d++){
        var dx=legW+gutW+d*(dayW+gutW);
        // Row stripes
        for(var s=0;s<ns;s++){if(Math.floor(s/2)%2===0){doc.setFillColor(232,245,243);doc.rect(dx,gy+s*slotH,dayW,slotH,'F');}}

        for(var s=1;s<ns;s++){doc.setDrawColor(s%2===0?180:220,s%2===0?180:220,s%2===0?180:220);doc.setLineWidth(s%2===0?0.5:0.25);doc.line(dx,gy+s*slotH,dx+dayW,gy+s*slotH);}
        // Events (auto-column)
        var pdfDevs=state.events.filter(function(e){return e.dayIndex===d});

        pdfLaid.forEach(function(item){
            var evt=item.evt;

            var tc=item.totalCols,col=item.col;

                var hr=cfg.startHour+Math.floor(s/2),mn=(s%2)*30,isH=mn===0;

                doc.text(lb,gx+gutW/2,gy+s*slotH+slotH/2+2,{align:'center'});

            }
        }
    }
    // Right gutter
    var rgx=W-gutW;
    doc.setFillColor(245,230,160);doc.rect(rgx,gy,gutW,ns*slotH,'F');
    for(var s=0;s<ns;s++){
        var hr=cfg.startHour+Math.floor(s/2),mn=(s%2)*30,isH=mn===0;
        var lb='';if(isH){var sf=hr<12?'a':'p';if(hr===12)lb='12p';else if(hr<12)lb=hr+sf;else lb=(hr-12)+sf;}else lb='30';
        doc.setFont('helvetica',isH?'bold':'normal');doc.setFontSize(6);doc.setTextColor(isH?100:140,isH?90:130,isH?20:60);
        doc.text(lb,rgx+gutW/2,gy+s*slotH+slotH/2+2,{align:'center'});
        if(s>0){doc.setDrawColor(200,180,100);doc.setLineWidth(0.3);doc.line(rgx,gy+s*slotH,rgx+gutW,gy+s*slotH);}
    }

    // Reception
    var ry=gy+ns*slotH;
    doc.setFillColor(228,228,228);doc.rect(0,ry,W,recH,'F');
    doc.setDrawColor(23,166,152);doc.setLineWidth(2);doc.line(0,ry,W,ry);
    for(var d=0;d<nd;d++){
        var dx=legW+gutW+d*(dayW+gutW);
        var rec=cfg.reception.find(function(r){return r.dayIndex===d});
        doc.setDrawColor(23,166,152);doc.setLineWidth(1.5);doc.circle(dx+14,ry+recH/2,7);
        doc.setFont('helvetica','bold');doc.setFontSize(7);doc.setTextColor(23,166,152);doc.text('R',dx+14,ry+recH/2+3,{align:'center'});
        if(rec){doc.setFont('helvetica','normal');doc.setFontSize(5.5);doc.setTextColor(80,80,80);var rl=rec.text.split('\n');rl.forEach(function(l,i){doc.text(l,dx+28,ry+recH/2-(rl.length-1)*3.5+i*7+2);});}
    }

    doc.save('ACYR_Schedule_'+cfg.year+'.pdf');
    document.getElementById('stxt').textContent='PDF exported';
}

function toggleSettings(){
    var p=document.getElementById('settingsPanel');
    if(p.style.display==='none'){p.style.display='block';renderSettings();}else{p.style.display='none';}
}

document.addEventListener('mousedown', function(e){
    var p=document.getElementById('settingsPanel');
    if(p.style.display==='none') return;
    if(p.contains(e.target)) return;
    if(e.target.closest('.tb-btn') && e.target.closest('.tb-btn').textContent.trim()==='Settings') return;
    p.style.display='none';
});

function renderSettings(){
    var c=document.getElementById('colorSettings');
    var sty=state.styles;
    var items=[
        {label:'Title Banner',key:'titleBg',val:sty.titleBg},
        {label:'Title Text',key:'title.color',val:sty.title.color},
        {label:'Day Headers',key:'dayHeaders.bgColor',val:sty.dayHeaders.bgColor},
        {label:'Day Header Text',key:'dayHeaders.textColor',val:sty.dayHeaders.textColor},
        {label:'Legend Header',key:'legendHeader.bgColor',val:sty.legendHeader.bgColor},
        {label:'Gutters',key:'gutterColor',val:sty.gutterColor},
        {label:'Gutter Text',key:'gutterText',val:sty.gutterText},
        {label:'Row Stripe 1',key:'rowStripe1',val:sty.rowStripe1},
        {label:'Row Stripe 2',key:'rowStripe2',val:sty.rowStripe2},
        {label:'Reception Bg',key:'receptionBg',val:sty.receptionBg},
        {label:'Reception Circle',key:'receptionCircle',val:sty.receptionCircle},
        {label:'Grid Lines',key:'gridLines',val:sty.gridLines}
    ];
    var h='';
    items.forEach(function(it){
        h+='<div style="display:flex;align-items:center;gap:4px;margin-bottom:8px">';
        h+='<span style="flex:1">'+it.label+'</span>';
        var nv=normHex(it.val);
        h+='<input type="text" value="'+nv+'" data-key="'+it.key+'" onchange="updateStyleColor(this)" style="width:70px;font-size:0.55rem;background:#444;color:#fff;border:1px solid #555;padding:2px 4px;border-radius:2px;font-family:monospace">';
        h+='<input type="color" value="'+nv+'" data-key="'+it.key+'" oninput="updateStyleColor(this)" style="width:24px;height:20px;border:none;cursor:pointer;background:none">';
        h+='</div>';
    });
    // Font settings
    h+='<div style="font-weight:700;font-size:0.75rem;margin:16px 0 12px;border-bottom:1px solid #444;padding-bottom:8px">Font Settings</div>';
    var fonts=['Cinzel','Archivo Narrow','Helvetica','Georgia','Arial','Verdana','Times New Roman','Courier New'];
    var fontGroups=[
        {label:'Title',fkey:'title',obj:sty.title},
        {label:'Day Headers',fkey:'dayHeaders',obj:sty.dayHeaders},
        {label:'Legend',fkey:'legendFont',obj:sty.legendFont},
        {label:'Gutters',fkey:'gutterFont',obj:sty.gutterFont},
        {label:'Events',fkey:'eventFont',obj:sty.eventFont}
    ];
    fontGroups.forEach(function(fg){
        h+='<div style="margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #333">';
        h+='<div style="font-weight:600;margin-bottom:6px;opacity:0.7">'+fg.label+'</div>';
        // Font family
        h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px"><span style="font-size:0.55rem">Family</span>';
        h+='<select data-fkey="'+fg.fkey+'" data-fprop="fontFamily" onchange="updateFont(this)" style="width:110px;font-size:0.55rem;background:#444;color:#fff;border:1px solid #555;padding:2px;border-radius:2px">';
        fonts.forEach(function(f){ h+='<option value="'+f+'"'+(fg.obj.fontFamily===f?' selected':'')+'>'+f+'</option>'; });
        h+='</select></div>';
        // Font size
        h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px"><span style="font-size:0.55rem">Size</span>';
        h+='<input type="number" value="'+fg.obj.fontSize+'" data-fkey="'+fg.fkey+'" data-fprop="fontSize" onchange="updateFont(this)" style="width:50px;font-size:0.55rem;background:#444;color:#fff;border:1px solid #555;padding:2px;border-radius:2px;text-align:center" min="6" max="72"></div>';
        // Font weight
        h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px"><span style="font-size:0.55rem">Weight</span>';
        h+='<select data-fkey="'+fg.fkey+'" data-fprop="fontWeight" onchange="updateFont(this)" style="width:110px;font-size:0.55rem;background:#444;color:#fff;border:1px solid #555;padding:2px;border-radius:2px">';
        [400,500,600,700,900].forEach(function(w){ h+='<option value="'+w+'"'+(fg.obj.fontWeight==w?' selected':'')+'>'+w+(w===400?' (Normal)':w===700?' (Bold)':'')+'</option>'; });
        h+='</select></div>';
        // Letter spacing (title only)
        if(fg.obj.letterSpacing!==undefined){
            h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px"><span style="font-size:0.55rem">Spacing</span>';
            h+='<input type="number" value="'+fg.obj.letterSpacing+'" data-fkey="'+fg.fkey+'" data-fprop="letterSpacing" onchange="updateFont(this)" style="width:50px;font-size:0.55rem;background:#444;color:#fff;border:1px solid #555;padding:2px;border-radius:2px;text-align:center" min="0" max="20"></div>';
        }
        h+='</div>';
    });

    h+='<div style="font-weight:700;font-size:0.75rem;margin:16px 0 12px;border-bottom:1px solid #444;padding-bottom:8px">Venues / Locations</div>';
    state.venues.forEach(function(v,i){
        h+='<div style="display:flex;align-items:center;gap:3px;margin-bottom:5px">';
        h+='<input type="color" value="'+v.color+'" data-venue="'+i+'" onchange="updateVenueColor(this)" style="width:22px;height:18px;border:none;cursor:pointer;background:none;flex-shrink:0">';
        h+='<input type="text" value="'+v.color+'" data-vhex="'+i+'" onchange="updateVenueHex(this)" style="width:62px;font-size:0.5rem;background:#444;color:#fff;border:1px solid #555;padding:2px 3px;border-radius:2px;font-family:monospace;flex-shrink:0">';
        h+='<input type="text" value="'+v.name+'" data-vname="'+i+'" onchange="updateVenueName(this)" style="flex:1;font-size:0.6rem;background:#444;color:#fff;border:1px solid #555;padding:2px 4px;border-radius:2px;font-family:inherit">';
        h+='<button onclick="deleteVenue('+i+')" style="background:none;border:none;color:#f66;cursor:pointer;font-size:0.7rem;padding:0 4px" title="Delete">\u2715</button>';
        h+='</div>';
    });
    h+='<button onclick="addVenue()" style="margin-top:6px;padding:4px 10px;border-radius:3px;border:1px solid #555;background:#444;color:#fff;font-size:0.6rem;cursor:pointer;font-family:inherit;width:100%">+ Add Venue</button>';
    c.innerHTML=h;
}

function updateStyleColor(inp){
    var key=inp.dataset.key, val=normHex(inp.value);
    if(!/^#[0-9a-fA-F]{6}$/.test(val)) return;
    pushUndo();
    var parts=key.split('.');
    if(parts.length===2) state.styles[parts[0]][parts[1]]=val;
    else state.styles[key]=val;
    render(); renderSettings();
}

function updateVenueColor(inp){
    pushUndo();
    state.venues[parseInt(inp.dataset.venue)].color=inp.value;
    render(); renderSwatches(); renderSettings();
}

function updateVenueHex(inp){
    var val=inp.value.trim();
    if(val.charAt(0)!=='#') val='#'+val;
    if(/^#[0-9a-fA-F]{6}$/.test(val)){
        state.venues[parseInt(inp.dataset.vhex)].color=val;
        render(); renderSwatches(); renderSettings();
    }
}

function updateVenueName(inp){
    state.venues[parseInt(inp.dataset.vname)].name=inp.value;
    render(); renderSwatches();
}

function addVenue(){
    var id='venue-'+Date.now();
    state.venues.push({id:id, name:'New Venue', color:'#888888'});
    render(); renderSwatches(); renderSettings();
}

function deleteVenue(idx){
    var v=state.venues[idx];
    var count=state.events.filter(function(e){return e.venueId===v.id}).length;
    var msg='Delete venue "'+v.name+'"?';
    if(count) msg+='\n\n'+count+' event(s) use this venue. They will be reassigned to "'+state.venues[0].name+'".';
    if(!confirm(msg)) return;
    pushUndo();
    // Reassign orphaned events to first venue
    if(count && state.venues.length > 1){
        var newId = state.venues[idx===0?1:0].id;
        state.events.forEach(function(e){ if(e.venueId===v.id) e.venueId=newId; });
    }
    state.venues.splice(idx,1);
    render(); renderSwatches(); renderSettings();
}

function updateFont(inp){
    var fkey=inp.dataset.fkey, fprop=inp.dataset.fprop, val=inp.value;
    if(fprop==='fontSize'||fprop==='fontWeight'||fprop==='letterSpacing') val=parseInt(val);
    state.styles[fkey][fprop]=val;
    render(); renderSettings();
}

// ============================================================
// INTERACTIONS
// ============================================================
var selectedEvtId = null;
var editingRecDay = null;
var dragging = null; // {type:'resize'|'move', evtId, startY, origSlot, origSpan, dayIndex}

// Click on day column: stamp new event or select existing
document.addEventListener('mousedown', function(e) {
    var evEl = e.target.closest('.ev[data-id]');
    var resizeEl = e.target.closest('.ev-resize[data-id]');
    var dayCol = e.target.closest('.day-col');

    // Close popover if clicking outside
    if (!e.target.closest('.edit-pop') && !evEl) {
        closePopover();
    }

    // Resize handle
    if (resizeEl) {
        e.preventDefault();
        var id = resizeEl.dataset.id;
        var evt = state.events.find(function(x){return x.id===id});
        if (!evt) return;
        pushUndo();
        dragging = { type:'resize', evtId:id, startY:e.clientY, origSpan:evt.spanSlots };
        return;
    }

    // Click reception block: show popover for reception
    var recBlock = e.target.closest('.rec-block[data-recday]');
    if (recBlock) {
        e.preventDefault();
        var dayIdx = parseInt(recBlock.dataset.recday);
        showReceptionPopover(dayIdx, e.clientX, e.clientY);
        return;
    }

    // Click existing event: select + show popover
    if (evEl && evEl.dataset.id) {
        e.preventDefault();
        var id = evEl.dataset.id;
        selectedEvtId = id;
        render();
        showPopover(id, e.clientX, e.clientY);

        // Start move drag after a small movement
        var evt = state.events.find(function(x){return x.id===id});
        if (evt) {
            dragging = { type:'move', evtId:id, startY:e.clientY, startX:e.clientX, origSlot:evt.startSlot, origDay:evt.dayIndex, moved:false };
        }
        return;
    }

    // Single click on empty slot: just close popover (no auto-stamp)
});

// Double-click to add new event
document.addEventListener('dblclick', function(e) {
    var dayCol = e.target.closest('.day-col');
    if (!dayCol || !activeVenueId) return;
    e.preventDefault();

    var rect = dayCol.getBoundingClientRect();
    var y = e.clientY - rect.top;
    var slot = Math.floor(y / SH);
    var ns = (state.config.endHour - state.config.startHour) * 2;
    if (slot < 0 || slot >= ns) return;

    var newEvt = {
        id: 'e' + Date.now(),
        dayIndex: parseInt(dayCol.dataset.day),
        startSlot: slot,
        spanSlots: 2,
        venueId: activeVenueId,
        title: 'New Event'
    };
    pushUndo();
    state.events.push(newEvt);
    selectedEvtId = newEvt.id;
    render();
    showPopover(newEvt.id, e.clientX, e.clientY);
});

document.addEventListener('mousemove', function(e) {
    if (!dragging) return;

    if (dragging.type === 'resize') {
        var evt = state.events.find(function(x){return x.id===dragging.evtId});
        if (!evt) return;
        var dy = e.clientY - dragging.startY;
        var slotDelta = Math.round(dy / SH);
        var newSpan = Math.max(1, dragging.origSpan + slotDelta);
        var ns = (state.config.endHour - state.config.startHour) * 2;
        if (evt.startSlot + newSpan > ns) newSpan = ns - evt.startSlot;
        if (evt.spanSlots !== newSpan) {
            evt.spanSlots = newSpan;
            render();
            updatePopoverDur();
        }
    }

    if (dragging.type === 'move') {
        var dx = Math.abs(e.clientX - dragging.startX);
        var dy = Math.abs(e.clientY - dragging.startY);
        if (dx > 5 || dy > 5) dragging.moved = true;

        if (dragging.moved) {
            closePopover();
            var evt = state.events.find(function(x){return x.id===dragging.evtId});
            if (!evt) return;

            // Vertical movement: change start slot
            var slotDelta = Math.round((e.clientY - dragging.startY) / SH);
            var newSlot = Math.max(0, dragging.origSlot + slotDelta);
            var ns = (state.config.endHour - state.config.startHour) * 2;
            if (newSlot + evt.spanSlots > ns) newSlot = ns - evt.spanSlots;

            // Horizontal: detect which day column the mouse is over
            var dayCols = document.querySelectorAll('.day-col');
            var newDay = evt.dayIndex;
            dayCols.forEach(function(dc) {
                var r = dc.getBoundingClientRect();
                if (e.clientX >= r.left && e.clientX <= r.right) {
                    newDay = parseInt(dc.dataset.day);
                }
            });

            if (evt.startSlot !== newSlot || evt.dayIndex !== newDay) {
                evt.startSlot = newSlot;
                evt.dayIndex = newDay;
                render();
            }
        }
    }
});

document.addEventListener('mouseup', function(e) {
    if (dragging && dragging.type === 'move' && !dragging.moved) {
        // It was a click, not a drag - popover already shown
    }
    dragging = null;
});

// Popover
function showPopover(evtId, mx, my) {
    var pop = document.getElementById('editPop');
    var evt = state.events.find(function(x){return x.id===evtId});
    if (!evt) return;

    document.getElementById('epTitle').value = (evt.title || '').replace(/\n/g, '\\n');
    document.getElementById('epSub').value = evt.subtitle || '';

    // Build venue grid with colored swatches
    var vg = document.getElementById('epVenueGrid');
    vg.innerHTML = '';
    state.venues.forEach(function(v) {
        var pick = document.createElement('div');
        pick.className = 'venue-pick' + (v.id === evt.venueId ? ' selected' : '');
        pick.style.background = v.color;
        pick.title = v.name;
        pick.textContent = v.name.split(' ').map(function(w){return w[0]}).join('');
        pick.addEventListener('click', function(){
            vg.querySelectorAll('.venue-pick').forEach(function(p){p.classList.remove('selected')});
            pick.classList.add('selected');
            pick._venueId = v.id;
        });
        pick._venueId = v.id;
        vg.appendChild(pick);
    });

    // Show event fields, hide reception fields, clear reception mode
    editingRecDay = null;
    document.getElementById('epEventFields').style.display = '';
    document.getElementById('epRecFields').style.display = 'none';
    document.getElementById('epDelBtn').style.display = '';

    updatePopoverDur();

    // Position
    var pw = 220, ph = 260;
    var x = Math.min(mx + 10, window.innerWidth - pw - 10);
    var y = Math.min(my - 20, window.innerHeight - ph - 10);
    pop.style.left = x + 'px';
    pop.style.top = Math.max(50, y) + 'px';
    pop.classList.add('show');
}

function showReceptionPopover(dayIdx, mx, my) {
    editingRecDay = dayIdx;
    selectedEvtId = null;
    var rec = state.config.reception.find(function(r){return r.dayIndex===dayIdx});

    document.getElementById('epEventFields').style.display = 'none';
    document.getElementById('epRecFields').style.display = '';
    document.getElementById('epDelBtn').style.display = 'none';
    document.getElementById('epRecText').value = rec ? rec.text : '';

    var pop = document.getElementById('editPop');
    var pw = 220;
    var x = Math.min(mx + 10, window.innerWidth - pw - 10);
    var y = Math.min(my - 20, window.innerHeight - 200);
    pop.style.left = x + 'px';
    pop.style.top = Math.max(50, y) + 'px';
    pop.classList.add('show');
}

function updatePopoverDur() {
    var evt = state.events.find(function(x){return x.id===selectedEvtId});
    if (!evt) return;
    var mins = evt.spanSlots * 30;
    var hrs = Math.floor(mins / 60);
    var m = mins % 60;
    var label = '';
    if (hrs && m) label = hrs + 'h ' + m + 'm';
    else if (hrs) label = hrs + (hrs===1 ? ' hour' : ' hours');
    else label = m + ' min';
    document.getElementById('epDurVal').textContent = label;
    document.getElementById('epDurTime').textContent = '';
}

function closePopover() {
    document.getElementById('editPop').classList.remove('show');
    if (selectedEvtId) {
        selectedEvtId = null;
        render();
    }
}

function epDur(delta) {
    var evt = state.events.find(function(x){return x.id===selectedEvtId});
    if (!evt) return;
    var ns = (state.config.endHour - state.config.startHour) * 2;
    evt.spanSlots = Math.max(1, Math.min(ns - evt.startSlot, evt.spanSlots + delta));
    render();
    updatePopoverDur();
}

function epSave() {
    // Reception save
    if (editingRecDay !== null) {
        pushUndo();
        var rec = state.config.reception.find(function(r){return r.dayIndex===editingRecDay});
        if (!rec) { rec={dayIndex:editingRecDay,text:''}; state.config.reception.push(rec); }
        rec.text = document.getElementById('epRecText').value;
        editingRecDay = null;
        closePopover();
        render();
        return;
    }

    var evt = state.events.find(function(x){return x.id===selectedEvtId});
    if (!evt) return;
    pushUndo();
    evt.title = document.getElementById('epTitle').value.replace(/\\n/g, '\n');
    evt.subtitle = document.getElementById('epSub').value;
    var selPick = document.querySelector('.venue-pick.selected');
    if (selPick) evt.venueId = selPick._venueId;
    closePopover();
    render();
}

function epDelete() {
    if (!selectedEvtId) return;
    pushUndo();
    state.events = state.events.filter(function(x){return x.id!==selectedEvtId});
    closePopover();
    render();
}

// Escape to close popover
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closePopover();
    if ((e.metaKey || e.ctrlKey) && e.key === 'z') { e.preventDefault(); undo(); return; }
    if (e.key === 'Delete' || e.key === 'Backspace') {
        if (selectedEvtId && !e.target.closest('input,textarea,select')) {
            epDelete();
        }
    }
});

loadState(); render(); renderSwatches();
if(!activeVenueId&&state.venues.length)activeVenueId=state.venues[0].id;
renderSwatches();
</script>
