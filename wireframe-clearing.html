<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Clearing</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            background: #0a0a08;
            overflow: hidden;
            height: 100%;
            font-family: system-ui, -apple-system, sans-serif;
            color: #fff;
            user-select: none;
            cursor: none;
        }

        .ground {
            position: fixed;
            inset: 0;
            perspective: 800px;
            perspective-origin: 50% 50%;
        }

        .lantern {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(
                circle,
                rgba(201, 168, 76, 0.1) 0%,
                rgba(201, 168, 76, 0.04) 40%,
                rgba(201, 168, 76, 0.008) 70%,
                transparent 100%
            );
            mix-blend-mode: screen;
        }

        .lantern-dot {
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 240, 200, 0.6);
            box-shadow: 0 0 12px rgba(201, 168, 76, 0.4), 0 0 30px rgba(201, 168, 76, 0.15);
            transform: translate(-50%, -50%);
        }

        .ground-texture {
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.012;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(59, 184, 168, 0.3), transparent 50%),
                radial-gradient(ellipse at 80% 30%, rgba(201, 168, 76, 0.2), transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(59, 120, 100, 0.2), transparent 40%);
        }

        .disc {
            position: absolute;
            width: 245px;
            height: 245px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 34px;
            background: rgba(255, 255, 255, 0.04);
            border: 1.5px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            opacity: 0.03;
            transition: opacity 0.8s ease, background 0.8s ease, border-color 0.6s ease, box-shadow 0.8s ease;
            cursor: none;
            overflow: hidden;
            will-change: transform;
            transform-style: preserve-3d;
        }

        .disc.near {
            opacity: 0.4;
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .disc.close {
            opacity: 1;
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 60px rgba(201, 168, 76, 0.04);
            cursor: pointer;
        }

        .disc.close:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.25);
        }

        .disc-glow {
            position: absolute;
            inset: -30px;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        .disc.close .disc-glow {
            opacity: 1;
        }

        .disc-tag {
            font-size: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.22em;
            opacity: 0.35;
            margin-bottom: 8px;
        }

        .disc-icon {
            font-size: 2.2rem;
            opacity: 0.2;
            margin-bottom: 8px;
            line-height: 1;
        }

        .disc-name {
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.2;
            margin-bottom: 8px;
        }

        .disc-detail {
            font-size: 0.68rem;
            opacity: 0.45;
            line-height: 1.45;
        }

        .disc-cta {
            margin-top: 12px;
            padding: 6px 16px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0;
            transform: translateY(4px);
            transition: opacity 0.5s, transform 0.5s, background 0.2s;
            cursor: pointer;
        }

        .disc.close .disc-cta {
            opacity: 0.65;
            transform: translateY(0);
        }

        .disc-cta:hover {
            background: rgba(255, 255, 255, 0.18);
        }

        /* Fullscreen */
        .disc.fullscreen {
            position: fixed !important;
            inset: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            border-radius: 0;
            padding: 0;
            opacity: 1;
            transform: none !important;
            z-index: 10001 !important;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: default;
            overflow-y: auto;
            background: rgba(20, 20, 18, 0.97);
            border-color: transparent;
            backdrop-filter: blur(20px);
            justify-content: center;
        }

        .disc.fullscreen .disc-tag { font-size: 0.65rem; margin-bottom: 14px; }
        .disc.fullscreen .disc-icon { font-size: 3.5rem; margin-bottom: 14px; }
        .disc.fullscreen .disc-name { font-size: 2.4rem; margin-bottom: 16px; }
        .disc.fullscreen .disc-detail { font-size: 1.05rem; line-height: 1.6; max-width: 600px; opacity: 0.55; }
        .disc.fullscreen .disc-cta { opacity: 1; font-size: 0.7rem; padding: 12px 28px; margin-top: 24px; }

        .disc-close {
            position: absolute;
            top: 24px;
            right: 28px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.4);
            font-size: 1.1rem;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        .disc-close:hover { background: rgba(255, 255, 255, 0.12); color: #fff; }
        .disc.fullscreen .disc-close { display: flex; cursor: pointer; }

        .ground.dimmed .disc:not(.fullscreen) {
            opacity: 0 !important;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .ground.dimmed .ground-texture { opacity: 0; }

        .ambient-hint {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            opacity: 0.12;
            pointer-events: none;
            z-index: 5;
            transition: opacity 0.6s;
        }

        .ambient-hint.hidden { opacity: 0; }
    </style>
</head>
<body>

<div class="ground" id="ground">
    <div class="ground-texture"></div>
</div>
<div class="lantern" id="lantern"></div>
<div class="lantern-dot" id="lanternDot"></div>
<div class="ambient-hint" id="hint">Explore</div>

<script>
var discs = [
    { tag:"Category", name:"Feature One", detail:"A short description of what this section contains.", cta:"Explore", glow:"rgba(74,138,62,0.05)", icon:"\u2726" },
    { tag:"Category", name:"Feature Two", detail:"Another area of content worth discovering.", cta:"Learn More", glow:"rgba(100,100,160,0.04)", icon:"\u2736" },
    { tag:"Category", name:"Feature Three", detail:"Supporting detail for this content area.", cta:"View", glow:"rgba(59,184,168,0.05)", icon:"\u2605" },
    { tag:"Category", name:"Feature Four", detail:"Something interesting lives behind this disc.", cta:"Open", glow:"rgba(90,140,160,0.05)", icon:"\u2B21" },
    { tag:"Category", name:"Feature Five", detail:"A placeholder for real content to come.", cta:"Details", glow:"rgba(201,168,76,0.05)", icon:"\u2661" },
    { tag:"Category", name:"Feature Six", detail:"Discover what this area has to offer.", cta:"Enter", glow:"rgba(180,120,60,0.05)", icon:"\u2600" },
    { tag:"Category", name:"Feature Seven", detail:"Content that reveals itself on approach.", cta:"See More", glow:"rgba(80,140,80,0.04)", icon:"\u2698" },
    { tag:"Category", name:"Feature Eight", detail:"One more thing to find in the clearing.", cta:"Go", glow:"rgba(140,60,100,0.05)", icon:"\u266B" },
    { tag:"Category", name:"Feature Nine", detail:"A quiet corner with something to share.", cta:"Discover", glow:"rgba(160,120,60,0.04)", icon:"\u2727" },
    { tag:"Category", name:"Feature Ten", detail:"The last disc, but not the least.", cta:"Visit", glow:"rgba(40,80,40,0.05)", icon:"\u2E19" }
];

var ground = document.getElementById('ground');
var lantern = document.getElementById('lantern');
var lanternDot = document.getElementById('lanternDot');
var hintEl = document.getElementById('hint');

var mouseX = window.innerWidth / 2;
var mouseY = window.innerHeight / 2;
var smoothX = mouseX;
var smoothY = mouseY;

var fullscreenDisc = null;
var hoveredDisc = null;
var discEls = [];
var discData = [];

var DISC_SIZE = 245;
var DISC_HALF = DISC_SIZE / 2;

// Scroll state: 0 = scattered, 1 = fully lined up, >1 = scrolling down through column
var scrollPos = 0;
var scrollTarget = 0;

function layoutDiscs() {
    var vw = window.innerWidth;
    var vh = window.innerHeight;

    // Organic scatter across the full page with allowed overlap
    var count = discs.length;

    // Use Poisson-like placement: random but spread across the whole viewport
    var placed = [];
    var MIN_DIST = DISC_SIZE * 0.55; // allow partial overlap

    discs.forEach(function(c, i) {
        var x, y, attempts = 0, ok;

        // Try to place with minimum distance, but don't try forever
        do {
            x = Math.random() * (vw - DISC_SIZE);
            y = Math.random() * (vh - DISC_SIZE);
            ok = true;
            for (var j = 0; j < placed.length; j++) {
                var pdx = x - placed[j][0];
                var pdy = y - placed[j][1];
                if (Math.sqrt(pdx * pdx + pdy * pdy) < MIN_DIST) {
                    ok = false;
                    break;
                }
            }
            attempts++;
        } while (!ok && attempts < 80);

        placed.push([x, y]);

        // Z-depth: each disc gets a random depth layer
        var zBase = -100 + Math.random() * 200; // -100 to +100

        discData[i] = {
            homeX: x,
            homeY: y,
            baseX: x,
            baseY: y,
            currentX: x,
            currentY: y,
            zBase: zBase,
            currentZ: zBase,
            driftSpeedX: 0.1 + Math.random() * 0.2,
            driftSpeedY: 0.08 + Math.random() * 0.18,
            driftSpeedZ: 0.06 + Math.random() * 0.12,
            driftPhaseX: Math.random() * Math.PI * 2,
            driftPhaseY: Math.random() * Math.PI * 2,
            driftPhaseZ: Math.random() * Math.PI * 2,
            driftRadius: 25 + Math.random() * 40,
            driftRadiusZ: 40 + Math.random() * 60
        };

        if (discEls[i]) {
            discEls[i].style.left = x + 'px';
            discEls[i].style.top = y + 'px';
        }
    });
}

// Build discs
discs.forEach(function(c, i) {
    var el = document.createElement('div');
    el.className = 'disc';
    el.style.zIndex = i + 1;

    el.innerHTML =
        '<div class="disc-close">\u2715</div>' +
        '<div class="disc-glow" style="background:radial-gradient(circle,' + c.glow + ',transparent 70%)"></div>' +
        '<div class="disc-tag">' + c.tag + '</div>' +
        '<div class="disc-icon">' + c.icon + '</div>' +
        '<div class="disc-name">' + c.name + '</div>' +
        '<div class="disc-detail">' + c.detail + '</div>' +
        '<div class="disc-cta">' + c.cta + '</div>';

    // Hover to bring to front
    el.addEventListener('mouseenter', function() {
        if (!fullscreenDisc) {
            hoveredDisc = el;
            el.style.zIndex = 500;
        }
    });
    el.addEventListener('mouseleave', function() {
        if (hoveredDisc === el) hoveredDisc = null;
    });

    ground.appendChild(el);
    discEls.push(el);

    // Single click to fullscreen
    el.addEventListener('click', function(e) {
        if (fullscreenDisc) return;
        if (!el.classList.contains('close')) return; // only when illuminated
        e.preventDefault();
        goFullscreen(el, i);
    });

    el.querySelector('.disc-close').addEventListener('mousedown', function(e) { e.stopPropagation(); });
    el.querySelector('.disc-close').addEventListener('click', function(e) {
        e.stopPropagation();
        closeFullscreen(el, i);
    });
});

layoutDiscs();

function goFullscreen(el, idx) {
    fullscreenDisc = el;
    discData[idx]._savedLeft = el.style.left;
    discData[idx]._savedTop = el.style.top;

    el.style.zIndex = 10001;
    el.classList.add('fullscreen');
    ground.classList.add('dimmed');
    hintEl.classList.add('hidden');
    document.body.style.cursor = 'default';
}

function closeFullscreen(el, idx) {
    if (!fullscreenDisc) return;
    fullscreenDisc = null;
    el.classList.remove('fullscreen');
    ground.classList.remove('dimmed');

    el.style.left = discData[idx]._savedLeft;
    el.style.top = discData[idx]._savedTop;
    document.body.style.cursor = 'none';

    setTimeout(function() {
        el.style.transition = '';
        el.style.zIndex = idx + 1;
    }, 550);
}

document.addEventListener('mousemove', function(e) {
    mouseX = e.clientX;
    mouseY = e.clientY;
});

// Scroll drives everything: 0-1 = scatter to line, 1+ = scroll through column
// Phase 2 is locked until the line has fully settled
var lineSettled = false;
var settleTimer = 0;
var SETTLE_DELAY = 60; // frames (~1 second at 60fps) the line must hold before phase 2 unlocks

document.addEventListener('wheel', function(e) {
    e.preventDefault();
    var maxScroll = 1 + (discs.length - 1) * 0.35;
    if (!lineSettled) {
        // Phase 1: only allow scrolling up to 1.0
        scrollTarget += e.deltaY * 0.0015;
        scrollTarget = Math.max(0, Math.min(1, scrollTarget));
    } else {
        // Phase 2: scroll through column, but slower
        scrollTarget += e.deltaY * 0.001;
        scrollTarget = Math.max(0, Math.min(maxScroll, scrollTarget));
    }
}, { passive: false });

var hintShown = true;
document.addEventListener('mousemove', function() {
    if (hintShown) {
        setTimeout(function() { hintEl.classList.add('hidden'); }, 2500);
        hintShown = false;
    }
}, { once: false });

// Main loop
function tick() {
    requestAnimationFrame(tick);

    smoothX += (mouseX - smoothX) * 0.1;
    smoothY += (mouseY - smoothY) * 0.1;

    lantern.style.left = smoothX + 'px';
    lantern.style.top = smoothY + 'px';
    lanternDot.style.left = smoothX + 'px';
    lanternDot.style.top = smoothY + 'px';

    if (fullscreenDisc) return;

    // Smooth scroll position
    scrollPos += (scrollTarget - scrollPos) * 0.06;

    // Unlock phase 2 only after the line has been fully settled for SETTLE_DELAY frames
    if (scrollPos > 0.98 && scrollTarget >= 0.99) {
        settleTimer++;
        if (settleTimer >= SETTLE_DELAY) {
            lineSettled = true;
        }
    } else {
        settleTimer = 0;
    }
    // Re-lock if we scroll back toward scatter
    if (scrollTarget < 0.5) {
        lineSettled = false;
        settleTimer = 0;
    }

    // Phase 1: scatter to line (scrollPos 0 to 1)
    // Phase 2: scroll through column (scrollPos > 1)
    var lineBlend = Math.min(1, Math.max(0, scrollPos));
    var columnScroll = Math.max(0, scrollPos - 1); // only active after fully lined up

    var NEAR_DIST = 260;
    var CLOSE_DIST = 140;
    var PULL_STRENGTH = 0.015;
    var RETURN_STRENGTH = 0.035;
    var time = Date.now() * 0.001;
    var vw = window.innerWidth;
    var vh = window.innerHeight;
    var count = discEls.length;

    // Column layout: first disc starts at 10% from top, spaced generously
    var lineX = (vw - DISC_SIZE) / 2;
    var lineStartY = vh * 0.08; // top 10% area, disc fully visible
    var lineSpacing = DISC_SIZE * 0.7; // generous spacing between disc centers
    var scrollOffset = columnScroll * vh * 0.8; // how far the column has scrolled up

    var isLining = lineBlend > 0.05;
    var driftMul = 1 - lineBlend;

    for (var i = 0; i < count; i++) {
        var el = discEls[i];
        var d = discData[i];

        // Scatter position (with drift)
        var scatterX = d.baseX + Math.sin(time * d.driftSpeedX + d.driftPhaseX) * d.driftRadius * driftMul;
        var scatterY = d.baseY + Math.cos(time * d.driftSpeedY + d.driftPhaseY) * d.driftRadius * 0.7 * driftMul;
        scatterX = Math.max(0, Math.min(vw - DISC_SIZE, scatterX));
        scatterY = Math.max(0, Math.min(vh - DISC_SIZE, scatterY));

        // Line target (scrolled by columnScroll)
        var lineTgtX = lineX;
        var lineTgtY = lineStartY + i * lineSpacing - scrollOffset;

        // Blend
        d.homeX = scatterX + (lineTgtX - scatterX) * lineBlend;
        d.homeY = scatterY + (lineTgtY - scatterY) * lineBlend;

        // Z: flatten when lined up
        var targetZ = d.zBase + Math.sin(time * d.driftSpeedZ + d.driftPhaseZ) * d.driftRadiusZ * driftMul;
        var zGoal = targetZ * (1 - lineBlend);
        d.currentZ += (zGoal - d.currentZ) * 0.05;

        var cx = d.currentX + DISC_HALF;
        var cy = d.currentY + DISC_HALF;
        var dx = smoothX - cx;
        var dy = smoothY - cy;
        var dist = Math.sqrt(dx * dx + dy * dy);

        // Proximity
        var isHovered = (el === hoveredDisc);
        if (isLining) {
            el.classList.add('close');
            el.classList.remove('near');
            if (!isHovered) el.style.zIndex = count - i;
        } else {
            if (dist < CLOSE_DIST) {
                el.classList.add('close');
                el.classList.remove('near');
            } else if (dist < NEAR_DIST) {
                el.classList.add('near');
                el.classList.remove('close');
            } else {
                el.classList.remove('near', 'close');
            }
            if (!isHovered) el.style.zIndex = i + 1;
        }

        // Magnetic pull (scatter mode only)
        if (dist < NEAR_DIST && dist > 10) {
            var pullFactor = (1 - dist / NEAR_DIST) * PULL_STRENGTH * driftMul;
            d.currentX += dx * pullFactor;
            d.currentY += dy * pullFactor;
        }

        // Spring back
        d.currentX += (d.homeX - d.currentX) * RETURN_STRENGTH;
        d.currentY += (d.homeY - d.currentY) * RETURN_STRENGTH;

        el.style.left = d.currentX + 'px';
        el.style.top = d.currentY + 'px';
        // Hovered disc jumps forward in Z so it renders in front of everything
        var renderZ = isHovered ? 100 : d.currentZ;
        el.style.transform = 'translateZ(' + renderZ + 'px)';
    }
}

tick();

window.addEventListener('resize', layoutDiscs);
</script>
</body>
</html>
