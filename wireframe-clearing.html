<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Clearing</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            background: #0a0a08;
            overflow: hidden;
            height: 100%;
            font-family: system-ui, -apple-system, sans-serif;
            color: #fff;
            user-select: none;
            cursor: none;
        }

        .ground {
            position: fixed;
            inset: 0;
        }

        /* Lantern glow follows cursor */
        .lantern {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(
                circle,
                rgba(201, 168, 76, 0.07) 0%,
                rgba(201, 168, 76, 0.03) 35%,
                rgba(201, 168, 76, 0.008) 60%,
                transparent 100%
            );
            mix-blend-mode: screen;
        }

        .lantern-dot {
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 240, 200, 0.6);
            box-shadow: 0 0 12px rgba(201, 168, 76, 0.4), 0 0 30px rgba(201, 168, 76, 0.15);
            transform: translate(-50%, -50%);
        }

        .ground-texture {
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.012;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(59, 184, 168, 0.3), transparent 50%),
                radial-gradient(ellipse at 80% 30%, rgba(201, 168, 76, 0.2), transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(59, 120, 100, 0.2), transparent 40%);
        }

        /* Discs - glassmorphic circles matching SSCY hot zones */
        .disc {
            position: absolute;
            width: 272px;
            height: 272px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.04);
            border: 1.5px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            opacity: 0.03;
            transform: scale(0.92);
            transition: opacity 0.8s ease, transform 0.8s ease, background 0.8s ease, border-color 0.6s ease, box-shadow 0.8s ease;
            cursor: none;
            overflow: hidden;
        }

        .disc.near {
            opacity: 0.4;
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .disc.close {
            opacity: 1;
            transform: scale(1);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 60px rgba(201, 168, 76, 0.04);
        }

        .disc.close:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.25);
        }

        /* Inner glow per disc */
        .disc-glow {
            position: absolute;
            inset: -30px;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        .disc.close .disc-glow {
            opacity: 1;
        }

        .disc-tag {
            font-size: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.22em;
            opacity: 0.35;
            margin-bottom: 8px;
        }

        .disc-icon {
            font-size: 2.2rem;
            opacity: 0.2;
            margin-bottom: 8px;
            line-height: 1;
        }

        .disc-name {
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.2;
            margin-bottom: 8px;
        }

        .disc-detail {
            font-size: 0.68rem;
            opacity: 0.45;
            line-height: 1.45;
        }

        .disc-cta {
            margin-top: 12px;
            padding: 6px 16px;
            border-radius: 50px;
            background: rgba(201, 168, 76, 0.1);
            border: 1px solid rgba(201, 168, 76, 0.18);
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0;
            transform: translateY(4px);
            transition: opacity 0.5s, transform 0.5s, background 0.2s;
            cursor: pointer;
        }

        .disc.close .disc-cta {
            opacity: 0.65;
            transform: translateY(0);
        }

        .disc-cta:hover {
            background: rgba(201, 168, 76, 0.25);
        }

        /* Fullscreen disc */
        .disc.fullscreen {
            position: fixed !important;
            inset: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            border-radius: 0;
            padding: 0;
            opacity: 1;
            transform: scale(1) translate(0, 0) !important;
            z-index: 10001 !important;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: default;
            overflow-y: auto;
            background: rgba(20, 20, 18, 0.97);
            border-color: transparent;
            backdrop-filter: blur(20px);
            justify-content: center;
        }

        .disc.fullscreen .disc-tag {
            font-size: 0.65rem;
            margin-bottom: 14px;
        }

        .disc.fullscreen .disc-icon {
            font-size: 3.5rem;
            margin-bottom: 14px;
        }

        .disc.fullscreen .disc-name {
            font-size: 2.4rem;
            margin-bottom: 16px;
        }

        .disc.fullscreen .disc-detail {
            font-size: 1.05rem;
            line-height: 1.6;
            max-width: 600px;
            opacity: 0.55;
        }

        .disc.fullscreen .disc-cta {
            opacity: 1;
            font-size: 0.7rem;
            padding: 12px 28px;
            margin-top: 24px;
        }

        .disc-close {
            position: absolute;
            top: 24px;
            right: 28px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.4);
            font-size: 1.1rem;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        .disc-close:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
        }

        .disc.fullscreen .disc-close {
            display: flex;
            cursor: pointer;
        }

        /* Dim ground when fullscreen */
        .ground.dimmed .disc:not(.fullscreen) {
            opacity: 0 !important;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .ground.dimmed .ground-texture {
            opacity: 0;
        }

        .ambient-hint {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            opacity: 0.12;
            pointer-events: none;
            z-index: 5;
            transition: opacity 0.6s;
        }

        .ambient-hint.hidden { opacity: 0; }
    </style>
</head>
<body>

<div class="ground" id="ground">
    <div class="ground-texture"></div>
</div>
<div class="lantern" id="lantern"></div>
<div class="lantern-dot" id="lanternDot"></div>
<div class="ambient-hint" id="hint">Explore the clearing</div>

<script>
var discs = [
    { tag:"The Land", name:"69 Acres of Sanctuary", detail:"Forests, gardens, ponds, and temples among ancient cedars.", cta:"Explore", glow:"rgba(74,138,62,0.05)", icon:"\u2618" },
    { tag:"Babaji", name:"Peace. No more than that.", detail:"When asked about his only goal in life.", cta:"More from Babaji", glow:"rgba(100,100,160,0.04)", icon:"\u201C" },
    { tag:"Retreat", name:"Weekend Yoga Retreat", detail:"Two nights of practice, rest, and renewal from the garden.", cta:"Book", glow:"rgba(59,184,168,0.05)", icon:"\u2726" },
    { tag:"Venue", name:"The Pond Dome", detail:"Geodesic dome by the water for workshops and events.", cta:"Inquire", glow:"rgba(90,140,160,0.05)", icon:"\u2B21" },
    { tag:"Shop", name:"Salt Spring Cooking", detail:"The beloved cookbook. 52,000 copies sold.", cta:"Shop", glow:"rgba(201,168,76,0.05)", icon:"\u2661" },
    { tag:"Training", name:"200-Hour YTT", detail:"Immersive residential teacher training. Yoga Alliance certified.", cta:"Apply", glow:"rgba(180,120,60,0.05)", icon:"\u2600" },
    { tag:"Karma Yoga", name:"Live & Serve", detail:"Volunteer with room and board. Four hours daily.", cta:"Volunteer", glow:"rgba(80,140,80,0.04)", icon:"\u2698" },
    { tag:"Event", name:"Music for Peace", detail:"Indian classical concerts in the Pond Dome.", cta:"Tickets", glow:"rgba(140,60,100,0.05)", icon:"\u266B" },
    { tag:"Sacred", name:"Hanuman Shrine", detail:"Open-air shrine among cedars. Consecrated 1984.", cta:"Sacred Spaces", glow:"rgba(160,120,60,0.04)", icon:"\u2727" },
    { tag:"Nature", name:"Dandaka Forest", detail:"Primordial cedar-swamp wetland. Boardwalk trail.", cta:"Trail Map", glow:"rgba(40,80,40,0.05)", icon:"\u2E19" }
];

var ground = document.getElementById('ground');
var lantern = document.getElementById('lantern');
var lanternDot = document.getElementById('lanternDot');
var hintEl = document.getElementById('hint');

var mouseX = window.innerWidth / 2;
var mouseY = window.innerHeight / 2;
var smoothX = mouseX;
var smoothY = mouseY;

var fullscreenDisc = null;
var discEls = [];
var discData = [];

var DISC_SIZE = 272;
var DISC_HALF = DISC_SIZE / 2;

function layoutDiscs() {
    var vw = window.innerWidth;
    var vh = window.innerHeight;

    // Organic scattered layout using golden angle
    var cx = vw / 2;
    var cy = vh / 2;
    var goldenAngle = 137.508 * (Math.PI / 180);
    var maxRadius = Math.min(vw, vh) * 0.46;

    discs.forEach(function(c, i) {
        var angle = i * goldenAngle;
        var r = maxRadius * Math.sqrt((i + 0.5) / discs.length);
        var x = cx + Math.cos(angle) * r - DISC_HALF;
        var y = cy + Math.sin(angle) * r - DISC_HALF;

        // Keep in bounds
        x = Math.max(10, Math.min(vw - DISC_SIZE - 10, x));
        y = Math.max(10, Math.min(vh - DISC_SIZE - 10, y));

        // Each disc gets unique drift parameters (speed, phase, radius)
        discData[i] = {
            homeX: x,
            homeY: y,
            baseX: x,
            baseY: y,
            currentX: x,
            currentY: y,
            driftSpeedX: 0.15 + Math.random() * 0.25,
            driftSpeedY: 0.12 + Math.random() * 0.2,
            driftPhaseX: Math.random() * Math.PI * 2,
            driftPhaseY: Math.random() * Math.PI * 2,
            driftRadius: 30 + Math.random() * 50
        };

        if (discEls[i]) {
            discEls[i].style.left = x + 'px';
            discEls[i].style.top = y + 'px';
        }
    });
}

// Build discs
discs.forEach(function(c, i) {
    var el = document.createElement('div');
    el.className = 'disc';
    el.style.zIndex = i + 1;

    el.innerHTML =
        '<div class="disc-close">\u2715</div>' +
        '<div class="disc-glow" style="background:radial-gradient(circle,' + c.glow + ',transparent 70%)"></div>' +
        '<div class="disc-tag">' + c.tag + '</div>' +
        '<div class="disc-icon">' + c.icon + '</div>' +
        '<div class="disc-name">' + c.name + '</div>' +
        '<div class="disc-detail">' + c.detail + '</div>' +
        '<div class="disc-cta">' + c.cta + '</div>';

    ground.appendChild(el);
    discEls.push(el);

    el.addEventListener('dblclick', function(e) {
        e.preventDefault();
        if (fullscreenDisc) return;
        goFullscreen(el, i);
    });

    el.querySelector('.disc-close').addEventListener('mousedown', function(e) { e.stopPropagation(); });
    el.querySelector('.disc-close').addEventListener('click', function(e) {
        e.stopPropagation();
        closeFullscreen(el, i);
    });
});

layoutDiscs();

function goFullscreen(el, idx) {
    fullscreenDisc = el;
    discData[idx]._savedLeft = el.style.left;
    discData[idx]._savedTop = el.style.top;

    el.style.zIndex = 10001;
    el.classList.add('fullscreen');
    ground.classList.add('dimmed');
    hintEl.classList.add('hidden');
    document.body.style.cursor = 'default';
}

function closeFullscreen(el, idx) {
    if (!fullscreenDisc) return;
    fullscreenDisc = null;
    el.classList.remove('fullscreen');
    ground.classList.remove('dimmed');

    el.style.left = discData[idx]._savedLeft;
    el.style.top = discData[idx]._savedTop;
    document.body.style.cursor = 'none';

    setTimeout(function() {
        el.style.transition = '';
        el.style.zIndex = idx + 1;
    }, 550);
}

// Track mouse
document.addEventListener('mousemove', function(e) {
    mouseX = e.clientX;
    mouseY = e.clientY;
});

var hintShown = true;
document.addEventListener('mousemove', function() {
    if (hintShown) {
        setTimeout(function() { hintEl.classList.add('hidden'); }, 2500);
        hintShown = false;
    }
}, { once: false });

// Main loop
function tick() {
    requestAnimationFrame(tick);

    smoothX += (mouseX - smoothX) * 0.1;
    smoothY += (mouseY - smoothY) * 0.1;

    lantern.style.left = smoothX + 'px';
    lantern.style.top = smoothY + 'px';
    lanternDot.style.left = smoothX + 'px';
    lanternDot.style.top = smoothY + 'px';

    if (fullscreenDisc) return;

    var NEAR_DIST = 380;
    var CLOSE_DIST = 200;
    var PULL_STRENGTH = 0.015;
    var RETURN_STRENGTH = 0.035;
    var time = Date.now() * 0.001;
    var vw = window.innerWidth;
    var vh = window.innerHeight;

    for (var i = 0; i < discEls.length; i++) {
        var el = discEls[i];
        var d = discData[i];

        // Slowly drift home position around its base
        d.homeX = d.baseX + Math.sin(time * d.driftSpeedX + d.driftPhaseX) * d.driftRadius;
        d.homeY = d.baseY + Math.cos(time * d.driftSpeedY + d.driftPhaseY) * d.driftRadius * 0.7;
        // Keep drifted home in bounds
        d.homeX = Math.max(10, Math.min(vw - DISC_SIZE - 10, d.homeX));
        d.homeY = Math.max(10, Math.min(vh - DISC_SIZE - 10, d.homeY));

        var cx = d.currentX + DISC_HALF;
        var cy = d.currentY + DISC_HALF;
        var dx = smoothX - cx;
        var dy = smoothY - cy;
        var dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < CLOSE_DIST) {
            el.classList.add('close');
            el.classList.remove('near');
            el.style.zIndex = 100;
        } else if (dist < NEAR_DIST) {
            el.classList.add('near');
            el.classList.remove('close');
            el.style.zIndex = i + 1;
        } else {
            el.classList.remove('near', 'close');
            el.style.zIndex = i + 1;
        }

        if (dist < NEAR_DIST && dist > 10) {
            var pullFactor = (1 - dist / NEAR_DIST) * PULL_STRENGTH;
            d.currentX += dx * pullFactor;
            d.currentY += dy * pullFactor;
        }

        var homeDistX = d.homeX - d.currentX;
        var homeDistY = d.homeY - d.currentY;
        d.currentX += homeDistX * RETURN_STRENGTH;
        d.currentY += homeDistY * RETURN_STRENGTH;

        el.style.left = d.currentX + 'px';
        el.style.top = d.currentY + 'px';
    }
}

tick();

window.addEventListener('resize', layoutDiscs);
</script>
</body>
</html>
